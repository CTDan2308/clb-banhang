            </div>
            <div style={{overflowY:"auto",padding:14,flex:1}}>
              {items.map(i=>(
                <div key={i.pid} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--bd2)"}}>
                  <span style={{fontSize:22}}>{i.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600}} className="clamp-1">{i.name}</div>
                    <div style={{fontSize:11.5,color:"var(--or)",fontWeight:700}}>{fmt(i.p)}</div>

                  <div style={{display:"flex",alignItems:"center",gap:6}}>

                    <button onClick={()=>{const p=products.find(x=>x.id===i.pid); inc(p);}} style={{border:"1px solid var(--or)",background:"var(--or)",color:"#fff",width:26,height:26,borderRadius:4,cursor:"pointer",fontSize:14}}>+</button>
                  </div>

              <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:9}}>
                <div>
                  <div style={{fontSize:10,color:"var(--mut)",marginBottom:4,fontWeight:700,textTransform:"uppercase"}}>Tên của bạn *</div>
                  <input value={form.cus} onChange={e=>setForm(f=>({...f,cus:e.target.value}))} placeholder="Nhập tên..."

                {!tableId && (

                      ))}

/* ══════════════════════════════════════════════════════════
   KITCHEN (KDS)
══════════════════════════════════════════════════════════ */
function KitchenScreen({orders,setOrders,products,setProducts,staff=[],toast}){
  const [recipe,setRecipe] = useState(null);
  const [now,setNow] = useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t);},[]);
  const NOW = now.getHours()*60 + now.getMinutes();
  const elapsed = t => {const[h,m]=(t||"00:00").split(":").map(Number);const d=NOW-(h*60+m);return d>=0?d:0;};

  const advance=o=>{
    const ns=nxSt(o); if(!ns) return;
    setOrders(os=>os.map(x=>x.id===o.id?{...x,st:ns}:x));
    toast(`${o.id} → ${ST[ns]?.label}`,"success");
  };

  const cols=[
    {k:"moi",     title:"Đơn mới",      ic:"ti-clipboard-plus",  bg:"#FFF8F4",btnBg:"var(--or-grad)",btnC:"#fff"},
    {k:"pha_che", title:"Đang pha chế", ic:"ti-flame",            bg:"#EFF6FF",btnBg:"linear-gradient(135deg,#3B82F6,#1E40AF)",btnC:"#fff"},
    {k:"san_sang",title:"Sẵn sàng",     ic:"ti-circle-check",     bg:"#FAF5FF",btnBg:"linear-gradient(135deg,#22C55E,#15803D)",btnC:"#fff"},
  ];

  const saveRecipe=(id,updated)=>setProducts(ps=>ps.map(p=>p.id===id?{...p,recipe:updated}:p));
  const recipeProds = products.filter(p=>p.cat==="pha_che"&&p.on!==false);

  return (
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:"var(--bg)"}}>
      {recipeProds.length>0&&(
        <div style={{padding:"8px 16px",borderBottom:"1px solid var(--bd)",background:"#fff",display:"flex",alignItems:"center",gap:8,overflowX:"auto",flexShrink:0,minHeight:46}}>
          <span style={{fontSize:10,color:"var(--mut)",flexShrink:0,fontWeight:700,letterSpacing:.5,display:"flex",alignItems:"center",gap:4}}>
            <i className="ti ti-book-2" style={{fontSize:14,color:"var(--or)"}}/>CÔNG THỨC
          </span>
          {recipeProds.map(p=>(
            <button key={p.id} onClick={()=>setRecipe(p)} className="btn-ghost"
              style={{fontSize:11,padding:"5px 11px",borderRadius:"var(--r-pill)",whiteSpace:"nowrap",flexShrink:0,fontWeight:600}}>
              {p.emoji} {p.name}
            </button>
          ))}
        </div>
      )}

      <div className="kds-shell" style={{flex:1,overflow:"hidden",display:"flex"}}>
        {cols.map((col,ci)=>{
          const colOrders=orders.filter(o=>o.st===col.k);
          const stColor=ST[col.k]?.color||"var(--or)";
          return (
            <div key={col.k} style={{flex:1,borderRight:ci<2?"1px solid var(--bd)":"none",background:col.bg,overflowY:"auto",display:"flex",flexDirection:"column",minWidth:0}}>
              <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(0,0,0,.06)",display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.92)",backdropFilter:"blur(6px)",flexShrink:0,position:"sticky",top:0,zIndex:2,boxShadow:"0 2px 4px rgba(0,0,0,.03)"}}>
                <i className={`ti ${col.ic}`} style={{fontSize:18,color:stColor}}/>
                <span style={{fontSize:12.5,fontWeight:800,color:"var(--text)"}}>{col.title}</span>
                <span className="chip" style={{background:stColor+"22",color:stColor,fontWeight:800}}>{colOrders.length}</span>
                {col.k==="moi"&&colOrders.length>0&&<span style={{fontSize:10,color:"var(--err)",fontWeight:800,marginLeft:"auto",animation:"pulse 1.8s infinite",display:"flex",alignItems:"center",gap:3}}>● CẦN XỬ LÝ</span>}
              </div>
              <div style={{padding:10,display:"flex",flexDirection:"column",gap:10}}>
                {colOrders.map(o=>{
                  const mins=elapsed(o.t);
                  const urgent=mins>15;
                  const warn=mins>10&&mins<=15;
                  return (
                    <div key={o.id} className={urgent?"shake":""} style={{background:"#fff",border:`2px solid ${urgent?"#FCA5A5":warn?"#FCD34D":"var(--bd)"}`,borderRadius:"var(--r-md)",padding:13,transition:"border .2s",boxShadow:urgent?"0 4px 16px rgba(220,38,38,.15)":"var(--sh-sm)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                        <span style={{fontFamily:"ui-monospace,monospace",fontWeight:800,color:"var(--or)",fontSize:15}}>{o.id}</span>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          {urgent&&<span style={{fontSize:9.5,color:"#fff",fontWeight:800,background:"var(--err)",padding:"3px 7px",borderRadius:"var(--r-pill)",letterSpacing:.3}}>TRỄ</span>}
                          {warn&&<span style={{fontSize:9.5,color:"#fff",fontWeight:800,background:"var(--warn)",padding:"3px 7px",borderRadius:"var(--r-pill)",letterSpacing:.3}}>SẮP TRỄ</span>}
                          <span style={{fontSize:11,padding:"3px 8px",borderRadius:"var(--r-pill)",background:urgent?"var(--err-bg)":warn?"var(--warn-bg)":"#F3F4F6",color:urgent?"var(--err)":warn?"var(--warn)":"var(--mut)",fontWeight:700,display:"inline-flex",alignItems:"center",gap:2}}>
                            <i className="ti ti-clock" style={{fontSize:11}}/>{mins}p
                          </span>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                        <span style={{fontSize:12.5,color:"var(--text)",fontWeight:700}}>{o.cus}</span>
                        <TPill type={o.type}/>
                      </div>
                      {o.items.map((item,ii)=>{
                        const prod=products.find(p=>p.id===item.pid);
                        return (
                          <div key={ii} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,color:"var(--text)",padding:"6px 0",borderBottom:ii<o.items.length-1?"1px dashed #F0F0F0":"none"}}>
                            <div style={{lineHeight:1.4,flex:1,minWidth:0}}>
                              <span style={{fontWeight:600}}>{item.name}</span>
                              {item.note&&<div style={{fontSize:10.5,color:"var(--or)",marginTop:1}}><i className="ti ti-note" style={{fontSize:10,marginRight:2}}/>{item.note}</div>}
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,marginLeft:6}}>
                              <span style={{fontWeight:800,fontSize:17,color:"var(--or)",minWidth:30,textAlign:"right"}}>×{item.qty}</span>
                              {prod?.cat==="pha_che"&&(
                                <button onClick={()=>setRecipe(prod)} title="Xem công thức"
                                  style={{fontSize:10,padding:"3px 8px",border:"1px solid #FFD4C2",borderRadius:"var(--r-pill)",background:"var(--orl)",color:"var(--or)",cursor:"pointer",fontWeight:800,letterSpacing:.3}}>CT</button>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      {o.note&&<div style={{fontSize:11,color:"var(--or)",marginTop:7,fontStyle:"italic",background:"var(--orl)",padding:"5px 9px",borderRadius:"var(--r-sm)"}}><i className="ti ti-note" style={{fontSize:11,marginRight:3}}/>{o.note}</div>}
                      {/* v1.6.0: Đơn ship sau khi pha xong → chờ shipper nhận (KDS không advance được) */}
                      {o.st==="san_sang" && o.type==="ship" && (
                        <div style={{marginTop:11,padding:"8px 10px",background:o.sid?"#DCFCE7":"#FEF3C7",border:`1px solid ${o.sid?"#22C55E":"#F59E0B"}55`,borderRadius:"var(--r-sm)",display:"flex",alignItems:"center",gap:6,fontSize:11,fontWeight:700,color:o.sid?"#15803D":"#92400E"}}>
                          <span style={{fontSize:14}}>🛵</span>
                          {o.sid ? `${staff.find(s=>s.id===o.sid)?.name||"Shipper"} sẽ tới lấy` : "Đang chờ shipper nhận đơn"}
                        </div>
                      )}
                      {nxLb(o)&&(
                        <button onClick={()=>advance(o)}
                          style={{width:"100%",marginTop:11,padding:"10px",background:col.btnBg,border:"none",borderRadius:"var(--r-md)",fontSize:12.5,fontWeight:800,cursor:"pointer",color:col.btnC,letterSpacing:.3,boxShadow:"var(--sh-sm)",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                          <i className="ti ti-arrow-right" style={{fontSize:14}}/>{nxLb(o)}
                        </button>
                      )}
                    </div>
                  );
                })}
                {colOrders.length===0&&(
                  <div style={{textAlign:"center",padding:"40px 0",color:"var(--mut2)"}}>
                    <i className={`ti ${col.ic}`} style={{fontSize:36,display:"block",marginBottom:6,opacity:.4}}/>
                    <div style={{fontSize:12,fontWeight:500}}>Không có đơn</div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {recipe&&<RecipeModal product={recipe} onClose={()=>setRecipe(null)}
        onSave={updated=>saveRecipe(recipe.id,updated)} toast={toast}/>}
    </div>
  );
}

/* Modal nhập lý do hoàn hàng */
function ReturnReasonModal({order,onClose,onConfirm}){
  const [reason,setReason] = useState("");
  const presets = ["Khách không nhận máy","Khách báo huỷ giữa đường","Sai địa chỉ","Sai món","Khác"];
  const submit = () => {
    const r = reason.trim();
    if (!r) return;
    onConfirm(r);
  };
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn .15s"}}>
      <div style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:420,padding:20,animation:"fadeUp .2s ease"}}>
        <div style={{fontSize:16,fontWeight:700,color:"#212121",marginBottom:4}}>↩️ Hoàn hàng đơn {order.id}</div>
        <div style={{fontSize:12,color:"#767676",marginBottom:14}}>Khách: <b style={{color:"#212121"}}>{order.cus}</b> · 📍 {order.adr}</div>
        <div style={{fontSize:11,color:"#767676",fontWeight:600,marginBottom:5}}>Chọn lý do nhanh:</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
          {presets.map(p=>(
            <button key={p} onClick={()=>setReason(p)}
              style={{fontSize:11,padding:"5px 10px",border:`1px solid ${reason===p?"var(--or)":"var(--bd)"}`,borderRadius:5,background:reason===p?"#FFF4F0":"#fff",cursor:"pointer",color:reason===p?"var(--or)":"#475569",fontWeight:reason===p?700:500}}>{p}</button>
          ))}
        </div>
        <div style={{fontSize:11,color:"#767676",fontWeight:600,marginBottom:5}}>Hoặc nhập chi tiết:</div>
        <textarea value={reason} onChange={e=>setReason(e.target.value)}
          placeholder="Mô tả lý do hoàn hàng..."
          style={{width:"100%",padding:"8px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12,minHeight:80,resize:"vertical"}}/>
        <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"8px 16px",border:"1px solid var(--bd)",background:"#fff",borderRadius:6,cursor:"pointer",fontSize:12,color:"#475569"}}>Huỷ</button>
          <button onClick={submit} disabled={!reason.trim()}
            style={{padding:"8px 16px",border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:reason.trim()?"pointer":"not-allowed",background:reason.trim()?"#9d174d":"#e0e0e0",color:"#fff"}}>
            Xác nhận hoàn hàng
          </button>
        </div>
      </div>
    </div>
  );
}

          </div>
          <span style={{fontSize:10,color:"var(--mut2)",fontWeight:600,display:"inline-flex",alignItems:"center",gap:2}}><i className="ti ti-clock" style={{fontSize:11}}/>{o.t}</span>

        {o.returnReason&&<div style={{fontSize:11,color:"#9D174D",background:"#FCE7F3",borderRadius:"var(--r-sm)",padding:"5px 9px",marginBottom:7,fontWeight:500}}>↩️ {o.returnReason}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:actions?9:0,paddingTop:5,borderTop:"1px dashed var(--bd2)"}}>
          <span style={{fontSize:13,color:"var(--or)",fontWeight:800,display:"flex",alignItems:"center",gap:4}}><i className="ti ti-motorbike" style={{fontSize:14}}/>{fmt(o.dFee)}</span>
          {showShipper&&sh&&<span className="chip">🛵 {sh.name}</span>}
        </div>
        {actions}
      </div>
    </div>
  );
}

/* v1.5: Shipper APP — standalone, không sidebar/topbar, full-screen như Grab Driver
   Tab: Pool (đơn chờ tự nhận) / Đang giao / Lịch sử
   Self-claim: tap "Nhận đơn" → UPDATE WHERE sid IS NULL (concurrency-safe) */
function ShipperApp({orders,currentUser,staff,pickup,startShip,complete,cancel,doReturn,onLogout,toast,connStatus,currentShift,onlineUsers}){
  const [tab,setTab] = useState("active"); // pool | active | history
  const [focusId,setFocusId] = useState(null);
  const [claimingNum,setClaimingNum] = useState(null);
  const [returnFor,setReturnFor] = useState(null);
  const [now,setNow] = useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);

  // Pool: đơn ship sẵn sàng chưa có shipper → bất kỳ ai cũng có thể claim
  const pool = orders.filter(o=>o.type==="ship" && o.st==="san_sang" && (o.sid==null));
  // Auto-switch sang tab pool nếu pool có đơn và đang ở active rỗng
  useEffect(()=>{
    if (pool.length>0 && tab==="active") {
      // không auto-switch, chỉ show badge
    }
  },[pool.length]);

  const mine = orders.filter(o=>o.type==="ship" && o.sid===currentUser.id);
  const active = mine.filter(o=>["san_sang","da_lay","dang_giao"].includes(o.st))
                     .sort((a,b)=>{
                       const order={dang_giao:0,da_lay:1,san_sang:2};
                       return (order[a.st]-order[b.st]) || a.num-b.num;
                     });
  const finished = mine.filter(o=>["hoan_thanh","hoan_hang","huy"].includes(o.st));

  // Focused order: ưu tiên dang_giao → da_lay → san_sang. Nếu user click chọn → giữ
  const current = (focusId && active.find(o=>o.id===focusId)) || active[0] || null;
  const others = current ? active.filter(o=>o.id!==current.id) : active;

  const doneToday = finished.filter(o=>o.st==="hoan_thanh");
  const todayFee = doneToday.reduce((s,o)=>s+(o.dFee||0),0);
  const returnedCount = finished.filter(o=>o.st==="hoan_hang").length;
  const compRate = mine.length ? Math.round(doneToday.length/mine.length*100) : 0;

  const elapsed = (t) => {
    if (!t) return 0;
    const [h,m] = t.split(":").map(Number);
    const start = h*60+m;
    const cur = now.getHours()*60+now.getMinutes();
    return Math.max(0, cur-start);
  };

  // Action config theo status hiện tại
  const stConfig = current ? ({
    san_sang: {
      title:"Đến quầy lấy hàng", subtitle:"Trưởng ca đã phân đơn này cho bạn",
      icColor:"#5b21b6", icBg:"#ede9fe", icon:"ti-package",
      mainBtn:{label:"✓ Đã lấy hàng", grad:"linear-gradient(135deg,#7C3AED,#5b21b6)", action:()=>pickup(current.id)},
      altBtn:{label:"Huỷ đơn", color:"var(--err)", action:()=>cancel(current.id)}
    },
    da_lay: {
      title:"Sẵn sàng giao", subtitle:"Lên xe và bấm Bắt đầu khi xuất phát",
      icColor:"#854d0e", icBg:"#fef3c7", icon:"ti-clock",
      mainBtn:{label:"🛵 Bắt đầu giao", grad:"linear-gradient(135deg,#F59E0B,#D97706)", action:()=>startShip(current.id)},
      altBtn:null
    },
    dang_giao: {
      title:"Đang giao đến khách", subtitle:"Bấm Đã giao khi khách nhận hàng",
      icColor:"#c2410c", icBg:"#ffedd5", icon:"ti-motorbike",
      mainBtn:{label:"✓ Đã giao thành công", grad:"linear-gradient(135deg,#22C55E,#15803D)", action:()=>complete(current.id)},
      altBtn:{label:"↩️ Hoàn hàng", color:"#9D174D", action:()=>setReturnFor(current)}
    }
  })[current.st] : null;

  const mapsUrl = (adr) => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(adr||"")}`;
  const itemTotal = (o) => (o.items||[]).reduce((s,i)=>s+i.qty*i.p,0) - (o.disc||0);

  // Self-claim: concurrency-safe — chỉ update nếu sid vẫn null
  const claim = async (order) => {
    if (claimingNum) return; // tránh double-tap
    setClaimingNum(order.num);
    const {data,error} = await sb.from("orders")
      .update({sid: currentUser.id})
      .eq("num", order.num)
      .is("sid", null)
      .select();
    setClaimingNum(null);
    if (error) { toast("Lỗi nhận đơn: "+error.message, "error"); return; }
    if (!data || data.length===0) {
      toast("Đơn đã được shipper khác nhận", "warn");
      return;
    }
    toast(`✓ Bạn đã nhận đơn ${order.id}`, "success");
    setTab("active"); setFocusId(order.id);
  };

  return (
    <div style={{height:"100vh",background:"#F5F5F5",display:"flex",flexDirection:"column",fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",overflow:"hidden"}}>

      {/* ── App header (logout + connection status) ── */}
      <div style={{background:"#0F172A",color:"#fff",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:"1px solid rgba(255,255,255,.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12}}>
          <span style={{fontSize:14}}>🛵</span>
          <span style={{fontWeight:800,letterSpacing:.5}}>SHIPPER</span>
          {currentShift && <span style={{fontSize:10.5,opacity:.6,marginLeft:6}}>· {currentShift.name}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:10.5,display:"flex",alignItems:"center",gap:4,opacity:.85}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:connStatus==="live"?"#22c55e":"#ef4444",boxShadow:connStatus==="live"?"0 0 6px #22c55e":"none"}}/>
            {connStatus==="live"?"Online":"Mất kết nối"}
          </div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",color:"#fff",fontSize:11,padding:"5px 11px",borderRadius:"var(--r-pill)",cursor:"pointer",fontWeight:600}}>
            <i className="ti ti-logout" style={{fontSize:12,marginRight:4}}/>Thoát
          </button>
        </div>
      </div>

      {/* ── Earnings bar ── */}
      <div style={{background:"linear-gradient(135deg,#1F2937 0%,#111827 100%)",color:"#fff",padding:"12px 16px",flexShrink:0,boxShadow:"0 2px 8px rgba(0,0,0,.15)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"var(--or)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"var(--sh-or)"}}>🛵</div>
            <div>
              <div style={{fontSize:13,fontWeight:700}}>{currentUser.name}</div>
              <div style={{fontSize:10.5,opacity:.7,display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 6px #22c55e"}}/>Đang nhận đơn
              </div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,opacity:.7}}>Phí ship hôm nay</div>
            <div style={{fontSize:17,fontWeight:800,color:"#FCD34D"}}>{fmt(todayFee)}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:"rgba(255,255,255,.1)",borderRadius:8,padding:1}}>
          {[
            {l:"Đã giao",v:doneToday.length,c:"#22c55e"},
            {l:"Hoàn hàng",v:returnedCount,c:"#F472B6"},
            {l:"Tỉ lệ",v:`${compRate}%`,c:"#FCD34D"}
          ].map(s=>(
            <div key={s.l} style={{background:"rgba(0,0,0,.2)",padding:"7px 4px",textAlign:"center",borderRadius:6}}>
              <div style={{fontSize:9.5,opacity:.7,marginBottom:1}}>{s.l}</div>
              <div style={{fontSize:14,fontWeight:800,color:s.c}}>{s.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Tab switcher ── */}
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid var(--bd)",padding:"0 12px",gap:0,flexShrink:0}}>
        {[
          {k:"pool",   l:"Đơn chờ nhận", c:pool.length,   hl:pool.length>0},
          {k:"active", l:"Đang giao",    c:active.length},
          {k:"history",l:"Lịch sử",      c:finished.length}
        ].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{flex:1,padding:"13px 0",border:"none",background:"none",cursor:"pointer",fontSize:12.5,fontWeight:700,
              color:tab===t.k?"var(--or)":"var(--mut)",
              borderBottom:`3px solid ${tab===t.k?"var(--or)":"transparent"}`,
              display:"flex",alignItems:"center",justifyContent:"center",gap:5,position:"relative"}}>
            {t.l}
            {t.c>0 && <span style={{fontSize:10,padding:"2px 6px",borderRadius:"var(--r-pill)",background:t.hl&&tab!==t.k?"#EF4444":(tab===t.k?"var(--or)":"#E5E7EB"),color:(t.hl&&tab!==t.k)||tab===t.k?"#fff":"var(--mut)",fontWeight:800,animation:t.hl&&tab!==t.k?"pulse 1.5s infinite":"none"}}>{t.c}</span>}
          </button>
        ))}
      </div>

      {/* ── Content area (scrollable) ── */}
      <div style={{flex:1,overflowY:"auto",background:"#F5F5F5"}}>

      {/* ── POOL TAB: Đơn chờ shipper nhận (self-claim) ── */}
      {tab==="pool" && (
        <div style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{background:"linear-gradient(135deg,#FEF3C7,#FDE68A)",border:"1px solid #F59E0B33",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:9}}>
            <i className="ti ti-info-circle" style={{fontSize:18,color:"#D97706",flexShrink:0}}/>
            <div style={{fontSize:11.5,color:"#92400E",lineHeight:1.4}}>
              <b>Tự nhận đơn</b> · Đơn đầu tiên bạn tap "Nhận đơn" sẽ về bạn. Đơn đã được người khác lấy sẽ tự biến mất.
            </div>
          </div>

          {pool.length===0 && (
            <div style={{textAlign:"center",padding:"50px 20px",color:"var(--mut)"}}>
              <div style={{fontSize:46,marginBottom:10,opacity:.4}}>📭</div>
              <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>Chưa có đơn chờ</div>
              <div style={{fontSize:11.5,marginTop:5}}>Khi bếp pha xong đơn ship, đơn sẽ xuất hiện ở đây</div>
            </div>
          )}

          {pool.map(o=>{
            const isClaiming = claimingNum===o.num;
            return (
              <div key={o.id} style={{background:"#fff",borderRadius:12,padding:14,border:"2px solid #FCD34D",boxShadow:"0 4px 14px rgba(245,158,11,.15)",position:"relative"}}>
                <div style={{position:"absolute",top:0,right:0,background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#fff",fontSize:10,fontWeight:800,padding:"3px 10px",borderBottomLeftRadius:10,letterSpacing:.5}}>MỚI</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{fontFamily:"ui-monospace,monospace",fontSize:13,fontWeight:800,color:"var(--or)"}}>{o.id}</span>
                  <span style={{fontSize:11,color:"var(--mut)",display:"flex",alignItems:"center",gap:3}}>
                    <i className="ti ti-clock" style={{fontSize:11}}/>{o.t}
                  </span>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:11,color:"var(--mut)",fontWeight:600,textTransform:"uppercase",marginBottom:2}}>Khách</div>
                  <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>{o.cus}</div>
                </div>
                <div style={{marginBottom:8,display:"flex",gap:6,alignItems:"flex-start"}}>
                  <i className="ti ti-map-pin" style={{fontSize:16,color:"var(--or)",flexShrink:0,marginTop:2}}/>
                  <div style={{flex:1,fontSize:13,color:"var(--text2)",lineHeight:1.4}}>{o.adr||"(không có địa chỉ)"}</div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"7px 10px",background:"#F9FAFB",borderRadius:8}}>
                  <span style={{fontSize:11.5,color:"var(--mut)"}}>{(o.items||[]).reduce((s,i)=>s+i.qty,0)} món · {o.pay==="qr"?"QR":"Tiền mặt"}</span>
                  <span style={{fontSize:15,fontWeight:800,color:"var(--or)"}}>+{fmt(o.dFee||0)}</span>
                </div>
                <button onClick={()=>claim(o)} disabled={isClaiming}
                  style={{width:"100%",padding:"14px",background:isClaiming?"#9CA3AF":"linear-gradient(135deg,#22C55E,#15803D)",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:isClaiming?"wait":"pointer",boxShadow:"0 4px 14px rgba(34,197,94,.3)"}}>
                  {isClaiming ? "Đang nhận..." : "🛵 Nhận đơn này"}
                </button>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Content ── */}
      {tab==="active" && (
        <div style={{flex:1,padding:"14px",display:"flex",flexDirection:"column",gap:14}}>
          {!current && (
            <div style={{textAlign:"center",padding:"60px 20px",color:"var(--mut)"}}>
              <div style={{fontSize:54,marginBottom:12,opacity:.4}}>☕</div>
              <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>Chưa có đơn đang giao</div>
              <div style={{fontSize:11.5,marginTop:6}}>
                {pool.length>0
                  ? <span>Có <b style={{color:"var(--or)"}}>{pool.length} đơn chờ</b> ở tab "Đơn chờ nhận" — tap để xem</span>
                  : "Khi có đơn mới, bạn có thể tự nhận ở tab \"Đơn chờ nhận\""}
              </div>
              {pool.length>0 && (
                <button onClick={()=>setTab("pool")} className="btn-pri" style={{marginTop:14,padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:700}}>
                  Xem đơn chờ →
                </button>
              )}
            </div>
          )}

          {current && (
            <>
              {/* ── ACTIVE ORDER CARD (full-width, big) ── */}
              <div style={{background:"#fff",borderRadius:14,boxShadow:"var(--sh-md)",overflow:"hidden",border:`2px solid ${stConfig.icColor}33`}}>
                {/* Status header */}
                <div style={{padding:"12px 14px",background:stConfig.icBg,display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:40,height:40,borderRadius:10,background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"var(--sh-sm)"}}>
                    <i className={`ti ${stConfig.icon}`} style={{fontSize:20,color:stConfig.icColor}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:800,color:stConfig.icColor}}>{stConfig.title}</div>
                    <div style={{fontSize:10.5,color:"var(--text2)",marginTop:1}}>{stConfig.subtitle}</div>
                  </div>
                  <span style={{fontFamily:"ui-monospace,monospace",fontSize:12,fontWeight:800,color:stConfig.icColor,background:"#fff",padding:"4px 9px",borderRadius:"var(--r-pill)"}}>{current.id}</span>
                </div>

                {/* Customer block — tap to call */}
                <div style={{padding:"14px",borderBottom:"1px dashed var(--bd2)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:"var(--mut)",fontWeight:600,textTransform:"uppercase",marginBottom:3}}>Khách hàng</div>
                      <div style={{fontSize:17,fontWeight:800,color:"var(--text)",lineHeight:1.2}}>{current.cus}</div>
                      {current.ph && <div style={{fontSize:13,color:"var(--text2)",marginTop:2}}>📞 {current.ph}</div>}
                    </div>
                    {current.ph && (
                      <a href={`tel:${current.ph}`} style={{textDecoration:"none",width:48,height:48,borderRadius:"50%",background:"#22C55E",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(34,197,94,.35)",flexShrink:0}}>
                        <i className="ti ti-phone-call" style={{fontSize:22,color:"#fff"}}/>
                      </a>
                    )}
                  </div>
                </div>

                {/* Address block — tap to open Maps */}
                <div style={{padding:"14px",borderBottom:"1px dashed var(--bd2)"}}>
                  <div style={{fontSize:11,color:"var(--mut)",fontWeight:600,textTransform:"uppercase",marginBottom:5}}>Địa chỉ giao</div>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    <i className="ti ti-map-pin" style={{fontSize:22,color:"var(--or)",flexShrink:0,marginTop:1}}/>
                    <div style={{flex:1,fontSize:15,fontWeight:600,color:"var(--text)",lineHeight:1.4}}>{current.adr||"(không có địa chỉ)"}</div>
                  </div>
                  {current.adr && (
                    <a href={mapsUrl(current.adr)} target="_blank" rel="noopener"
                      style={{textDecoration:"none",marginTop:10,display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"11px",background:"linear-gradient(135deg,#3B82F6,#1E40AF)",color:"#fff",borderRadius:10,fontSize:13,fontWeight:700,boxShadow:"0 4px 12px rgba(59,130,246,.25)"}}>
                      <i className="ti ti-navigation" style={{fontSize:16}}/>Mở Google Maps
                    </a>
                  )}
                </div>

                {/* Note (nếu có) */}
                {current.note && (
                  <div style={{padding:"10px 14px",background:"#FFFBEB",borderBottom:"1px dashed var(--bd2)",display:"flex",gap:8,alignItems:"flex-start"}}>
                    <i className="ti ti-alert-circle" style={{fontSize:16,color:"#D97706",flexShrink:0,marginTop:1}}/>
                    <div style={{flex:1,fontSize:12.5,color:"#92400E",fontWeight:600,lineHeight:1.4}}>{current.note}</div>
                  </div>
                )}

                {/* Items + total */}
                <div style={{padding:"14px"}}>
                  <div style={{fontSize:11,color:"var(--mut)",fontWeight:600,textTransform:"uppercase",marginBottom:7}}>{current.items.length} món · {current.items.reduce((s,i)=>s+i.qty,0)} sản phẩm</div>
                  {current.items.map((i,idx)=>(
                    <div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,padding:"5px 0",borderBottom:idx<current.items.length-1?"1px dashed #F0F0F0":"none"}}>
                      <span style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:6}}>{i.name} <b style={{color:"var(--or)"}}>×{i.qty}</b></span>
                      {i.note && <span style={{fontSize:10,color:"var(--or)",marginRight:6}}>📝</span>}
                    </div>
                  ))}
                  <div style={{marginTop:10,padding:"10px",background:"linear-gradient(135deg,#FFF4F0 0%,#FFEDE5 100%)",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:10,color:"var(--mut)",fontWeight:600}}>Phí ship của bạn</div>
                      <div style={{fontSize:18,fontWeight:800,color:"var(--or)"}}>{fmt(current.dFee||0)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"var(--mut)",fontWeight:600}}>Khách trả ({current.pay==="qr"?"QR":"Tiền mặt"})</div>
                      <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>{fmt(itemTotal(current)+(current.dFee||0))}</div>
                    </div>
                  </div>
                </div>

                {/* CTA buttons */}
                <div style={{padding:"12px 14px",background:"#FAFAFA",borderTop:"1px solid var(--bd2)",display:"flex",gap:8}}>
                  {stConfig.altBtn && (
                    <button onClick={stConfig.altBtn.action} style={{flex:1,padding:"15px",fontSize:13,fontWeight:700,background:"#fff",color:stConfig.altBtn.color,border:`1.5px solid ${stConfig.altBtn.color}55`,borderRadius:10,cursor:"pointer"}}>
                      {stConfig.altBtn.label}
                    </button>
                  )}
                  <button onClick={stConfig.mainBtn.action} style={{flex:stConfig.altBtn?2:1,padding:"15px",fontSize:15,fontWeight:800,color:"#fff",background:stConfig.mainBtn.grad,border:"none",borderRadius:10,cursor:"pointer",boxShadow:"0 4px 14px rgba(0,0,0,.18)"}}>
                    {stConfig.mainBtn.label}
                  </button>
                </div>
              </div>

              {/* ── Queue: các đơn khác đang chạy ── */}
              {others.length>0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--mut)",textTransform:"uppercase",marginBottom:8,padding:"0 4px"}}>📋 Đơn tiếp theo ({others.length})</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {others.map(o=>(
                      <button key={o.id} onClick={()=>setFocusId(o.id)}
                        style={{textAlign:"left",background:"#fff",border:"1px solid var(--bd)",borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,boxShadow:"var(--sh-sm)"}}>
                        <Bdg s={o.st}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12.5,fontWeight:700,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.cus} · {o.id}</div>
                          <div style={{fontSize:11,color:"var(--mut)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {o.adr||"—"}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:800,color:"var(--or)"}}>{fmt(o.dFee||0)}</div>
                          <div style={{fontSize:10,color:"var(--mut)"}}>{elapsed(o.t)}p</div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {tab==="history" && (
        <div style={{flex:1,padding:14}}>
          {finished.length===0 ? (
            <div style={{textAlign:"center",padding:"60px 20px",color:"var(--mut)"}}>
              <div style={{fontSize:46,marginBottom:10,opacity:.4}}>📭</div>
              <div style={{fontSize:13}}>Chưa có đơn nào hoàn thành hôm nay</div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[...finished].reverse().map(o=>{
                const isCompleted = o.st==="hoan_thanh";
                const isReturned = o.st==="hoan_hang";
                return (
                  <div key={o.id} style={{background:"#fff",borderRadius:10,padding:"11px 13px",border:"1px solid var(--bd)",boxShadow:"var(--sh-sm)",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:isCompleted?"#dcfce7":isReturned?"#fce7f3":"#fee2e2",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <i className={`ti ${isCompleted?"ti-check":isReturned?"ti-arrow-back":"ti-x"}`} style={{fontSize:18,color:isCompleted?"#15803d":isReturned?"#9d174d":"#b91c1c"}}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                        <span style={{fontFamily:"ui-monospace,monospace",fontSize:11,fontWeight:700,color:"var(--mut)"}}>{o.id}</span>
                        <Bdg s={o.st}/>
                      </div>
                      <div style={{fontSize:13,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.cus}</div>
                      {o.returnReason && <div style={{fontSize:10.5,color:"#9d174d",marginTop:2}}>↩️ {o.returnReason}</div>}
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:14,fontWeight:800,color:isCompleted?"#15803d":"var(--mut)"}}>{isCompleted?"+":""}{fmt(o.dFee||0)}</div>
                      <div style={{fontSize:10,color:"var(--mut)"}}>{o.t}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      </div> {/* /content area */}

      {returnFor && <ReturnReasonModal order={returnFor} onClose={()=>setReturnFor(null)} onConfirm={r=>doReturn(returnFor.id,r)}/>}
    </div>
  );
}

function ShipperScreen({orders,setOrders,setProducts,staff,currentUser,effectiveRole,toast}){
  const [returnFor,setReturnFor] = useState(null);
  const isShipper   = effectiveRole==="shipper";
  const canAssign   = effectiveRole==="truong_ca" || effectiveRole==="admin";

  const ship    = orders.filter(o=>o.type==="ship");
  const shippers= staff.filter(s=>s.role==="shipper"&&s.active);

  const setSt = (oid,patch,msg,type="success") => {
    setOrders(os=>os.map(o=>o.id===oid?{...o,...patch}:o));
    if (msg) toast(msg,type);
  };
  // Hoàn kho cho đơn (chỉ khi chưa kết thúc — tránh hoàn 2 lần)
  const restoreStock = (oid) => {
    const o = orders.find(x=>x.id===oid);
    if (!o || ["huy","hoan_thanh","hoan_hang"].includes(o.st)) return;
    setProducts(ps=>ps.map(p=>{const ci=o.items.find(i=>i.pid===p.id);return ci?{...p,stock:p.stock+ci.qty}:p;}));
  };
  const assign  = (oid,sid)=>{
    if (!canAssign) { toast("Chỉ Trưởng ca / Admin mới được phân công shipper","warn"); return; }
    const o = orders.find(x=>x.id===oid);
    // v1.6: re-assign — nếu shipper cũ đã pickup/đang giao thì reset về san_sang để shipper mới bắt đầu lại
    const patch = {sid};
    if (o && ["da_lay","dang_giao"].includes(o.st)) {
      patch.st = "san_sang";
    }
    setSt(oid,patch,`Phân công ${staff.find(s=>s.id===sid)?.name} → đơn ${oid}`);
  };
  const pickup    = oid => setSt(oid,{st:"da_lay"},`Đã ghi nhận lấy đơn ${oid}`);
  const startShip = oid => setSt(oid,{st:"dang_giao"},`Bắt đầu giao đơn ${oid}`);
  const complete  = oid => setSt(oid,{st:"hoan_thanh"},`✓ Giao thành công đơn ${oid}`);
  const cancel    = oid => { if(!confirm("Huỷ đơn này?")) return; restoreStock(oid); setSt(oid,{st:"huy"},"Đã huỷ đơn · đã hoàn kho","warn"); };
  // Hoàn hàng: hoàn kho cho đồ pha chế thì không hợp lý (đã pha rồi), nhưng đồ san_co/kho thì có thể trả lại.
  // Để đơn giản giai đoạn này: KHÔNG hoàn kho khi hoàn hàng — đó là hàng đã đi ra.
  const doReturn  = (oid,reason) => { setSt(oid,{st:"hoan_hang",returnReason:reason},"↩️ Đã ghi nhận hoàn hàng","warn"); setReturnFor(null); };

  /* Shipper role giờ dùng ShipperApp standalone (early return ở App component) */

  /* ── VIEW CHO TRƯỞNG CA / ADMIN ── */
  const wait     = ship.filter(o=>o.st==="san_sang");
  const picked   = ship.filter(o=>o.st==="da_lay");
  const onroute  = ship.filter(o=>o.st==="dang_giao");
  const finished = ship.filter(o=>o.st==="hoan_thanh");
  const returned = ship.filter(o=>o.st==="hoan_hang");

  const stats=[
    {l:"Chờ phân công",v:wait.length,   ic:"ti-clock",       bg:"#ede9fe",tc:"#5b21b6"},
    {l:"Shipper đang đi",v:picked.length+onroute.length,ic:"ti-motorbike",bg:"#ffedd5",tc:"#c2410c"},
    {l:"Đã giao",     v:finished.length,ic:"ti-circle-check",bg:"#dcfce7",tc:"#15803d"},
    {l:"Hoàn hàng",   v:returned.length,ic:"ti-arrow-back",  bg:"#fce7f3",tc:"#9d174d"},
  ];

  // v1.5: tách wait thành unassigned (pool tự nhận) + assigned (đã có shipper)
  const waitUnassigned = wait.filter(o=>o.sid==null);
  const waitAssigned   = wait.filter(o=>o.sid!=null);

  return (
    <div style={{flex:1,overflowY:"auto",padding:16,background:"var(--bg)"}}>
      <div className="grid-stats-4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {stats.map(s=>(
          <div key={s.l} className="card" style={{padding:"13px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{fontSize:11,color:"#767676"}}>{s.l}</div>
              <div style={{width:32,height:32,borderRadius:7,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><i className={`ti ${s.ic}`} style={{fontSize:15,color:s.tc}}/></div>
            </div>
            <div style={{fontSize:22,fontWeight:800,color:"#212121"}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* v1.5: HERO — Đơn cần phân shipper (nổi bật) */}
      {canAssign && waitUnassigned.length>0 && (
        <div style={{background:"linear-gradient(135deg,#FFF4F0 0%,#FFEDE5 100%)",border:"2px solid var(--or)",borderRadius:12,padding:14,marginBottom:14,boxShadow:"0 4px 16px rgba(238,77,45,.12)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"var(--or-grad)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"var(--sh-or)",animation:"pulse 2s infinite"}}>🚨</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:800,color:"var(--or)"}}>{waitUnassigned.length} đơn cần phân shipper</div>
              <div style={{fontSize:10.5,color:"var(--text2)"}}>Tap avatar shipper bên dưới để gán. Shipper cũng có thể tự nhận trong app của họ.</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {waitUnassigned.map(o=>(
              <div key={o.id} style={{background:"#fff",borderRadius:10,padding:"10px 12px",border:"1px solid var(--bd)",boxShadow:"var(--sh-sm)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontFamily:"ui-monospace,monospace",fontSize:12,fontWeight:800,color:"var(--or)"}}>{o.id}</span>
                    <span style={{fontSize:12,fontWeight:700,color:"var(--text)"}}>{o.cus}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:800,color:"var(--or)"}}>+{fmt(o.dFee||0)}</span>
                </div>
                <div style={{fontSize:11.5,color:"var(--text2)",marginBottom:9,display:"flex",alignItems:"center",gap:4}}>
                  <i className="ti ti-map-pin" style={{fontSize:13,color:"var(--or)"}}/>{o.adr||"—"}
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:10.5,color:"var(--mut)",fontWeight:700,alignSelf:"center",marginRight:4}}>Gán:</span>
                  {/* v1.6: Suggest shipper rảnh nhất (load ít nhất). Load = số đơn active */}
                  {(() => {
                    const loads = shippers.map(sh=>({sh, load: orders.filter(x=>x.sid===sh.id&&["san_sang","da_lay","dang_giao"].includes(x.st)).length}));
                    const minLoad = loads.length ? Math.min(...loads.map(l=>l.load)) : 0;
                    return loads.map(({sh,load})=>{
                      const busy = load>0;
                      const suggested = !busy || (loads.length>0 && load===minLoad);
                      return (
                        <button key={sh.id} onClick={()=>assign(o.id,sh.id)} title={`${load} đơn đang giao${suggested?" · gợi ý":""}`}
                          style={{display:"flex",alignItems:"center",gap:5,padding:"6px 10px",background:busy?"#FEF3C7":"#DCFCE7",border:`${suggested?"2px":"1.5px"} solid ${busy?"#F59E0B":"#22C55E"}`,borderRadius:"var(--r-pill)",cursor:"pointer",fontSize:11.5,fontWeight:700,color:busy?"#92400E":"#15803D",position:"relative"}}>
                          {suggested && load===minLoad && load===0 && <span style={{position:"absolute",top:-7,right:-3,fontSize:11}}>⭐</span>}
                          <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",color:busy?"#92400E":"#15803D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{inits(sh.name)}</div>
                          {sh.name.split(" ").slice(-1)[0]}
                          {busy && <span style={{fontSize:9}}>🛵{load}</span>}
                        </button>
                      );
                    });
                  })()}
                  {shippers.length===0&&<span style={{fontSize:10.5,color:"var(--err)",fontStyle:"italic"}}>Không có shipper trong ca — kiểm tra Lịch ca</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="card" style={{padding:14,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:10,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <i className="ti ti-users" style={{color:"var(--or)"}}/>
          <span>Trạng thái Shipper ca này</span>
          <span style={{fontSize:10,color:"#999",fontWeight:400,marginLeft:"auto"}}>Click 1 shipper rồi phân vào đơn bên dưới</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
          {shippers.map(s=>{
            const act=orders.filter(o=>o.sid===s.id&&["da_lay","dang_giao"].includes(o.st));
            const dn =orders.filter(o=>o.sid===s.id&&o.st==="hoan_thanh");
            const isBusy = act.length>0;
            return (
              <div key={s.id} style={{border:`1.5px solid ${isBusy?"#fdba74":"#bbf7d0"}`,borderRadius:9,padding:"11px 12px",display:"flex",alignItems:"center",gap:10,background:isBusy?"#fffbeb":"#f0fdf4"}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:"#fff",color:isBusy?"#c2410c":"#16A34A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,border:"1px solid #f0f0f0"}}>{inits(s.name)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#212121",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div>
                  <div style={{fontSize:10,color:isBusy?"#c2410c":"#16A34A",fontWeight:600}}>{isBusy?`🛵 ${act.length} đơn đang giao`:"● Sẵn sàng"}</div>
                  <div style={{fontSize:10,color:"#999"}}>✓ {dn.length} đơn xong</div>
                </div>
              </div>
            );
          })}
          {shippers.length===0&&<div style={{color:"#999",fontSize:12,padding:"14px"}}>Chưa có shipper nào đang trực trong ca</div>}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}}>
        {[
          {key:"san_sang",  title:"Chờ phân công", items:wait,    color:"#5b21b6"},
          {key:"da_lay",    title:"Đã lấy hàng",   items:picked,  color:"#854d0e"},
          {key:"dang_giao", title:"Đang giao",      items:onroute, color:"#c2410c"},
          {key:"hoan_thanh",title:"Hoàn thành",     items:finished,color:"#15803d"},
        ].map(col=>(
          <div key={col.key} className="card" style={{overflow:"hidden"}}>
            <div style={{padding:"10px 14px",borderBottom:"1px solid #f0f0f0",display:"flex",alignItems:"center",gap:8,background:col.color+"08"}}>
              <Bdg s={col.key}/><span style={{fontSize:11,color:"#767676"}}>{col.items.length} đơn</span>
            </div>
            <div style={{padding:10,display:"flex",flexDirection:"column",gap:8,maxHeight:480,overflowY:"auto"}}>
              {col.items.map(o=>{
                let actions = null;
                if (col.key==="san_sang") {
                  actions = (
                    <>
                      <div style={{fontSize:10,color:"#767676",marginBottom:5,fontWeight:600}}>{canAssign?"Phân công shipper:":"Cần Trưởng ca phân công"}</div>
                      {canAssign && (
                        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                          {shippers.map(sh=>{
                            const busy=orders.some(x=>x.sid===sh.id&&["da_lay","dang_giao"].includes(x.st));
                            const isCur = o.sid===sh.id;
                            return (
                              <button key={sh.id} onClick={()=>assign(o.id,sh.id)}
                                style={{fontSize:11,padding:"5px 9px",background:isCur?"var(--or)":(busy?"#fff5f5":"#fff"),border:`1px solid ${isCur?"var(--or)":(busy?"#fca5a5":"var(--bd)")}`,borderRadius:5,color:isCur?"#fff":(busy?"#dc2626":"#475569"),cursor:"pointer",fontWeight:600}}>
                                {sh.name.split(" ").slice(-1)[0]}{busy?" 🔴":""}
                              </button>
                            );
                          })}
                          {shippers.length===0&&<span style={{fontSize:10,color:"#999"}}>Không có shipper</span>}
                        </div>
                      )}
                    </>
                  );
                } else if (col.key==="dang_giao" || col.key==="da_lay") {
                  actions = (
                    <>
                      {canAssign && shippers.length>1 && (
                        <div style={{marginBottom:6,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,color:"var(--mut)",fontWeight:700}}>Đổi shipper:</span>
                          {shippers.filter(sh=>sh.id!==o.sid).map(sh=>{
                            const busy=orders.some(x=>x.sid===sh.id&&["da_lay","dang_giao"].includes(x.st));
                            return (
                              <button key={sh.id} onClick={()=>{
                                if(!confirm(`Chuyển đơn ${o.id} từ ${staff.find(s=>s.id===o.sid)?.name||"hiện tại"} sang ${sh.name}?`)) return;
                                assign(o.id,sh.id);
                              }}
                                style={{fontSize:10,padding:"3px 7px",background:busy?"#FFF7ED":"#F0FDF4",border:`1px solid ${busy?"#FB923C":"#22C55E"}40`,borderRadius:4,color:busy?"#9A3412":"#15803D",cursor:"pointer",fontWeight:600}}>
                                ↻ {sh.name.split(" ").slice(-1)[0]}{busy?" 🔴":""}
                              </button>
                            );
                          })}
                        </div>
                      )}
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>setReturnFor(o)} style={{flex:1,fontSize:10.5,padding:"7px",background:"#FCE7F3",border:"none",borderRadius:"var(--r-sm)",color:"#9D174D",cursor:"pointer",fontWeight:700}}>↩ Hoàn hàng</button>
                        <button onClick={()=>complete(o.id)} style={{flex:2,fontSize:10.5,padding:"7px",background:"linear-gradient(135deg,#22C55E,#15803D)",border:"none",borderRadius:"var(--r-sm)",color:"#fff",cursor:"pointer",fontWeight:700,boxShadow:"var(--sh-sm)"}}>✓ Đã giao</button>
                      </div>
                    </>
                  );
                }
                return <ShipperOrderCard key={o.id} o={o} staff={staff} actions={actions}/>;
              })}
              {col.items.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:"#999",fontSize:11}}>Trống</div>}
            </div>
          </div>
        ))}
      </div>

      {returned.length>0&&(
        <div className="card" style={{padding:14,marginTop:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"#9d174d",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
            <Bdg s="hoan_hang"/><span>Đơn hoàn hàng ({returned.length})</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
            {returned.map(o=>(
              <div key={o.id} style={{border:"1px solid #fce7f3",borderRadius:6,padding:"8px 10px",background:"#fff"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:"#9d174d"}}>{o.id}</span>
                  <span style={{fontSize:10,color:"#767676"}}>{o.t}</span>
                </div>
                <div style={{fontSize:11,color:"#212121",fontWeight:600,marginBottom:2}}>{o.cus}</div>
                <div style={{fontSize:10,color:"#9d174d",lineHeight:1.4,background:"#fce7f3",padding:"4px 6px",borderRadius:4,marginTop:4}}>↩️ {o.returnReason||"(Không ghi lý do)"}</div>
                <div style={{fontSize:9,color:"#999",marginTop:3}}>Shipper: {staff.find(x=>x.id===o.sid)?.name||"—"}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {returnFor&&<ReturnReasonModal order={returnFor} onClose={()=>setReturnFor(null)} onConfirm={r=>doReturn(returnFor.id,r)}/>}
    </div>
  );
}

              const [tc,bg]=RC[s.role]||["#475569","#f5f5f5"];

                      <span style={{color:"#212121",fontWeight:700}}>{s.name}</span>

                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:s.active?"#22c55e":"#cbd5e1"}}/>

                    </div>
                  </td>
                  <td style={{padding:"9px 8px"}}><span style={{fontSize:14,fontWeight:800,color:k.cnt>0?"var(--or)":"#999"}}>{k.cnt} đơn</span></td>
                  <td style={{padding:"9px 8px"}}><span style={{fontSize:12,fontWeight:700,color:k.rev>0?"#15803d":"#999"}}>{k.rev>0?fmt(k.rev):"—"}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
      </div>

      <div className="card" style={{padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:10}}>🏆 Bảng xếp hạng KPI</div>
        {[...staff].filter(s=>s.active).sort((a,b)=>kpi(b.id).rev-kpi(a.id).rev).map((s,i)=>{
          const [tc,bg]=RC[s.role]||["#475569","#f5f5f5"];
          const k=kpi(s.id);
          const medal=["🥇","🥈","🥉"][i]||`#${i+1}`;
          return (
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #f8f8f8"}}>
              <span style={{fontSize:i<3?20:13,minWidth:28,textAlign:"center"}}>{medal}</span>
              <div style={{width:30,height:30,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:tc,fontWeight:800}}>{inits(s.name)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,color:"#212121",fontWeight:700}}>{s.name}</div>
                <div style={{fontSize:10,color:"#767676"}}>{RL[s.role]}</div>
              </div>
              <span style={{fontSize:11,color:"#767676"}}>{k.cnt} đơn</span>
              <span style={{fontSize:13,fontWeight:800,color:k.rev>0?"#15803d":"#999",minWidth:100,textAlign:"right"}}>{k.rev>0?fmt(k.rev):"—"}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ReportScreen({orders,staff,products,shift,toast}){
  const done    = orders.filter(o=>o.st==="hoan_thanh");
  const rev     = done.reduce((s,o)=>s+iTot(o),0);
  const cashRev = done.filter(o=>o.pay==="cash").reduce((s,o)=>s+iTot(o),0);
  const qrRev   = done.filter(o=>o.pay==="qr").reduce((s,o)=>s+iTot(o),0);
  const shipRev = done.filter(o=>o.type==="ship").reduce((s,o)=>s+o.dFee,0);
  const discTot = done.reduce((s,o)=>s+o.disc,0);

  const topProds=products.map(p=>{
    const qty=done.reduce((s,o)=>s+o.items.filter(i=>i.pid===p.id).reduce((s2,i)=>s2+i.qty,0),0);
    return {name:p.name,emoji:p.emoji,qty,rev:qty*p.price};
  }).filter(p=>p.qty>0).sort((a,b)=>b.rev-a.rev);

  const exportCSV=()=>{
    const rows=[["Mã đơn","Khách","SĐT","Giờ","Loại","Địa chỉ","Sản phẩm","Tổng tiền","Thanh toán","Trạng thái","Người tạo","Người KPI"]];
    orders.forEach(o=>rows.push([
      o.id, o.cus, o.ph||"", o.t, o.type, o.adr,
      o.items.map(i=>`${i.name}x${i.qty}`).join(";"),
      iTot(o), o.pay, ST[o.st]?.label||"",
      staff.find(s=>s.id===o.by)?.name||"—",
      staff.find(s=>s.id===o.kpi)?.name||"—",
    ]));
    const csv="﻿"+rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"})),download:`BaoCao_${todayS().replace(/\//g,"-")}.csv`});
    a.click(); URL.revokeObjectURL(a.href);
    toast("✅ Xuất báo cáo CSV thành công","success");
  };

  const cards=[
    {l:"Tổng đơn",v:orders.length,sub:`${done.length} hoàn thành`,c:"#1e40af",bg:"#dbeafe"},
    {l:"Doanh thu",v:fmt(rev),sub:`+ Ship ${fmt(shipRev)}`,c:"#15803d",bg:"#dcfce7"},
    {l:"Tiền mặt",v:fmt(cashRev),sub:`${done.filter(o=>o.pay==="cash").length} đơn`,c:"#5b21b6",bg:"#ede9fe"},
    {l:"VietQR",v:fmt(qrRev),sub:`${done.filter(o=>o.pay==="qr").length} đơn`,c:"#0f766e",bg:"#ccfbf1"},
    {l:"Đã giảm giá",v:fmt(discTot),sub:`${orders.filter(o=>o.disc>0).length} đơn KM`,c:"#EE4D2D",bg:"#FFF4F0"},
  ];

  return (
    <div style={{flex:1,overflowY:"auto",padding:16,background:"var(--bg)"}}>
      <div className="card" style={{padding:16,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:"#212121"}}>Báo cáo {shift.name} — {todayS()}</div>
            <div style={{fontSize:11,color:"#767676"}}>{shift.start} – Hiện tại · Trưởng ca: {staff.find(s=>s.role==="truong_ca"&&s.active)?.name||"—"}</div>
          </div>
          <button onClick={exportCSV} className="btn-pri" style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",borderRadius:8,fontSize:12}}>
            <i className="ti ti-download"/>Xuất CSV
          </button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
          {cards.map(s=>(
            <div key={s.l} style={{background:s.bg,borderRadius:8,padding:"12px 14px"}}>
              <div style={{fontSize:10,color:s.c,opacity:.75,marginBottom:3,fontWeight:700}}>{s.l}</div>
              <div style={{fontSize:15,fontWeight:800,color:s.c,marginBottom:2}}>{s.v}</div>
              <div style={{fontSize:10,color:s.c,opacity:.65}}>{s.sub}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div className="card" style={{padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:10}}>🔥 Sản phẩm bán chạy</div>
          {topProds.length===0&&<div style={{color:"#999",fontSize:12,textAlign:"center",padding:"24px 0"}}>Chưa có đơn hoàn thành</div>}
          {topProds.map(({name,emoji,qty,rev},i)=>(
            <div key={name} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
              <span style={{width:22,height:22,borderRadius:4,background:i<3?"#FFF4F0":"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:i<3?"var(--or)":"#767676",fontWeight:800}}>{i+1}</span>
              <span style={{fontSize:14}}>{emoji}</span>
              <span style={{flex:1,fontSize:11.5,color:"#212121",fontWeight:600}}>{name}</span>
              <span style={{fontSize:11,color:"#767676",minWidth:24,textAlign:"right"}}>×{qty}</span>
              <span style={{fontSize:11,fontWeight:700,color:"#212121",minWidth:75,textAlign:"right"}}>{fmt(rev)}</span>
            </div>
          ))}
        </div>

        <div className="card" style={{padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:10}}>📋 Log hoạt động</div>
          <div style={{maxHeight:300,overflowY:"auto"}}>
            {[...orders].reverse().slice(0,15).map((o,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"6px 0",borderBottom:"1px solid #f8f8f8"}}>
                <span style={{fontSize:10,color:"#999",minWidth:36,flexShrink:0}}>{o.t}</span>
                <div style={{width:7,height:7,borderRadius:"50%",marginTop:5,flexShrink:0,
                  background:o.st==="hoan_thanh"?"#22c55e":o.st==="huy"?"#ef4444":o.st==="moi"?"var(--or)":"#60a5fa"}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#212121",fontWeight:500,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                    <span>Đơn {o.id}</span><Bdg s={o.st}/>
                  </div>
                  <div style={{fontSize:10,color:"#999",marginTop:2}}>
                    Tạo: {staff.find(s=>s.id===o.by)?.name||"—"} → KPI: {staff.find(s=>s.id===o.kpi)?.name||"—"} · {o.cus}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
