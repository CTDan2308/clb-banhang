function ShiftSettings({shifts,setShifts,shiftAssignments,upsertAssignment,deleteAssignment,staff,toast}){
  const [addShift,setAddShift] = useState(false);
  const [sf,setSf] = useState({name:"",start_at:"",end_at:""});
  const [pickerFor,setPickerFor] = useState(null);   // {shift_id}
  const [view,setView] = useState("role");            // role | calendar | matrix
  const [roleAddFor,setRoleAddFor] = useState(null);  // {shift_id, role} cho role-view

  const submitShift = () => {
    if (!sf.name.trim()) { toast("Nhập tên ca","warn"); return; }
    if (!/^\d{2}:\d{2}$/.test(sf.start_at) || !/^\d{2}:\d{2}$/.test(sf.end_at)) { toast("Giờ phải dạng HH:MM","warn"); return; }
    const id = Math.max(0,...shifts.map(s=>s.id||0))+1;
    const sort = shifts.length;
    setShifts(prev=>[...prev,{id,name:sf.name.trim(),start_at:sf.start_at,end_at:sf.end_at,sort}]);
    setSf({name:"",start_at:"",end_at:""}); setAddShift(false);
    toast("Đã thêm ca","success");
  };
  const removeShift = sh => {
    if (!confirm(`Xoá ca "${sh.name}"? Sẽ xoá luôn phân công của ca này.`)) return;
    setShifts(prev=>prev.filter(x=>x.id!==sh.id));
    toast(`Đã xoá ca ${sh.name}`,"info");
  };
  const updateShift = (sh,k,v) => setShifts(prev=>prev.map(x=>x.id===sh.id?{...x,[k]:v}:x));

  const getRole = (shift_id, staff_id) => {
    const a = shiftAssignments.find(x=>x.shift_id===shift_id && x.staff_id===staff_id);
    return a ? a.role : "off";
  };
  const assignmentsOf = shift_id => shiftAssignments.filter(a=>a.shift_id===shift_id && a.role!=="off");

  const ROLE_OPTS = [
    {v:"off",       l:"😴 Nghỉ",         c:"#999",       bg:"#fafafa"},
    {v:"truong_ca", l:"Trưởng ca",       c:"#1D4ED8",    bg:"#EFF6FF"},
    {v:"truc_don",  l:"Trực đơn",        c:"#EE4D2D",    bg:"#FFF4F0"},
    {v:"pha_che",   l:"Pha chế",         c:"#D97706",    bg:"#FFFBEB"},
    {v:"shipper",   l:"Shipper",         c:"#16A34A",    bg:"#F0FDF4"},
    {v:"admin",     l:"Admin",           c:"#7C3AED",    bg:"#F5F3FF"},
  ];
  const ROLE_NON_OFF = ROLE_OPTS.filter(o=>o.v!=="off");
  const optByVal = v => ROLE_OPTS.find(o=>o.v===v) || ROLE_OPTS[0];

  const sortedShifts = [...shifts].sort((a,b)=>(a.sort||0)-(b.sort||0));

  return (
    <>
      <div style={{background:"#FFF4F0",border:"1px solid #FFD4C2",borderRadius:8,padding:"11px 14px",marginBottom:14,fontSize:11.5,color:"#92400e",lineHeight:1.55,display:"flex",gap:8}}>
        <i className="ti ti-info-circle" style={{fontSize:16,color:"var(--or)",flexShrink:0,marginTop:1}}/>
        <span><b>Lịch ca:</b> Chia ngày thành nhiều ca, mỗi nhân sự có thể có role khác nhau theo từng ca. Hệ thống tự đổi vai trò khi đến giờ ca mới. Chọn <b>Nghỉ</b> nếu thành viên không làm ca đó.</span>
      </div>

      {/* Danh sách ca */}
      <div className="card" style={{padding:14,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:13,fontWeight:700,color:"#212121"}}>Danh sách ca ({shifts.length})</div>
          {!addShift&&<button onClick={()=>setAddShift(true)} className="btn-pri"
            style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:6,fontSize:12}}>
            <i className="ti ti-plus" style={{fontSize:14}}/>Thêm ca
          </button>}
        </div>

        {addShift&&(
          <div style={{background:"#fafafa",border:"1px solid #f0f0f0",borderRadius:8,padding:14,marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#212121",marginBottom:10}}>Thêm ca mới</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 120px 120px auto",gap:8,alignItems:"end"}}>
              <div>
                <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Tên ca</div>
                <input value={sf.name} onChange={e=>setSf(f=>({...f,name:e.target.value}))} placeholder="Ca tối"
                  style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Bắt đầu</div>
                <input type="time" value={sf.start_at} onChange={e=>setSf(f=>({...f,start_at:e.target.value}))}
                  style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Kết thúc</div>
                <input type="time" value={sf.end_at} onChange={e=>setSf(f=>({...f,end_at:e.target.value}))}
                  style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={submitShift} className="btn-pri" style={{padding:"8px 14px",borderRadius:6,fontSize:12}}>Thêm</button>
                <button onClick={()=>setAddShift(false)}
                  style={{padding:"8px 14px",border:"1px solid var(--bd)",background:"#fff",borderRadius:6,cursor:"pointer",fontSize:12,color:"#475569"}}>Huỷ</button>
              </div>
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {[...shifts].sort((a,b)=>(a.sort||0)-(b.sort||0)).map(sh=>(
            <div key={sh.id} style={{border:"1px solid var(--bd)",borderRadius:8,padding:"10px 12px",minWidth:180,display:"flex",flexDirection:"column",gap:6}}>
              <input value={sh.name} onChange={e=>updateShift(sh,"name",e.target.value)}
                style={{fontSize:13,fontWeight:700,color:"#212121",border:"none",background:"transparent",padding:0,outline:"none"}}/>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <input type="time" value={sh.start_at} onChange={e=>updateShift(sh,"start_at",e.target.value)}
                  style={{flex:1,padding:"5px 8px",border:"1px solid var(--bd)",borderRadius:5,fontSize:11}}/>
                <span style={{color:"#999",fontSize:10}}>→</span>
                <input type="time" value={sh.end_at} onChange={e=>updateShift(sh,"end_at",e.target.value)}
                  style={{flex:1,padding:"5px 8px",border:"1px solid var(--bd)",borderRadius:5,fontSize:11}}/>
              </div>
              <button onClick={()=>removeShift(sh)}
                style={{fontSize:10,padding:"4px 0",border:"1px solid #fca5a5",borderRadius:5,background:"#fff",cursor:"pointer",color:"#b91c1c",fontWeight:600}}>Xoá ca</button>
            </div>
          ))}
        </div>
      </div>

      {/* Toggle view */}
      <div className="card" style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:13,fontWeight:700,color:"#212121"}}>📅 Lịch chia ca trong ngày</div>
          <div style={{display:"flex",gap:4,background:"#f5f5f5",borderRadius:6,padding:3}}>
            <button onClick={()=>setView("role")}
              style={{fontSize:11,padding:"6px 12px",border:"none",borderRadius:5,cursor:"pointer",background:view==="role"?"#fff":"transparent",color:view==="role"?"var(--or)":"#767676",fontWeight:700,boxShadow:view==="role"?"0 1px 3px rgba(0,0,0,.08)":"none"}}>👥 Theo vai trò</button>
            <button onClick={()=>setView("calendar")}
              style={{fontSize:11,padding:"6px 12px",border:"none",borderRadius:5,cursor:"pointer",background:view==="calendar"?"#fff":"transparent",color:view==="calendar"?"var(--or)":"#767676",fontWeight:700,boxShadow:view==="calendar"?"0 1px 3px rgba(0,0,0,.08)":"none"}}>📅 Calendar</button>
            <button onClick={()=>setView("matrix")}
              style={{fontSize:11,padding:"6px 12px",border:"none",borderRadius:5,cursor:"pointer",background:view==="matrix"?"#fff":"transparent",color:view==="matrix"?"var(--or)":"#767676",fontWeight:700,boxShadow:view==="matrix"?"0 1px 3px rgba(0,0,0,.08)":"none"}}>📊 Ma trận</button>
          </div>
        </div>

        {/* ROLE-FIRST VIEW — mỗi ca chia thành buckets theo role */}
        {view==="role"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
            {sortedShifts.map((sh,shIdx)=>{
              const assigns = assignmentsOf(sh.id);
              const activeAssigns = assigns.filter(a=>a.role!=="off");
              const prevSh = shIdx>0 ? sortedShifts[shIdx-1] : null;
              const copyFromPrev = () => {
                if (!prevSh) return;
                if (!confirm(`Sao chép tất cả phân công từ ${prevSh.name} → ${sh.name}? Ghi đè ca hiện tại.`)) return;
                const prevA = shiftAssignments.filter(a=>a.shift_id===prevSh.id && a.role!=="off");
                const curA = shiftAssignments.filter(a=>a.shift_id===sh.id);
                Promise.all([
                  ...curA.map(a=>deleteAssignment(sh.id, a.staff_id)),
                  ...prevA.map(a=>upsertAssignment(sh.id, a.staff_id, a.role))
                ]).then(()=>toast(`✓ Đã sao chép ${prevA.length} phân công`, "success"));
              };
              const clearAll = () => {
                if (activeAssigns.length===0) return;
                if (!confirm(`Xoá tất cả ${activeAssigns.length} phân công khỏi ${sh.name}?`)) return;
                Promise.all(activeAssigns.map(a=>deleteAssignment(sh.id, a.staff_id)))
                  .then(()=>toast("Đã xoá toàn bộ", "warn"));
              };
              return (
                <div key={sh.id} style={{border:"1.5px solid var(--bd)",borderRadius:12,background:"#fff",overflow:"hidden",boxShadow:"var(--sh-sm)"}}>
                  <div style={{padding:"11px 13px",background:"linear-gradient(135deg,#EE4D2D 0%,#FF8557 100%)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:800}}>{sh.name}</div>
                      <div style={{fontSize:10.5,opacity:.95,marginTop:1}}>{sh.start_at}–{sh.end_at}</div>
                    </div>
                    <span style={{fontSize:11,background:"rgba(0,0,0,.18)",padding:"3px 9px",borderRadius:"var(--r-pill)",fontWeight:700}}>{activeAssigns.length} người</span>
                  </div>

                  <div style={{padding:10,display:"flex",flexDirection:"column",gap:8}}>
                    {ROLE_NON_OFF.map(roleOpt=>{
                      const inThisRole = activeAssigns.filter(a=>a.role===roleOpt.v);
                      const isAdding = roleAddFor && roleAddFor.shift_id===sh.id && roleAddFor.role===roleOpt.v;
                      const availableStaff = staff.filter(s=>s.active && !assigns.find(a=>a.staff_id===s.id));
                      return (
                        <div key={roleOpt.v} style={{border:`1px solid ${roleOpt.c}33`,background:roleOpt.bg,borderRadius:8,padding:"7px 9px"}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:inThisRole.length>0?6:0}}>
                            <div style={{fontSize:11,fontWeight:800,color:roleOpt.c,letterSpacing:.3}}>
                              {roleOpt.l} <span style={{opacity:.6,fontWeight:600,marginLeft:3}}>({inThisRole.length})</span>
                            </div>
                            <button onClick={()=>setRoleAddFor(isAdding?null:{shift_id:sh.id,role:roleOpt.v})}
                              disabled={availableStaff.length===0 && !isAdding}
                              style={{fontSize:10,padding:"3px 9px",border:`1px solid ${roleOpt.c}55`,borderRadius:"var(--r-pill)",background:isAdding?roleOpt.c:"#fff",color:isAdding?"#fff":roleOpt.c,cursor:availableStaff.length===0&&!isAdding?"not-allowed":"pointer",fontWeight:700,opacity:availableStaff.length===0&&!isAdding?.4:1}}>
                              {isAdding?"✕ Đóng":"+ Thêm"}
                            </button>
                          </div>

                          {inThisRole.length>0 && (
                            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                              {inThisRole.map(a=>{
                                const s=staff.find(x=>x.id===a.staff_id);
                                if(!s) return null;
                                return (
                                  <button key={s.id} onClick={()=>{if(confirm(`Xoá ${s.name} khỏi ${roleOpt.l} của ${sh.name}?`)) upsertAssignment(sh.id,s.id,"off");}}
                                    title="Click để xoá khỏi ca"
                                    style={{display:"flex",alignItems:"center",gap:5,padding:"4px 9px 4px 4px",background:"#fff",border:`1px solid ${roleOpt.c}55`,borderRadius:"var(--r-pill)",cursor:"pointer",fontSize:11}}>
                                    <div style={{width:20,height:20,borderRadius:"50%",background:roleOpt.bg,color:roleOpt.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{inits(s.name)}</div>
                                    <span style={{color:"var(--text)",fontWeight:600}}>{s.name}</span>
                                  </button>
                                );
                              })}
                            </div>
                          )}

                          {isAdding && (
                            <div style={{marginTop:7,padding:7,background:"#fff",borderRadius:6,border:`1px dashed ${roleOpt.c}55`}}>
                              {availableStaff.length===0 ? (
                                <div style={{fontSize:10.5,color:"var(--mut)",textAlign:"center",padding:"4px 0"}}>Không còn ai để thêm</div>
                              ) : (
                                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                                  {availableStaff.map(s=>{
                                    const [tc,bg]=RC[s.role]||["#475569","#f5f5f5"];
                                    const isDefault = s.role===roleOpt.v;
                                    return (
                                      <button key={s.id} onClick={()=>{upsertAssignment(sh.id,s.id,roleOpt.v); setRoleAddFor(null);}}
                                        title={isDefault?"Role mặc định khớp":""}
                                        style={{display:"flex",alignItems:"center",gap:5,padding:"4px 9px 4px 4px",background:isDefault?roleOpt.bg:"#fff",border:`1px solid ${isDefault?roleOpt.c:"var(--bd)"}`,borderRadius:"var(--r-pill)",cursor:"pointer",fontSize:11}}>
                                        <div style={{width:20,height:20,borderRadius:"50%",background:bg,color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{inits(s.name)}</div>
                                        <span style={{color:"var(--text)",fontWeight:600}}>{s.name}</span>
                                        {isDefault && <span style={{fontSize:9,color:roleOpt.c}}>★</span>}
                                      </button>
                                    );
                                  })}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  <div style={{padding:"8px 10px",borderTop:"1px solid var(--bd2)",background:"#FAFAFA",display:"flex",gap:6}}>
                    {prevSh && (
                      <button onClick={copyFromPrev} title={`Sao chép từ ${prevSh.name}`}
                        style={{flex:1,fontSize:10.5,padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:6,background:"#fff",color:"var(--or)",cursor:"pointer",fontWeight:700}}>
                        📋 Copy từ {prevSh.name}
                      </button>
                    )}
                    {activeAssigns.length>0 && (
                      <button onClick={clearAll}
                        style={{flex:prevSh?0:1,fontSize:10.5,padding:"6px 11px",border:"1px solid #FCA5A5",borderRadius:6,background:"#fff",color:"var(--err)",cursor:"pointer",fontWeight:700}}>
                        🗑 Xoá hết
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
            {sortedShifts.length===0 && (
              <div style={{gridColumn:"1/-1",padding:24,textAlign:"center",color:"var(--mut)",fontSize:12}}>Chưa có ca nào. Bấm "+ Thêm ca" ở đầu trang.</div>
            )}
          </div>
        )}

        {/* CALENDAR VIEW — mỗi card là 1 ca */}
        {view==="calendar"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
            {sortedShifts.map(sh=>{
              const assigns = assignmentsOf(sh.id);
              const unassigned = staff.filter(s=>s.active && !assigns.find(a=>a.staff_id===s.id));
              const isPickerHere = pickerFor===sh.id;
              return (
                <div key={sh.id} style={{border:"1.5px solid var(--bd)",borderRadius:10,padding:0,overflow:"hidden",background:"#fff",display:"flex",flexDirection:"column"}}>
                  <div style={{padding:"10px 12px",background:"linear-gradient(135deg,#EE4D2D 0%,#FF8557 100%)",color:"#fff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <input value={sh.name} onChange={e=>updateShift(sh,"name",e.target.value)}
                        style={{fontSize:14,fontWeight:800,background:"transparent",border:"none",color:"#fff",padding:0,outline:"none",width:"60%"}}/>
                      <button onClick={()=>removeShift(sh)} title="Xoá ca"
                        style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:4,color:"#fff",cursor:"pointer",fontSize:11,padding:"3px 7px"}}>✕</button>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5,fontSize:11,opacity:.95}}>
                      <input type="time" value={sh.start_at} onChange={e=>updateShift(sh,"start_at",e.target.value)}
                        style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:4,padding:"2px 6px",color:"#fff",fontSize:11,colorScheme:"dark"}}/>
                      <span>→</span>
                      <input type="time" value={sh.end_at} onChange={e=>updateShift(sh,"end_at",e.target.value)}
                        style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:4,padding:"2px 6px",color:"#fff",fontSize:11,colorScheme:"dark"}}/>
                      <span style={{marginLeft:"auto",fontSize:10,background:"rgba(0,0,0,.2)",padding:"2px 7px",borderRadius:10}}>{assigns.length} người</span>
                    </div>
                  </div>

                  <div style={{padding:10,display:"flex",flexDirection:"column",gap:6,minHeight:60}}>
                    {assigns.length===0&&(
                      <div style={{padding:"14px 0",textAlign:"center",color:"#bbb",fontSize:11}}>Chưa phân ai vào ca này</div>
                    )}
                    {assigns.map(a=>{
                      const s = staff.find(x=>x.id===a.staff_id);
                      if (!s) return null;
                      const opt = optByVal(a.role);
                      return (
                        <div key={a.staff_id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",border:"1px solid #f0f0f0",borderRadius:6,background:"#fafafa"}}>
                          <div style={{width:26,height:26,borderRadius:"50%",background:opt.bg,color:opt.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9.5,fontWeight:800,flexShrink:0}}>{inits(s.name)}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:11.5,fontWeight:600,color:"#212121",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div>
                          </div>
                          <select value={a.role} onChange={e=>upsertAssignment(sh.id,s.id,e.target.value)}
                            style={{fontSize:10,padding:"3px 6px",border:`1px solid ${opt.c}40`,borderRadius:4,background:opt.bg,color:opt.c,fontWeight:700,cursor:"pointer"}}>
                            {ROLE_NON_OFF.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                          </select>
                          <button onClick={()=>upsertAssignment(sh.id,s.id,"off")} title="Bỏ khỏi ca"
                            style={{background:"none",border:"none",color:"#999",cursor:"pointer",fontSize:14,padding:0}}>✕</button>
                        </div>
                      );
                    })}
                  </div>

                  <div style={{padding:"6px 10px 10px",borderTop:"1px dashed #f0f0f0"}}>
                    {!isPickerHere ? (
                      <button onClick={()=>setPickerFor(sh.id)} disabled={unassigned.length===0}
                        style={{width:"100%",padding:"7px",border:"1px dashed var(--bd)",borderRadius:6,background:"#fff",cursor:unassigned.length===0?"not-allowed":"pointer",color:unassigned.length===0?"#ccc":"var(--or)",fontSize:11,fontWeight:700}}>
                        {unassigned.length===0?"Đã phân hết nhân sự":"+ Thêm nhân sự vào ca"}
                      </button>
                    ) : (
                      <div style={{background:"#FFF4F0",border:"1px solid #FFD4C2",borderRadius:6,padding:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <div style={{fontSize:10,color:"#767676",fontWeight:700}}>Chọn nhân sự & role:</div>
                          <button onClick={()=>setPickerFor(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:14}}>✕</button>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:200,overflowY:"auto"}}>
                          {unassigned.map(s=>{
                            const [tc,bg]=RC[s.role]||["#475569","#f5f5f5"];
                            return (
                              <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 6px",background:"#fff",borderRadius:5}}>
                                <div style={{width:24,height:24,borderRadius:"50%",background:bg,color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,flexShrink:0}}>{inits(s.name)}</div>
                                <span style={{flex:1,fontSize:11,color:"#212121",fontWeight:600,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</span>
                                <select onChange={e=>{if(e.target.value){upsertAssignment(sh.id,s.id,e.target.value);setPickerFor(null);}}}
                                  defaultValue=""
                                  style={{fontSize:10,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,cursor:"pointer"}}>
                                  <option value="" disabled>Chọn role…</option>
                                  {ROLE_NON_OFF.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                                </select>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* MATRIX VIEW — bảng nhân sự × ca */}
        {view==="matrix"&&(
          <>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11.5,minWidth:600}}>
              <thead>
                <tr>
                  <th style={{padding:"8px",textAlign:"left",fontSize:10,color:"#999",fontWeight:700,borderBottom:"1px solid #f0f0f0",letterSpacing:".3px",position:"sticky",left:0,background:"#fff",zIndex:1,minWidth:140}}>Nhân sự</th>
                  {sortedShifts.map((sh,idx)=>{
                    const prevSh = idx>0 ? sortedShifts[idx-1] : null;
                    const copyFromPrev = () => {
                      if (!prevSh) return;
                      if (!confirm(`Sao chép tất cả phân công từ ${prevSh.name} → ${sh.name}? Sẽ ghi đè ca hiện tại.`)) return;
                      const prevAssigns = shiftAssignments.filter(a=>a.shift_id===prevSh.id && a.role!=="off");
                      // Xoá ca đích trước
                      const curAssigns = shiftAssignments.filter(a=>a.shift_id===sh.id);
                      Promise.all([
                        ...curAssigns.map(a=>deleteAssignment(sh.id, a.staff_id)),
                        ...prevAssigns.map(a=>upsertAssignment(sh.id, a.staff_id, a.role))
                      ]).then(()=>toast(`✓ Đã sao chép ${prevAssigns.length} phân công`, "success"));
                    };
                    return (
                      <th key={sh.id} style={{padding:"8px",textAlign:"center",fontSize:10,color:"#999",fontWeight:700,borderBottom:"1px solid #f0f0f0",minWidth:130}}>
                        <div>{sh.name}</div>
                        <div style={{fontWeight:400,color:"#ccc",marginBottom:3}}>{sh.start_at}–{sh.end_at}</div>
                        {prevSh && (
                          <button onClick={copyFromPrev} title={`Sao chép từ ${prevSh.name}`}
                            style={{fontSize:9,padding:"2px 7px",border:"1px solid var(--bd)",borderRadius:"var(--r-pill)",background:"#fff",color:"var(--or)",cursor:"pointer",fontWeight:700}}>
                            📋 Copy ←
                          </button>
                        )}
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {staff.filter(s=>s.active).map(s=>{
                  const [tc,bg]=RC[s.role]||["#475569","#f5f5f5"];
                  return (
                    <tr key={s.id} style={{borderBottom:"1px solid #f8f8f8"}}>
                      <td style={{padding:"9px 8px",position:"sticky",left:0,background:"#fff",zIndex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:28,height:28,borderRadius:"50%",background:bg,color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{inits(s.name)}</div>
                          <div>
                            <div style={{fontSize:12,fontWeight:700,color:"#212121"}}>{s.name}</div>
                            <div style={{fontSize:9.5,color:tc,fontWeight:600}}>Mặc định: {RL[s.role]}</div>
                          </div>
                        </div>
                      </td>
                      {sortedShifts.map(sh=>{
                        const role = getRole(sh.id, s.id);
                        const opt = optByVal(role);
                        // v1.5: click cycle qua các role
                        const cycle = () => {
                          const idx = ROLE_OPTS.findIndex(o=>o.v===role);
                          const next = ROLE_OPTS[(idx+1)%ROLE_OPTS.length].v;
                          upsertAssignment(sh.id, s.id, next);
                        };
                        return (
                          <td key={sh.id} style={{padding:"6px 4px",textAlign:"center"}}>
                            <button onClick={cycle} onContextMenu={e=>{e.preventDefault(); upsertAssignment(sh.id,s.id,"off");}}
                              title="Click: chuyển role tiếp · Chuột phải: đặt Nghỉ"
                              style={{fontSize:11,padding:"7px 9px",border:`1.5px solid ${opt.bg==="#fafafa"?"#e0e0e0":opt.c+"55"}`,borderRadius:6,background:opt.bg,color:opt.c,fontWeight:700,cursor:"pointer",minWidth:108,transition:"transform .1s"}}
                              onMouseDown={e=>e.currentTarget.style.transform="scale(0.96)"}
                              onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
                              onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                              {opt.l}
                            </button>
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
                {staff.filter(s=>s.active).length===0 && (
                  <tr><td colSpan={shifts.length+1} style={{padding:"20px",textAlign:"center",color:"#999",fontSize:12}}>Chưa có nhân sự đang hoạt động</td></tr>
                )}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:10,padding:"10px 12px",background:"linear-gradient(90deg,#FFF4F0,#FFF8F4)",borderRadius:8,fontSize:11,color:"#92400e",lineHeight:1.6,border:"1px solid #FCD34D"}}>
            ⚡ <b>Mẹo nhanh:</b> Click ô → cycle qua role tiếp theo · Chuột phải → đặt <b>Nghỉ</b> · Nút <b>📋 Copy ←</b> ở cột → sao chép toàn bộ phân công từ ca trước
          </div>
          </>
        )}

        <div style={{marginTop:12,padding:"10px 12px",background:"#fafafa",borderRadius:6,fontSize:10.5,color:"#767676",lineHeight:1.6}}>
          💡 Mỗi thay đổi tự lưu lên cloud. Khi đến giờ ca mới, role của user sẽ tự cập nhật trên mọi thiết bị. Bấm <b>Calendar</b> để xem dạng card, <b>Ma trận</b> để gán nhanh.
        </div>
      </div>
    </>
  );
}

function CategorySettings({categories,setCategories,products,toast}){
  const [adding,setAdding] = useState(false);
  const [form,setForm]     = useState({key:"",label:""});

  const submit = () => {
    const key = form.key.trim().toLowerCase().replace(/[^a-z0-9_]/g,"_");
    if (!key) { toast("Khoá danh mục không hợp lệ","warn"); return; }
    if (categories.find(c=>c.key===key)) { toast("Khoá đã tồn tại","warn"); return; }
    if (!form.label.trim()) { toast("Vui lòng nhập tên hiển thị","warn"); return; }
    const sort = Math.max(0,...categories.map(c=>c.sort||0))+1;
    setCategories(cs=>[...cs,{key,label:form.label.trim(),sort}]);
    setForm({key:"",label:""}); setAdding(false);
    toast("Đã thêm danh mục","success");
  };

  const removeCat = c => {
    const used = products.filter(p=>p.cat===c.key).length;
    if (used>0){ toast(`Không thể xoá: còn ${used} sản phẩm dùng danh mục này`,"warn"); return; }
    if (!confirm(`Xoá danh mục "${c.label}"?`)) return;
    setCategories(cs=>cs.filter(x=>x.key!==c.key));
    toast(`Đã xoá danh mục`,"info");
  };

  const updateLabel = (c,label) => setCategories(cs=>cs.map(x=>x.key===c.key?{...x,label}:x));

  const move = (i,dir) => {
    const j = i+dir;
    if (j<0||j>=categories.length) return;
    const arr = [...categories];
    [arr[i],arr[j]] = [arr[j],arr[i]];
    setCategories(arr.map((c,idx)=>({...c,sort:idx})));
  };

  return (
    <div className="card" style={{padding:14}}>
      <div style={{background:"#FFF4F0",border:"1px solid #FFD4C2",borderRadius:8,padding:"11px 14px",marginBottom:14,fontSize:11.5,color:"#92400e",lineHeight:1.55,display:"flex",gap:8}}>
        <i className="ti ti-info-circle" style={{fontSize:16,color:"var(--or)",flexShrink:0,marginTop:1}}/>
        <span>Danh mục dùng để phân nhóm sản phẩm trên màn Trực đơn. <b>Khoá</b> là mã định danh (vd: <code>do_lanh</code>) — không đổi được sau khi tạo. <b>Nhãn</b> là tên hiển thị, có thể sửa bất cứ lúc nào.</span>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"#212121"}}>Danh sách danh mục ({categories.length})</div>
        {!adding&&<button onClick={()=>setAdding(true)}
          className="btn-pri" style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:6,fontSize:12}}>
          <i className="ti ti-plus" style={{fontSize:14}}/>Thêm danh mục
        </button>}
      </div>

      {adding&&(
        <div style={{background:"#fafafa",border:"1px solid #f0f0f0",borderRadius:8,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#212121",marginBottom:10}}>Thêm danh mục mới</div>
          <div style={{display:"grid",gridTemplateColumns:"160px 1fr auto",gap:8,alignItems:"end"}}>
            <div>
              <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Khoá *</div>
              <input value={form.key} onChange={e=>setForm(f=>({...f,key:e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,"_")}))}
                placeholder="do_lanh" style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12,fontFamily:"monospace"}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Tên hiển thị *</div>
              <input value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))}
                placeholder="🥤 Đồ lạnh" style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={submit} className="btn-pri" style={{padding:"8px 14px",borderRadius:6,fontSize:12}}>Thêm</button>
              <button onClick={()=>{setAdding(false);setForm({key:"",label:""});}}
                style={{padding:"8px 14px",border:"1px solid var(--bd)",background:"#fff",borderRadius:6,cursor:"pointer",fontSize:12,color:"#475569"}}>Huỷ</button>
            </div>
          </div>
          <div style={{fontSize:10,color:"#999",marginTop:8}}>💡 Mẹo: Thêm emoji vào đầu nhãn để nhận diện nhanh trên menu.</div>
        </div>
      )}

      <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead>
          <tr>{["#","Khoá","Tên hiển thị","Số SP đang dùng","Thứ tự",""].map(h=>(
            <th key={h} style={{padding:"8px",textAlign:"left",fontSize:10,color:"#999",fontWeight:700,borderBottom:"1px solid #f0f0f0",letterSpacing:".3px"}}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>
          {categories.map((c,i)=>{
            const used = products.filter(p=>p.cat===c.key).length;
            return (
              <tr key={c.key} style={{borderBottom:"1px solid #f8f8f8"}}>
                <td style={{padding:"10px 8px",color:"#999",fontWeight:700}}>{i+1}</td>
                <td style={{padding:"10px 8px"}}>
                  <code style={{fontSize:11,background:"#fafafa",padding:"3px 8px",borderRadius:4,color:"#475569"}}>{c.key}</code>
                </td>
                <td style={{padding:"10px 8px"}}>
                  <input value={c.label} onChange={e=>updateLabel(c,e.target.value)}
                    style={{width:"100%",padding:"6px 10px",border:"1px solid transparent",borderRadius:5,fontSize:12,background:"transparent"}}
                    onFocus={e=>e.target.style.border="1px solid var(--bd)"}
                    onBlur={e=>e.target.style.border="1px solid transparent"}/>
                </td>
                <td style={{padding:"10px 8px",color:used>0?"var(--or)":"#999",fontWeight:600}}>{used} sản phẩm</td>
                <td style={{padding:"10px 8px"}}>
                  <div style={{display:"flex",gap:3}}>
                    <button onClick={()=>move(i,-1)} disabled={i===0}
                      style={{width:24,height:24,border:"1px solid var(--bd)",borderRadius:4,background:"#fff",cursor:i===0?"not-allowed":"pointer",color:i===0?"#ccc":"#475569",fontSize:11}}>↑</button>
                    <button onClick={()=>move(i,1)} disabled={i===categories.length-1}
                      style={{width:24,height:24,border:"1px solid var(--bd)",borderRadius:4,background:"#fff",cursor:i===categories.length-1?"not-allowed":"pointer",color:i===categories.length-1?"#ccc":"#475569",fontSize:11}}>↓</button>
                  </div>
                </td>
                <td style={{padding:"10px 8px"}}>
                  <button onClick={()=>removeCat(c)} disabled={used>0}
                    style={{fontSize:10,padding:"4px 9px",border:`1px solid ${used>0?"#f0f0f0":"#fca5a5"}`,borderRadius:5,background:used>0?"#fafafa":"#fff",cursor:used>0?"not-allowed":"pointer",color:used>0?"#ccc":"#b91c1c"}}>Xoá</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      </div>
    </div>
  );
}

function StaffSettings({staff,setStaff,currentUser,toast}){
  const [adding,setAdding] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState({name:"",role:"truc_don",pin:""});

  const submit=()=>{
    if(!form.name.trim()){toast("Vui lòng nhập họ tên","warn");return;}
    if(!/^\d{4}$/.test(form.pin)){toast("PIN phải là 4 chữ số","warn");return;}
    if(staff.some(s=>s.pin===form.pin&&s.id!==editing?.id)){toast("PIN trùng với người khác","warn");return;}
    if(editing){
      setStaff(ss=>ss.map(s=>s.id===editing.id?{...s,name:form.name.trim(),role:form.role,pin:form.pin}:s));
      toast("Đã cập nhật","success");
      setEditing(null);
    }else{
      const id=Math.max(0,...staff.map(s=>s.id))+1;
      setStaff(ss=>[...ss,{id,name:form.name.trim(),role:form.role,checkin:nowS(),active:true,pin:form.pin}]);
      toast("Đã thêm thành viên","success");
      setAdding(false);
    }
    setForm({name:"",role:"truc_don",pin:""});
  };

  const remove=s=>{
    if(s.id===currentUser.id){toast("Không thể xoá tài khoản đang đăng nhập","warn");return;}
    if(!confirm(`Xoá ${s.name}?`)) return;
    setStaff(ss=>ss.filter(x=>x.id!==s.id));
    toast(`Đã xoá ${s.name}`,"info");
  };

  const startEdit=s=>{
    setEditing(s); setAdding(false);
    setForm({name:s.name,role:s.role,pin:s.pin});
  };

  const toggleActive=s=>setStaff(ss=>ss.map(x=>x.id===s.id?{...x,active:!x.active}:x));

  return (
    <>
      <div style={{background:"#FFF4F0",border:"1px solid #FFD4C2",borderRadius:8,padding:"11px 14px",marginBottom:14,fontSize:11.5,color:"#92400e",lineHeight:1.55,display:"flex",gap:8}}>
        <i className="ti ti-info-circle" style={{fontSize:16,color:"var(--or)",flexShrink:0,marginTop:1}}/>
        <span><b>Khuyến nghị:</b> Mỗi thành viên có 1 PIN 4 số riêng để hệ thống ghi nhận chính xác KPI cá nhân và lịch sử thao tác.</span>
      </div>

      <div className="card" style={{padding:14,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"#212121"}}>Danh sách thành viên ({staff.length})</div>
          {!adding&&!editing&&<button onClick={()=>{setAdding(true);setForm({name:"",role:"truc_don",pin:""});}}
            className="btn-pri" style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:6,fontSize:12}}>
            <i className="ti ti-plus" style={{fontSize:14}}/>Thêm thành viên
          </button>}
        </div>

        {(adding||editing)&&(
          <div style={{background:"#fafafa",border:"1px solid #f0f0f0",borderRadius:8,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#212121",marginBottom:10}}>{editing?`Chỉnh sửa: ${editing.name}`:"Thêm thành viên mới"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 110px auto",gap:8,alignItems:"end"}}>
              <div>
                <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Họ tên</div>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nguyễn Văn A" style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Vai trò</div>
                <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}
                  style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12,background:"#fff",cursor:"pointer"}}>
                  {Object.entries(RL).map(([k,l])=><option key={k} value={k}>{l}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>PIN (4 số)</div>
                <input value={form.pin} maxLength={4} onChange={e=>setForm(f=>({...f,pin:e.target.value.replace(/\D/g,"")}))} placeholder="0000" style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12,fontFamily:"monospace",letterSpacing:"3px",textAlign:"center"}}/>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={submit} className="btn-pri" style={{padding:"8px 14px",borderRadius:6,fontSize:12}}>{editing?"Lưu":"Thêm"}</button>
                <button onClick={()=>{setAdding(false);setEditing(null);}}
                  style={{padding:"8px 14px",border:"1px solid var(--bd)",background:"#fff",borderRadius:6,cursor:"pointer",fontSize:12,color:"#475569"}}>Huỷ</button>
              </div>
            </div>
          </div>
        )}

        <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11.5}}>
          <thead>
            <tr>{["","Tên","Vai trò","PIN","Hoạt động","Mô tả","Thao tác"].map(h=>(
              <th key={h} style={{padding:"8px",textAlign:"left",fontSize:10,color:"#999",fontWeight:700,borderBottom:"1px solid #f0f0f0",letterSpacing:".3px"}}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {staff.map(s=>{
              const [tc,bg]=RC[s.role]||["#475569","#f5f5f5"];
              return (
                <tr key={s.id} style={{borderBottom:"1px solid #f8f8f8"}}>
                  <td style={{padding:"9px 8px"}}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:tc,fontWeight:800}}>{inits(s.name)}</div>
                  </td>
                  <td style={{padding:"9px 8px",color:"#212121",fontWeight:700}}>
                    {s.name}{s.id===currentUser.id&&<span style={{fontSize:9,marginLeft:6,padding:"2px 6px",background:"#FFF4F0",color:"var(--or)",borderRadius:3,fontWeight:700}}>BẠN</span>}
                  </td>
                  <td style={{padding:"9px 8px"}}><span style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:bg,color:tc,fontWeight:700}}>{RL[s.role]}</span></td>
                  <td style={{padding:"9px 8px",fontFamily:"monospace",letterSpacing:"2px",color:"#767676"}}>••••</td>
                  <td style={{padding:"9px 8px"}}><Tog on={s.active} onChange={()=>toggleActive(s)} sm/></td>
                  <td style={{padding:"9px 8px",color:"#767676",fontSize:10.5,maxWidth:240}}>{RD[s.role]}</td>
                  <td style={{padding:"9px 8px"}}>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>startEdit(s)} style={{fontSize:10,padding:"4px 9px",border:"1px solid var(--bd)",borderRadius:5,background:"#fff",cursor:"pointer",color:"#475569"}}>Sửa</button>
                      <button onClick={()=>remove(s)} disabled={s.id===currentUser.id}
                        style={{fontSize:10,padding:"4px 9px",border:`1px solid ${s.id===currentUser.id?"#f0f0f0":"#fca5a5"}`,borderRadius:5,background:s.id===currentUser.id?"#fafafa":"#fff",cursor:s.id===currentUser.id?"not-allowed":"pointer",color:s.id===currentUser.id?"#cbd5e1":"#b91c1c"}}>Xoá</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
      </div>
    </>
  );
}

function ProductSettings({products,setProducts,categories,setRecipe,toast}){
  const cats = (categories&&categories.length)?categories:Object.keys(CL_FALLBACK).map((k,i)=>({key:k,label:CL_FALLBACK[k],sort:i}));
  const catLabel = k => cats.find(c=>c.key===k)?.label || k;
  const [editPrice,setEditPrice] = useState(null);
  const [priceVal,setPriceVal]   = useState(0);
  const [adding,setAdding]       = useState(false);
  const [form,setForm]           = useState({emoji:"🍹",name:"",cat:cats[0]?.key||"pha_che",price:"",stock:""});

  const togOn=p=>setProducts(ps=>ps.map(x=>x.id===p.id?{...x,on:!(x.on!==false)}:x));
  const setStock=(p,v)=>setProducts(ps=>ps.map(x=>x.id===p.id?{...x,stock:Math.max(0,v|0)}:x));
  const savePrice=p=>{
    setProducts(ps=>ps.map(x=>x.id===p.id?{...x,price:Math.max(0,priceVal|0)}:x));
    setEditPrice(null);
    toast("Đã cập nhật giá","success");
  };

  const submit=()=>{
    if(!form.name.trim()){toast("Vui lòng nhập tên sản phẩm","warn");return;}
    if(!form.price||+form.price<=0){toast("Giá phải lớn hơn 0","warn");return;}
    const id=Math.max(0,...products.map(p=>p.id))+1;
    const p={
      id,
      name:form.name.trim(),
      cat:form.cat,
      price:+form.price,
      stock:Math.max(0,+form.stock|0),
      on:true,
      emoji:form.emoji||"🍹",
      recipe:{serves:1,prep:"3 phút",ing:[],steps:[]},
    };
    setProducts(ps=>[...ps,p]);
    setForm({emoji:"🍹",name:"",cat:"pha_che",price:"",stock:""});

    toast(`Đã thêm sản phẩm "${p.name}"`,"success");
  };

  const remove=p=>{
    if(!confirm(`Xoá sản phẩm "${p.name}"?\n\nLưu ý: Sản phẩm đã có trong đơn cũ vẫn được giữ nguyên trong lịch sử.`)) return;
    setProducts(ps=>ps.filter(x=>x.id!==p.id));
    toast(`Đã xoá "${p.name}"`,"info");
  };

  const EMOJI_PRESETS=["☕","🧋","🍵","🍓","🍊","🥤","🍰","🥖","🥪","🍔","🍟","🍜","🍪","🧀","🍩","🍫","🍦","🍮","🍿","⚡","🥗","🍎","🍌","🥑"];

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:11,color:"#767676"}}>Click giá để chỉnh · Tắt toggle để ẩn</span>
          {!adding&&<button onClick={()=>setAdding(true)} className="btn-pri" style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:6,fontSize:12}}>
            <i className="ti ti-plus" style={{fontSize:14}}/>Thêm sản phẩm
          </button>}
        </div>
      </div>

      {adding&&(
        <div style={{background:"#fafafa",border:"1px solid #f0f0f0",borderRadius:8,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#212121",marginBottom:10}}>Thêm sản phẩm mới</div>
          <div style={{display:"grid",gridTemplateColumns:"60px 1.5fr 1fr 110px 90px auto",gap:8,alignItems:"end",marginBottom:10}}>
            <div>
              <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Emoji</div>
              <input value={form.emoji} onChange={e=>setForm(f=>({...f,emoji:e.target.value}))}
                style={{width:"100%",padding:"7px 6px",border:"1px solid var(--bd)",borderRadius:6,fontSize:18,textAlign:"center"}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Tên sản phẩm *</div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="VD: Cà phê đá xay"
                style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Danh mục</div>
              <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}
                style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12,background:"#fff",cursor:"pointer"}}>
                {cats.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Giá (đ) *</div>
              <input type="number" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="20000"
                style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:"#767676",marginBottom:3,fontWeight:600}}>Tồn kho</div>
              <input type="number" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))} placeholder="0"
                style={{width:"100%",padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:6,fontSize:12}}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={submit} className="btn-pri" style={{padding:"8px 14px",borderRadius:6,fontSize:12}}>Thêm</button>
              <button onClick={()=>{setAdding(false);setForm({emoji:"🍹",name:"",cat:"pha_che",price:"",stock:""});}}

          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:10,color:"#767676",fontWeight:600,marginRight:4}}>Chọn nhanh emoji:</span>

              <button key={e} onClick={()=>setForm(f=>({...f,emoji:e}))}
                style={{width:30,height:30,fontSize:16,border:`1px solid ${form.emoji===e?"var(--or)":"#f0f0f0"}`,borderRadius:6,background:form.emoji===e?"#FFF4F0":"#fff",cursor:"pointer",padding:0}}>{e}</button>
            ))}
          </div>
          <div style={{fontSize:10,color:"#999",marginTop:8}}>💡 Sau khi thêm, bấm <b>📖 Công thức</b> để nhập nguyên liệu và các bước.</div>
        </div>
      )}

      <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11.5}}>
        <thead>
          <tr>{["","Tên","Danh mục","Giá","Tồn kho","Hiển thị","Thao tác"].map(h=>(
            <th key={h} style={{padding:"8px",textAlign:"left",fontSize:10,color:"#999",fontWeight:700,borderBottom:"1px solid #f0f0f0",letterSpacing:".3px"}}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>

                      <input type="number" value={priceVal} onChange={e=>setPriceVal(+e.target.value)}
                        onKeyDown={e=>e.key==="Enter"&&savePrice(p)}

                      <button onClick={()=>savePrice(p)} style={{fontSize:10,padding:"3px 7px",background:"var(--or)",color:"#fff",border:"none",borderRadius:4,cursor:"pointer"}}>✓</button>
                      <button onClick={()=>setEditPrice(null)} style={{fontSize:10,padding:"3px 7px",background:"#f5f5f5",border:"none",borderRadius:4,cursor:"pointer"}}>✕</button>
                    </div>
                  : <button onClick={()=>{setEditPrice(p.id);setPriceVal(p.price);}}
                      style={{fontSize:12,fontWeight:700,color:"var(--or)",background:"none",border:"1px dashed transparent",cursor:"pointer",padding:"3px 6px",borderRadius:4}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor="var(--or)"}

              <td style={{padding:"9px 8px"}}>
                <input type="number" value={p.stock} onChange={e=>setStock(p,+e.target.value)}

              <td style={{padding:"9px 8px"}}><Tog on={p.on!==false} onChange={()=>togOn(p)} sm/></td>
              <td style={{padding:"9px 8px"}}>
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>setRecipe(p)}
                    style={{fontSize:10,padding:"4px 9px",border:"1px solid var(--bd)",borderRadius:5,background:"#fff",cursor:"pointer",color:"#475569"}}>📖 Công thức</button>
                  <button onClick={()=>remove(p)}
                    style={{fontSize:10,padding:"4px 9px",border:"1px solid #fca5a5",borderRadius:5,background:"#fff",cursor:"pointer",color:"#b91c1c"}}>Xoá</button>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      </div>
    </div>
  );
}
