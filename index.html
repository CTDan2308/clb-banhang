*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d6d6d6;border-radius:4px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#a8a8a8;background-clip:padding-box;border:2px solid transparent}

/* Forms */
input,select,textarea,button{font-family:inherit;outline:none}
input,select,textarea{transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
input:focus,select:focus,textarea:focus{border-color:var(--or)!important;box-shadow:0 0 0 3px rgba(238,77,45,.12)}

button{transition:background .15s var(--ease),box-shadow .15s var(--ease),transform .1s var(--ease)}
button:not(:disabled):active{transform:translateY(1px)}

/* Card */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r-md);box-shadow:var(--sh-sm);transition:box-shadow .2s var(--ease),transform .2s var(--ease)}
.card-hover:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}

.btn-pri{background:var(--or);color:#fff;border:none;cursor:pointer;font-weight:600;box-shadow:var(--sh-sm)}
.btn-pri:hover:not(:disabled){background:var(--ord);box-shadow:var(--sh-or)}
.btn-pri:disabled{background:#e5e5e5;color:#999;cursor:not-allowed;box-shadow:none}
.btn-pri-grad{background:var(--or-grad);color:#fff;border:none;cursor:pointer;font-weight:700;box-shadow:var(--sh-or)}
.btn-pri-grad:hover:not(:disabled){filter:brightness(1.05)}
.btn-pri-grad:disabled{background:#e5e5e5;color:#999;cursor:not-allowed;box-shadow:none;filter:none}
.btn-ghost{background:#fff;border:1px solid var(--bd);color:var(--text2);cursor:pointer;font-weight:500}
.btn-ghost:hover{border-color:var(--or);color:var(--or);background:var(--orl)}

/* Chips / pills */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--r-pill);background:#f3f4f6;color:var(--text2);white-space:nowrap}
.chip-or{background:var(--orl);color:var(--or)}

/* Skeleton shimmer */
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 0,#f8f8f8 50%,#f0f0f0 100%);background-size:200px 100%;animation:shimmer 1.4s linear infinite;border-radius:6px}

/* Animations */
@keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes pop{0%{transform:scale(.9)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
.fade-up{animation:fadeUp .25s var(--ease)}
.fade-in{animation:fadeIn .2s var(--ease)}
.shake{animation:shake .35s var(--ease)}
.pop{animation:pop .25s var(--ease)}

.clamp-1{display:-webkit-block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.desktop-only{display:flex}

/* Tính ca hiện tại dựa vào giờ phút (handle overnight shifts) */
const hmToMin = s => { const [h,m] = (s||"0:0").split(":").map(Number); return h*60+(m||0); };
const getCurrentShift = (shifts) => {
  if (!shifts || !shifts.length) return null;
  const d = new Date();
  const now = d.getHours()*60 + d.getMinutes();
  for (const s of shifts) {
    const start = hmToMin(s.start_at);
    const end   = hmToMin(s.end_at);
    if (end > start) {
      if (now >= start && now < end) return s;
    } else {
      if (now >= start || now < end) return s;
    }
  }
  return null;
};
/* Role thực tế của user trong ca hiện tại */
const getEffectiveRole = (currentShift, shiftAssignments, user) => {
  if (!user) return null;
  if (user.role === "admin") return "admin";
  if (!currentShift) return user.role;
  const a = shiftAssignments.find(x => x.shift_id===currentShift.id && x.staff_id===user.id);
  return a ? a.role : "off";
};

  return <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:"var(--r-pill)",background:d.bg,color:d.color,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",letterSpacing:.2}}>{d.label}</span>;

const TPill = ({type}) => {
  const ship = type==="ship";
  return <span style={{fontSize:10,padding:"3px 9px",borderRadius:"var(--r-pill)",background:ship?"var(--orl)":"var(--ok-bg)",color:ship?"var(--or)":"var(--ok)",fontWeight:700,display:"inline-flex",alignItems:"center",gap:3}}>{ship?"🛵 Ship":"🏠 Tại chỗ"}</span>;
};

const StBdg = ({stock}) => {
  const base={fontSize:10,padding:"3px 9px",borderRadius:"var(--r-pill)",fontWeight:700,display:"inline-flex",alignItems:"center",gap:3};
  if (stock===0)  return <span style={{...base,background:"var(--err-bg)",color:"var(--err)"}}>● Hết hàng</span>;
  if (stock<=10)  return <span style={{...base,background:"var(--orl)",color:"var(--or)"}}>● Còn {stock}</span>;
  return <span style={{...base,background:"#F3F4F6",color:"var(--mut)"}}>Còn {stock}</span>;

function Qty({val,onInc,onDec,min=0,max=99,sm=false}){
  const sz=sm?28:34;
  const btn={width:sz,height:sz,background:"transparent",border:"none",fontSize:18,fontWeight:500,lineHeight:1,display:"inline-flex",alignItems:"center",justifyContent:"center"};
  return (
    <div style={{display:"inline-flex",alignItems:"center",border:"1.5px solid var(--bd)",borderRadius:"var(--r-sm)",overflow:"hidden",background:"#fff"}}>
      <button onClick={onDec} disabled={val<=min} aria-label="Giảm"
        style={{...btn,cursor:val<=min?"not-allowed":"pointer",color:val<=min?"#d4d4d4":"var(--or)"}}>−</button>
      <span style={{minWidth:sm?24:34,textAlign:"center",fontSize:13,fontWeight:700,color:"var(--text)",borderLeft:"1px solid var(--bd2)",borderRight:"1px solid var(--bd2)",height:sz,lineHeight:`${sz}px`}}>{val}</span>
      <button onClick={onInc} disabled={val>=max} aria-label="Tăng"
        style={{...btn,cursor:val>=max?"not-allowed":"pointer",color:val>=max?"#d4d4d4":"var(--or)"}}>+</button>
    </div>
  );
}

function Tog({on,onChange,sm=false}){
  const w=sm?28:36, h=sm?16:20, k=sm?12:16;
  return (
    <button onClick={()=>onChange(!on)}
      style={{width:w,height:h,borderRadius:h/2,background:on?"var(--or)":"#d0d0d0",border:"none",cursor:"pointer",position:"relative",transition:"background .15s",padding:0}}>
      <span style={{position:"absolute",top:2,left:on?w-k-2:2,width:k,height:k,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.2)",transition:"left .15s"}}/>
    </button>
  );
}

function Toast({list,dismiss}){
  const bg={success:"var(--ok)",warn:"var(--warn)",error:"var(--err)",info:"#1e293b"};
  const ic={success:"ti-circle-check",warn:"ti-alert-triangle",error:"ti-circle-x",info:"ti-info-circle"};
  return (
    <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
      {list.map(t=>(
        <div key={t.id} role="status" style={{animation:"slideRight .25s var(--ease)",background:bg[t.type]||bg.info,color:"#fff",padding:"11px 14px",borderRadius:"var(--r-md)",fontSize:12.5,fontWeight:500,display:"flex",alignItems:"center",gap:10,minWidth:240,maxWidth:360,boxShadow:"var(--sh-lg)",pointerEvents:"all",borderLeft:"4px solid rgba(255,255,255,.4)"}}>
          <i className={`ti ${ic[t.type]||ic.info}`} style={{fontSize:18,flexShrink:0}}/>
          <span style={{flex:1,lineHeight:1.45}}>{t.msg}</span>
          <button onClick={()=>dismiss(t.id)} aria-label="Đóng" style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",cursor:"pointer",fontSize:14,lineHeight:1,padding:"4px 7px",borderRadius:4}}>✕</button>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   LOGIN SCREEN (PIN)
══════════════════════════════════════════════════════════ */
function LoginScreen({staff,onLogin}){
  const [pin,setPin] = useState("");
  const [err,setErr] = useState("");
  const [shake,setShake] = useState(false);

  const tryLogin = (val) => {
    const u = staff.find(s=>s.pin===val && s.active);
    if (u) onLogin(u);
    else {
      setErr("Mã PIN không đúng hoặc tài khoản đã ngừng hoạt động");
      setShake(true); setTimeout(()=>setShake(false),400);
      setTimeout(()=>setPin(""),300);
    }
  };

  const press = (n) => {
    if (pin.length>=4) return;
    const next = pin + n;
    setPin(next); setErr("");
    if (next.length===4) setTimeout(()=>tryLogin(next),120);
  };
  const clear = () => { setPin(""); setErr(""); };
  const back  = () => { setPin(p=>p.slice(0,-1)); setErr(""); };

  // Keyboard support
  useEffect(()=>{
    const h = e => {
      if (/^[0-9]$/.test(e.key)) press(e.key);
      else if (e.key==="Backspace") back();
      else if (e.key==="Escape") clear();
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[pin]);

  const numBtn = {padding:"18px 0",fontSize:24,fontWeight:600,background:"#FAFAFA",border:"1px solid #F0F0F0",borderRadius:"var(--r-md)",cursor:"pointer",color:"var(--text)",transition:"all .12s var(--ease)",userSelect:"none"};
  const auxBtn = {padding:"18px 0",fontSize:14,fontWeight:600,background:"#fff",border:"1px solid #F0F0F0",borderRadius:"var(--r-md)",cursor:"pointer",color:"var(--mut)",transition:"all .12s var(--ease)"};

  return (
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"linear-gradient(135deg,#FFE4D8 0%,#FFF4F0 50%,#FFEDE5 100%)",position:"relative",overflow:"hidden",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{position:"absolute",top:-80,left:-80,width:280,height:280,borderRadius:"50%",background:"radial-gradient(circle,rgba(238,77,45,.18) 0%,transparent 70%)"}}/>
      <div style={{position:"absolute",bottom:-100,right:-100,width:320,height:320,borderRadius:"50%",background:"radial-gradient(circle,rgba(238,77,45,.14) 0%,transparent 70%)"}}/>
      <div className={shake?"shake":"fade-up"} style={{width:"100%",maxWidth:400,background:"rgba(255,255,255,.92)",backdropFilter:"blur(16px)",borderRadius:20,padding:"32px 26px",boxShadow:"0 16px 60px rgba(238,77,45,.22),0 4px 16px rgba(0,0,0,.06)",border:"1px solid rgba(255,255,255,.6)",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{width:68,height:68,borderRadius:18,background:"var(--or-grad)",color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:14,boxShadow:"var(--sh-or)"}}>🛒</div>
          <div style={{fontSize:19,fontWeight:800,color:"var(--or)",letterSpacing:.6}}>CLB BÁN HÀNG</div>
          <div style={{fontSize:11.5,color:"var(--mut)",marginTop:3}}>v{VERSION} · Nhập mã PIN để bắt đầu</div>
        </div>

        <div style={{display:"flex",gap:11,justifyContent:"center",marginBottom:err?6:20}}>
          {[0,1,2,3].map(i=>{
            const filled=pin.length>i;
            return (
              <div key={i} className={filled?"pop":""} style={{width:50,height:58,border:`2px solid ${filled?"var(--or)":"#E8E8E8"}`,borderRadius:"var(--r-md)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:800,color:"var(--or)",background:filled?"var(--orl)":"#fff",transition:"all .18s var(--ease)",boxShadow:filled?"var(--sh-or)":"none"}}>
                {filled?"●":""}
              </div>
            );
          })}
        </div>
        {err&&<div style={{textAlign:"center",fontSize:12,color:"var(--err)",marginBottom:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><i className="ti ti-alert-circle"/>{err}</div>}

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
          {[1,2,3,4,5,6,7,8,9].map(n=>(
            <button key={n} onClick={()=>press(String(n))} style={numBtn}
              onMouseDown={e=>{e.currentTarget.style.background="var(--orl)";e.currentTarget.style.color="var(--or)";e.currentTarget.style.borderColor="var(--or)"}}
              onMouseUp={e=>{e.currentTarget.style.background="#FAFAFA";e.currentTarget.style.color="var(--text)";e.currentTarget.style.borderColor="#F0F0F0"}}
              onMouseLeave={e=>{e.currentTarget.style.background="#FAFAFA";e.currentTarget.style.color="var(--text)";e.currentTarget.style.borderColor="#F0F0F0"}}>{n}</button>
          ))}
          <button onClick={clear} style={auxBtn} title="Xoá hết">Xoá</button>
          <button onClick={()=>press("0")} style={numBtn}
            onMouseDown={e=>{e.currentTarget.style.background="var(--orl)";e.currentTarget.style.color="var(--or)";e.currentTarget.style.borderColor="var(--or)"}}
            onMouseUp={e=>{e.currentTarget.style.background="#FAFAFA";e.currentTarget.style.color="var(--text)";e.currentTarget.style.borderColor="#F0F0F0"}}
            onMouseLeave={e=>{e.currentTarget.style.background="#FAFAFA";e.currentTarget.style.color="var(--text)";e.currentTarget.style.borderColor="#F0F0F0"}}>0</button>
          <button onClick={back} style={{...auxBtn,fontSize:18}} title="Xoá 1 ký tự"><i className="ti ti-backspace"/></button>
        </div>

        <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid #F5F5F5",fontSize:10.5,color:"var(--mut)",textAlign:"center",lineHeight:1.7}}>
          Mỗi thành viên có 1 mã PIN riêng do quản trị cấp.<br/>Quên PIN? Liên hệ Trưởng ca / Admin.
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   RECIPE MODAL
══════════════════════════════════════════════════════════ */
function RecipeModal({product,onClose,onSave,toast}){
  const [editing,setEditing] = useState(false);
  const [r,setR]   = useState({...product.recipe,ing:[...product.recipe.ing],steps:[...product.recipe.steps]});
  const [ing,setIng] = useState(product.recipe.ing.join("\n"));
  const [stp,setStp] = useState(product.recipe.steps.join("\n"));

  const save=()=>{
    const updated={...r,ing:ing.split("\n").map(s=>s.trim()).filter(Boolean),steps:stp.split("\n").map(s=>s.trim()).filter(Boolean)};
    setR(updated); onSave(updated); setEditing(false);
    toast("Đã lưu công thức","success");
  };

  const importFile=e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=ev=>{
      const lines=ev.target.result.split("\n").map(s=>s.trim()).filter(Boolean);
      setIng(lines.join("\n")); setEditing(true);
      toast("Đã import. Kiểm tra và lưu lại","info");
    };
    rd.readAsText(f);
  };

  const copy=()=>{
    const txt=`${product.emoji} ${product.name}\n\nNguyên liệu (${r.serves} khẩu phần):\n${r.ing.map(s=>"• "+s).join("\n")}\n\nCách làm:\n${r.steps.map((s,i)=>`${i+1}. ${s}`).join("\n")}`;
    navigator.clipboard?.writeText(txt); toast("Đã sao chép công thức","success");
  };

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .15s"}}>
      <div style={{background:"#fff",borderRadius:12,width:540,maxHeight:"86vh",overflow:"auto",padding:24,animation:"fadeUp .2s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{fontSize:18,fontWeight:700,color:"#212121",marginBottom:3}}>{product.emoji} {product.name}</div>
            <div style={{fontSize:11,color:"#767676"}}>{r.serves} khẩu phần · ⏱ {r.prep}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {!editing
              ? <button onClick={()=>setEditing(true)} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#FFF4F0",border:"none",borderRadius:6,color:"#EE4D2D",fontSize:12,fontWeight:600,cursor:"pointer"}}><i className="ti ti-edit" style={{fontSize:13}}/>Chỉnh sửa</button>
              : <>
                  <button onClick={()=>setEditing(false)} style={{padding:"6px 12px",background:"#f5f5f5",border:"none",borderRadius:6,color:"#475569",fontSize:12,cursor:"pointer"}}>Huỷ</button>
                  <button onClick={save} className="btn-pri" style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",borderRadius:6,fontSize:12}}><i className="ti ti-check" style={{fontSize:13}}/>Lưu</button>
                </>
            }
            <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:22,lineHeight:1}}>✕</button>
          </div>
        </div>

        <div style={{background:"#f8f8f8",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#475569"}}>
          <span style={{fontWeight:600,color:"#212121"}}>Thời gian: </span>{r.prep}
          {!editing&&<>
            <span style={{margin:"0 12px",color:"#e0e0e0"}}>|</span>
            <span style={{fontWeight:600,color:"#212121"}}>Khẩu phần: </span>{r.serves}
          </>}
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:20,height:20,background:"#FFF4F0",borderRadius:4,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#EE4D2D",fontWeight:700}}>1</span>
            Nguyên liệu
          </div>
          {!editing
            ? <ul style={{paddingLeft:20,display:"flex",flexDirection:"column",gap:4}}>
                {r.ing.map((s,i)=><li key={i} style={{fontSize:13,color:"#475569",lineHeight:1.5}}>{s}</li>)}
              </ul>
            : <textarea value={ing} onChange={e=>setIng(e.target.value)}
                style={{width:"100%",height:110,padding:"8px 10px",border:"1px solid #e0e0e0",borderRadius:6,fontSize:12,resize:"vertical",lineHeight:1.6}}
                placeholder="Mỗi nguyên liệu 1 dòng..."/>
          }
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:20,height:20,background:"#dbeafe",borderRadius:4,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#1e40af",fontWeight:700}}>2</span>
            Các bước thực hiện
          </div>
          {!editing
            ? <ol style={{paddingLeft:20,display:"flex",flexDirection:"column",gap:6}}>
                {r.steps.map((s,i)=><li key={i} style={{fontSize:13,color:"#475569",lineHeight:1.5}}>{s}</li>)}
              </ol>
            : <textarea value={stp} onChange={e=>setStp(e.target.value)}
                style={{width:"100%",height:130,padding:"8px 10px",border:"1px solid #e0e0e0",borderRadius:6,fontSize:12,resize:"vertical",lineHeight:1.6}}
                placeholder="Mỗi bước 1 dòng..."/>
          }
        </div>

        <div style={{paddingTop:12,borderTop:"1px solid #f0f0f0",display:"flex",gap:8,alignItems:"center"}}>
          <label style={{display:"flex",alignItems:"center",gap:5,padding:"7px 12px",background:"#f5f5f5",borderRadius:6,fontSize:12,color:"#475569",cursor:"pointer",fontWeight:500}}>
            <i className="ti ti-upload" style={{fontSize:13}}/>Import .txt
            <input type="file" accept=".txt" style={{display:"none"}} onChange={importFile}/>
          </label>
          <button onClick={copy} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 12px",background:"#f5f5f5",border:"none",borderRadius:6,fontSize:12,color:"#475569",cursor:"pointer",fontWeight:500}}>
            <i className="ti ti-copy" style={{fontSize:13}}/>Sao chép
          </button>
          <div style={{flex:1}}/>
          {editing&&<div style={{fontSize:11,color:"#94a3b8"}}>* Mỗi nguyên liệu / bước 1 dòng</div>}
        </div>
      </div>
    </div>
  );
}

                    ["5","Hoàn thành → KPI","Đơn hoàn thành cộng vào KPI cho 'kpi', không phải 'by'"],

                    <div key={n} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:"1px solid #f5f5f5"}}>

              {tab==="acc"&&(
                <>
                  <div style={{fontSize:12,color:"#475569",marginBottom:14,lineHeight:1.55}}>So sánh 2 mô hình tài khoản:</div>

                    <div style={{border:"1.5px solid var(--or)",borderRadius:10,padding:14,background:"#FFF4F0"}}>
                      <div style={{fontSize:11,fontWeight:800,color:"#EE4D2D",marginBottom:4,letterSpacing:".3px"}}>★ KHUYẾN NGHỊ</div>
                      <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:8}}>Tài khoản cá nhân (PIN)</div>
                      <ul style={{listStyle:"none",fontSize:11,color:"#475569",lineHeight:1.7}}>
                        <li>✅ Mỗi thành viên 1 PIN 4 số</li>
                        <li>✅ Đăng nhập chia sẻ thiết bị</li>
                        <li>✅ Ghi nhận chính xác ai làm gì</li>
                        <li>✅ KPI cá nhân chính xác</li>
                      </ul>
                    </div>
                    <div style={{border:"1.5px solid #e0e0e0",borderRadius:10,padding:14,background:"#fff"}}>
                      <div style={{fontSize:11,fontWeight:800,color:"#767676",marginBottom:4,letterSpacing:".3px"}}>PHƯƠNG ÁN B</div>
                      <div style={{fontSize:13,fontWeight:700,color:"#212121",marginBottom:8}}>Theo Role (thiết bị cố định)</div>
                      <ul style={{listStyle:"none",fontSize:11,color:"#475569",lineHeight:1.7}}>
                        <li>✅ Không cần đăng nhập</li>
                        <li>⚠️ Mỗi máy cố định 1 vai trò</li>
                        <li>⚠️ Không biết chính xác ai làm</li>
                        <li>⚠️ Không tách KPI cá nhân</li>
                      </ul>
                    </div>
                  </div>
                  <div style={{marginTop:14,padding:"10px 14px",background:"#fafafa",borderRadius:8,fontSize:11,color:"#767676",lineHeight:1.5}}>
                    💡 Demo hiện tại mô phỏng <b>mô hình cá nhân</b>. Dùng nút "Switch User" trên TopBar để chuyển vai.
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function Sidebar({screen,setScreen,orders,currentShift,allowed,sbOpen,onClose,onLogout,currentUser,effectiveRole,onlineUsers=[]}){

  const inKitchen= orders.filter(o=>["moi","pha_che"].includes(o.st)).length;

  const navAll=[
    {k:"dashboard",icon:"ti-layout-dashboard",label:"Tổng quan"},

    {k:"kitchen",  icon:"ti-tools-kitchen-2", label:"Pha chế (KDS)",badge:inKitchen||null},
    {k:"shipper",  icon:"ti-motorbike",       label:"Giao hàng", badge:inShip||null},
    {k:"staff",    icon:"ti-users",           label:"Nhân sự & KPI"},

    <div className={"sidebar "+(sbOpen?"open":"")} style={{background:"#fff",borderRight:"1px solid var(--bd)",display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 13px",borderBottom:"1px solid var(--bd2)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"linear-gradient(135deg,#fff 0%,#FFFAF7 100%)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:36,height:36,borderRadius:"var(--r-md)",background:"var(--or-grad)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:800,boxShadow:"var(--sh-or)"}}>🛒</div>
          <div>
            <div style={{fontSize:12.5,fontWeight:800,color:"var(--or)",letterSpacing:.4}}>CLB BÁN HÀNG</div>
            <div style={{fontSize:9.5,color:"var(--mut2)"}}>v{VERSION}</div>

        </div>
        <button onClick={onClose} className="mobile-only" aria-label="Đóng" style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"var(--mut)",padding:6}}>✕</button>
      </div>
      <div style={{padding:"11px 14px",background:bg,borderBottom:"1px solid var(--bd2)",display:"flex",alignItems:"center",gap:10}}>

        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,color:"var(--text)",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{currentUser.name}</div>
          <div style={{fontSize:10.5,color:tc,fontWeight:700,display:"flex",alignItems:"center",gap:4}}>
            <span>{RL[er]||er}</span>
            {roleSwitched && <span title={`Mặc định: ${RL[currentUser.role]}`} style={{fontSize:9,padding:"1px 6px",background:"#fff",borderRadius:"var(--r-pill)",color:"var(--or)",fontWeight:800}}>theo ca</span>}
          </div>
        </div>
      </div>
      {currentShift && (
        <div style={{padding:"8px 14px",background:"linear-gradient(90deg,#FFF4F0 0%,#FFF8F4 100%)",borderBottom:"1px solid var(--bd2)",fontSize:11,color:"#92400e",display:"flex",alignItems:"center",gap:6}}>
          <i className="ti ti-clock-hour-4" style={{fontSize:14,color:"var(--or)"}}/>
          <span><b>{currentShift.name}</b> · {currentShift.start_at}–{currentShift.end_at}</span>
        </div>

      {/* v1.4: Presence — ai đang online */}
      <div style={{padding:"8px 14px",borderBottom:"1px solid var(--bd2)",fontSize:11,color:"var(--text2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:onlineUsers.length?6:0}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 0 3px rgba(34,197,94,.2)",animation:"pulse 2s infinite"}}/>

        </div>
        {onlineUsers.length>0 && (
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {onlineUsers.slice(0,6).map(u=>{
              const [c,b] = RC[u.role]||["#475569","#f5f5f5"];
              return (
                <span key={u.id} title={`${u.name} · ${RL[u.role]||u.role}`} style={{fontSize:10,padding:"2px 7px",borderRadius:"var(--r-pill)",background:b,color:c,fontWeight:700,whiteSpace:"nowrap"}}>

      <nav style={{flex:1,padding:"8px 8px",overflowY:"auto"}}>
        {nav.map(n=>{

              onMouseOver={e=>{if(!ac){e.currentTarget.style.background="#FAFAFA";e.currentTarget.style.color="var(--text)"}}}

              {ac&&<span style={{position:"absolute",left:-8,top:"50%",transform:"translateY(-50%)",width:3,height:18,background:"var(--or)",borderRadius:"0 3px 3px 0"}}/>}
              <i className={`ti ${n.icon}`} style={{fontSize:18}}/>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge&&<span style={{fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:"var(--r-pill)",background:"var(--or-grad)",color:"#fff",minWidth:20,textAlign:"center",boxShadow:"var(--sh-or)"}}>{n.badge}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{padding:"10px 12px",borderTop:"1px solid var(--bd2)"}}>
        <button onClick={onLogout} className="btn-ghost" style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"10px",borderRadius:"var(--r-md)",color:"var(--err)",borderColor:"#FCA5A5",fontSize:12.5,fontWeight:600}}>
          <i className="ti ti-logout" style={{fontSize:15}}/>Đăng xuất
        </button>
      </div>
    </div>
  );
}

    live:    {color:"#22c55e",text:"Realtime",pulse:true},

    offline: {color:"#ef4444",text:"Mất kết nối",pulse:false},
  }[connStatus] || {color:"#94a3b8",text:"—",pulse:false};
  return (
    <div style={{padding:"10px 16px",borderBottom:"2.5px solid var(--or)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",flexShrink:0,gap:10,boxShadow:"0 2px 8px rgba(0,0,0,.03)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0,flex:1}}>
        <button onClick={onMenu} className="mobile-only" aria-label="Menu" style={{background:"var(--orl)",border:"none",cursor:"pointer",fontSize:22,color:"var(--or)",padding:8,borderRadius:"var(--r-sm)"}}>
          <i className="ti ti-menu-2"/>

        <div style={{minWidth:0}}>
          <div style={{fontSize:15.5,fontWeight:800,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",letterSpacing:-.2}}>{title}</div>

        <div className="topbar-meta" style={{display:"flex",alignItems:"center",gap:6,fontSize:11.5,color:"var(--mut)",padding:"5px 11px",background:"#FAFAFA",borderRadius:"var(--r-pill)",border:"1px solid var(--bd2)"}}>

          style={{width:36,height:36,borderRadius:"50%",border:`1px solid ${notifEnabled?"var(--or)":"var(--bd)"}`,background:notifEnabled?"var(--orl)":"#fff",color:notifEnabled?"var(--or)":"var(--mut2)",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:notifEnabled?"var(--sh-sm)":"none"}}>
          <i className={`ti ${notifEnabled?"ti-bell-ringing":"ti-bell-off"}`}/>

          <div style={{width:30,height:30,borderRadius:"50%",background:bg,color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>{inits(currentUser.name)}</div>
          <div style={{textAlign:"left"}}>

/* ══════════════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════════════ */
function Dashboard({orders,staff}){
  const done  = orders.filter(o=>o.st==="hoan_thanh");
  const rev   = done.reduce((s,o)=>s+iTot(o),0);
  const ship  = orders.filter(o=>o.type==="ship"&&o.st==="hoan_thanh");
  const active= orders.filter(o=>!["hoan_thanh","huy"].includes(o.st));
  const bars  = useMemo(()=>{
    const b=Array(8).fill(0);
    orders.forEach(o=>{const h=parseInt((o.t||"00:00").split(":")[0],10);const i=h-7;if(i>=0&&i<8)b[i]++;});
    return b;
  },[orders]);
  const maxB=Math.max(...bars,1);

  const cards=[
    {l:"Tổng đơn",v:orders.length,ic:"ti-clipboard-list",bg:"var(--orl)",tc:"var(--or)",accent:"linear-gradient(135deg,#FFF4F0 0%,#FFE0D6 100%)"},
    {l:"Doanh thu",v:fmt(rev),ic:"ti-cash",bg:"var(--ok-bg)",tc:"var(--ok)",accent:"linear-gradient(135deg,#F0FDF4 0%,#DCFCE7 100%)"},
    {l:"Đang xử lý",v:active.length,ic:"ti-loader-2",bg:"var(--info-bg)",tc:"var(--info)",accent:"linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 100%)"},
    {l:"Thu phí ship",v:fmt(ship.reduce((s,o)=>s+o.dFee,0)),ic:"ti-motorbike",bg:"#F3EFFF",tc:"#7C3AED",accent:"linear-gradient(135deg,#F5F3FF 0%,#EDE9FE 100%)"},
  ];

  return (
    <div style={{flex:1,overflowY:"auto",padding:18,background:"var(--bg)"}}>
      <div className="grid-stats-4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>
        {cards.map(s=>(
          <div key={s.l} className="card card-hover" style={{padding:"16px 16px 14px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,right:0,width:80,height:80,background:s.accent,borderRadius:"0 0 0 100%",opacity:.55}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,position:"relative"}}>
              <div style={{fontSize:11,color:"var(--mut)",fontWeight:600,textTransform:"uppercase",letterSpacing:.3}}>{s.l}</div>
              <div style={{width:36,height:36,borderRadius:"var(--r-md)",background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"var(--sh-sm)"}}>
                <i className={`ti ${s.ic}`} style={{fontSize:19,color:s.tc}}/>
              </div>
            </div>
            <div style={{fontSize:24,fontWeight:800,color:"var(--text)",position:"relative",letterSpacing:-.3}}>{s.v}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:12,marginBottom:12}}>
        <div className="card" style={{padding:18}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--text)",display:"flex",alignItems:"center",gap:6}}><i className="ti ti-chart-bar" style={{fontSize:16,color:"var(--or)"}}/>Đơn hàng theo giờ</div>
            <span className="chip">8 khung giờ</span>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",gap:10,height:130,paddingBottom:4}}>
            {bars.map((v,i)=>{
              const hCur=new Date().getHours();
              const isCur=(7+i)===hCur;
              return (
                <div key={i} title={`${7+i}:00 — ${v} đơn`} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"default"}}>
                  <div style={{fontSize:10.5,color:isCur?"var(--or)":"var(--mut)",fontWeight:700}}>{v||""}</div>
                  <div style={{width:"100%",height:Math.round((v/maxB)*92)||3,background:isCur?"var(--or-grad)":"linear-gradient(180deg,#FFD4C2 0%,#FFB8A0 100%)",borderRadius:"6px 6px 2px 2px",transition:"height .6s var(--ease)",boxShadow:isCur?"var(--sh-or)":"none"}}/>
                  <div style={{fontSize:10,color:isCur?"var(--or)":"var(--mut2)",fontWeight:isCur?700:500}}>{7+i}h</div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="card" style={{padding:18}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14,display:"flex",alignItems:"center",gap:6}}><i className="ti ti-progress" style={{fontSize:16,color:"var(--or)"}}/>Trạng thái đơn</div>
          {Object.entries(ST).map(([s,d])=>{
            const n=orders.filter(o=>o.st===s).length;
            const pct=orders.length?Math.round((n/orders.length)*100):0;
            return (
              <div key={s} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{minWidth:88}}><Bdg s={s}/></div>
                <div style={{flex:1,height:6,background:"#F3F4F6",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:d.color,borderRadius:3,transition:"width .6s var(--ease)"}}/>
                </div>
                <span style={{fontSize:11,color:"var(--text2)",minWidth:22,textAlign:"right",fontWeight:700}}>{n}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:12,display:"flex",alignItems:"center",gap:6}}><i className="ti ti-history" style={{fontSize:16,color:"var(--or)"}}/>Đơn hàng gần đây</div>
        <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11.5}}>
          <thead>
            <tr style={{background:"#FAFAFA"}}>{["Mã đơn","Khách hàng","Giờ","Sản phẩm","Tổng","Loại","Người KPI","Trạng thái"].map(h=>(
              <th key={h} style={{padding:"9px 10px",textAlign:"left",fontSize:10,color:"var(--mut)",fontWeight:700,borderBottom:"1px solid var(--bd)",letterSpacing:.4,textTransform:"uppercase"}}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {[...orders].reverse().slice(0,6).map(o=>(
              <tr key={o.id} style={{borderBottom:"1px solid #F5F5F5",transition:"background .15s"}}
                  onMouseOver={e=>e.currentTarget.style.background="#FAFAFA"}
                  onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                <td style={{padding:"10px",fontFamily:"ui-monospace,monospace",color:"var(--or)",fontWeight:800}}>{o.id}</td>
                <td style={{padding:"10px",color:"var(--text)",fontWeight:600}}>{o.cus}</td>
                <td style={{padding:"10px",color:"var(--mut)"}}>{o.t}</td>
                <td style={{padding:"10px",color:"var(--text2)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.items.map(i=>`${i.name}×${i.qty}`).join(", ")}</td>
                <td style={{padding:"10px",fontWeight:800,color:"var(--text)"}}>{fmt(iTot(o))}</td>
                <td style={{padding:"10px"}}><TPill type={o.type}/></td>
                <td style={{padding:"10px",color:"var(--text2)",fontSize:11}}>{staff.find(s=>s.id===o.kpi)?.name||"—"}</td>
                <td style={{padding:"10px"}}><Bdg s={o.st}/></td>
              </tr>
            ))}
            {orders.length===0&&(
              <tr><td colSpan={8} style={{padding:"32px 10px",textAlign:"center",color:"var(--mut2)",fontSize:12}}>
                <i className="ti ti-clipboard-off" style={{fontSize:32,display:"block",marginBottom:6,opacity:.5}}/>
                Chưa có đơn hàng nào
              </td></tr>
            )}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

/* v1.4: Searchable KPI combobox — hỗ trợ chọn người ngoài ca */
function KpiPicker({staff,value,onChange,inShiftIds,inp}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef(null);
  const selected=staff.find(s=>s.id===value);
  const isOutShift=selected && !inShiftIds.has(selected.id);

  useEffect(()=>{
    if(!open) return;
    const h=e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[open]);

  const filtered=staff
    .filter(s=>s.active && (!q || s.name.toLowerCase().includes(q.toLowerCase())))
    .sort((a,b)=>{
      const ai=inShiftIds.has(a.id), bi=inShiftIds.has(b.id);
      if(ai!==bi) return ai?-1:1;
      return a.name.localeCompare(b.name,"vi");
    });

  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)} type="button"
        style={{...inp,padding:"8px 9px",border:`1.5px solid ${isOutShift?"#DC2626":(value!==undefined?"var(--or)":"var(--bd)")}`,background:isOutShift?"#FEF2F2":"var(--orl)",cursor:"pointer",fontWeight:600,fontSize:11.5,color:isOutShift?"#DC2626":"var(--or)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,textAlign:"left"}}>
        <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {selected ? selected.name : "Chọn KPI..."}
          {isOutShift && <span style={{fontSize:9,marginLeft:5,padding:"1px 5px",background:"#fff",color:"#DC2626",borderRadius:"var(--r-pill)",fontWeight:800}}>ngoài ca</span>}
        </span>
        <i className="ti ti-chevron-down" style={{fontSize:13,flexShrink:0}}/>
      </button>
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#fff",border:"1px solid var(--bd)",borderRadius:"var(--r-md)",boxShadow:"var(--sh-lg)",zIndex:50,maxHeight:280,display:"flex",flexDirection:"column"}}>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Tìm tên..."
            style={{padding:"8px 10px",border:"none",borderBottom:"1px solid var(--bd2)",fontSize:12,outline:"none"}}/>
          <div style={{overflowY:"auto",flex:1}}>
            {filtered.length===0 && <div style={{padding:14,color:"var(--mut)",fontSize:11.5,textAlign:"center"}}>Không tìm thấy</div>}
            {filtered.map(s=>{
              const out=!inShiftIds.has(s.id);
              return (
                <div key={s.id} onClick={()=>{onChange(s.id);setOpen(false);setQ("");}}
                  style={{padding:"8px 10px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,borderBottom:"1px solid var(--bd2)",background:s.id===value?"var(--orl)":"#fff"}}
                  onMouseEnter={e=>{if(s.id!==value)e.currentTarget.style.background="#FAFAFA"}}
                  onMouseLeave={e=>{if(s.id!==value)e.currentTarget.style.background="#fff"}}>
                  <span><b>{s.name}</b> <small style={{color:"var(--mut)"}}>· {RL[s.role]}</small></span>
                  {out && <span style={{fontSize:9,padding:"1px 6px",background:"#FEF2F2",color:"#DC2626",borderRadius:"var(--r-pill)",fontWeight:700}}>ngoài ca</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function OrderScreen({orders,setOrders,products,setProducts,staff,currentUser,zones,categories,toast,shiftAssignments=[],currentShift=null}){
  const EC = {cus:"",ph:"",type:"tai_cho",adr:"",zone:0,kpi:currentUser.id,pay:"cash",disc:0,dT:"fixed",note:"",items:[]};
  const cats = categories.length ? categories : Object.keys(CL_FALLBACK).map((k,i)=>({key:k,label:CL_FALLBACK[k],sort:i}));
  const [cat,setCat]   = useState(cats[0]?.key || "pha_che");
  const [cart,setCart] = useState({...EC});
  const [search,setSrch]= useState("");
  const [noteFor,setNoteFor]= useState(null);
  const noteRef = useRef(null);

  // Reset KPI default when user changes
  useEffect(()=>{ setCart(c=>({...c,kpi:currentUser.id})); },[currentUser.id]);

  const sub     = cart.items.reduce((s,i)=>s+i.p*i.qty,0);
  const dFee    = cart.type==="ship"?(zones[cart.zone]||{fee:8000}).fee:0;
  const discAmt = cart.dT==="pct"?Math.round(sub*cart.disc/100):Math.min(cart.disc||0,sub);
  const total   = sub+dFee-discAmt;

  const visible = products.filter(p=>p.on!==false);
  const filtered= visible.filter(p=>p.cat===cat&&(!search||p.name.toLowerCase().includes(search.toLowerCase())));
  const cqty    = pid => (cart.items.find(i=>i.pid===pid)||{qty:0}).qty;

  const addItem=p=>{
    if(p.stock===0){toast("Sản phẩm đã hết hàng","warn");return;}
    setCart(c=>{const ex=c.items.find(i=>i.pid===p.id);return ex?{...c,items:c.items.map(i=>i.pid===p.id?{...i,qty:i.qty+1}:i)}:{...c,items:[...c.items,{pid:p.id,name:p.name,p:p.price,qty:1,note:""}]};});
  };
  const setQty=(pid,q)=>{
    if(q<=0) setCart(c=>({...c,items:c.items.filter(i=>i.pid!==pid)}));
    else     setCart(c=>({...c,items:c.items.map(i=>i.pid===pid?{...i,qty:q}:i)}));
  };
  const setNote=(pid,note)=>setCart(c=>({...c,items:c.items.map(i=>i.pid===pid?{...i,note}:i)}));

  const create=()=>{
    if(!cart.cus.trim()){toast("Vui lòng nhập tên khách hàng","warn");return;}
    if(!cart.items.length){toast("Giỏ hàng đang trống","warn");return;}
    const num = (orders.length ? Math.max(...orders.map(o=>o.num||0)) : 0) + 1;
    const id  = `ĐH${String(num).padStart(3,"0")}`;
    const o={id,num,t:nowS(),cus:cart.cus.trim(),ph:cart.ph,type:cart.type,adr:cart.adr,items:cart.items.map(i=>({...i})),st:"moi",pay:cart.pay,dFee,disc:discAmt,dT:cart.dT,by:currentUser.id,kpi:cart.kpi,sid:null,note:cart.note};
    setProducts(ps=>ps.map(p=>{const ci=cart.items.find(i=>i.pid===p.id);return ci?{...p,stock:Math.max(0,p.stock-ci.qty)}:p;}));
    setOrders(os=>[...os,o]);
    setCart({...EC,kpi:currentUser.id});
    toast(`✅ Đơn ${id} tạo thành công · ${fmt(total)}`,"success");
  };

  const cancel=id=>{
    const o = orders.find(x=>x.id===id);
    if(!o) return;
    // Chỉ hoàn kho cho đơn chưa kết thúc (tránh hoàn 2 lần)
    if(!["huy","hoan_thanh","hoan_hang"].includes(o.st)){
      setProducts(ps=>ps.map(p=>{const ci=o.items.find(i=>i.pid===p.id);return ci?{...p,stock:p.stock+ci.qty}:p;}));
    }
    setOrders(os=>os.map(x=>x.id===id?{...x,st:"huy"}:x));
    toast("Đã huỷ đơn · đã hoàn kho","warn");
  };
  const active=orders.filter(o=>!["hoan_thanh","huy","cho_xac_nhan"].includes(o.st));
  // v1.5: đơn khách tự đặt chờ duyệt
  const pendingApproval = orders.filter(o=>o.st==="cho_xac_nhan").sort((a,b)=>a.num-b.num);

  // Duyệt đơn khách: trừ kho + gán KPI + chuyển sang 'moi'
  const approveCustomer = (oid) => {
    const o = orders.find(x=>x.id===oid);
    if(!o) return;
    // Check stock đủ không
    const insufficient = o.items.find(i=>{
      const p = products.find(x=>x.id===i.pid);
      return !p || p.stock < i.qty;
    });
    if (insufficient) {
      const p = products.find(x=>x.id===insufficient.pid);
      toast(`Không đủ kho: ${insufficient.name} (cần ${insufficient.qty}, còn ${p?.stock||0})`, "error");
      return;
    }
    setProducts(ps=>ps.map(p=>{const ci=o.items.find(i=>i.pid===p.id);return ci?{...p,stock:Math.max(0,p.stock-ci.qty)}:p;}));
    setOrders(os=>os.map(x=>x.id===oid?{...x,st:"moi",by:currentUser.id,kpi:currentUser.id}:x));
    toast(`✓ Duyệt đơn ${oid} · KPI về bạn`, "success");
  };
  const rejectCustomer = (oid) => {
    const reason = prompt("Lý do từ chối đơn (ngắn gọn):");
    if (!reason || !reason.trim()) return;
    setOrders(os=>os.map(x=>x.id===oid?{...x,st:"huy",returnReason:`Từ chối: ${reason.trim()}`}:x));
    toast(`Đã từ chối đơn ${oid}`, "warn");
  };

  useEffect(()=>{if(noteFor&&noteRef.current)noteRef.current.focus();},[noteFor]);

  const itemCount = cart.items.reduce((s,i)=>s+i.qty,0);
  const lbl = {fontSize:10,color:"var(--mut)",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.3};
  const inp = {width:"100%",padding:"8px 11px",border:"1px solid var(--bd)",borderRadius:"var(--r-sm)",fontSize:12.5,background:"#fff"};

  return (
    <div className="order-shell">
      <div className="order-left">
        <div className="order-scroll" style={{flex:1,minHeight:0,overflowY:"auto",display:"flex",flexDirection:"column"}}>

        <div style={{padding:"12px 14px 10px",borderBottom:"1px solid var(--bd2)",flexShrink:0,background:"linear-gradient(180deg,#fff 0%,#FAFAFA 100%)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 130px",gap:8,marginBottom:9}}>
            <div>
              <div style={lbl}>Khách hàng *</div>
              <input value={cart.cus} onChange={e=>setCart(c=>({...c,cus:e.target.value}))} placeholder="Tên khách..." style={inp}/>
            </div>
            <div>
              <div style={lbl}>SĐT</div>
              <input value={cart.ph||""} onChange={e=>setCart(c=>({...c,ph:e.target.value}))} placeholder="09xx..." style={inp} inputMode="tel"/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9}}>
            <div>
              <div style={lbl}><i className="ti ti-user" style={{fontSize:11,marginRight:3}}/>Người tạo</div>
              <div style={{padding:"8px 11px",background:"#F3F4F6",borderRadius:"var(--r-sm)",fontSize:12,color:"var(--text2)",fontWeight:600,border:"1px solid var(--bd2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{currentUser.name}</div>
            </div>
            <div>
              <div style={{...lbl,color:"var(--or)"}}><i className="ti ti-target" style={{fontSize:11,marginRight:3}}/>Người nhận KPI</div>
              <KpiPicker staff={staff} value={cart.kpi}
                onChange={id=>setCart(c=>({...c,kpi:id}))}
                inShiftIds={new Set(shiftAssignments.filter(a=>a.shift_id===currentShift?.id && a.role!=="off").map(a=>a.staff_id))}
                inp={inp}/>
            </div>
          </div>
          <div>
            <div style={lbl}>Loại đơn</div>
            <div style={{display:"flex",gap:6}}>
              {[["tai_cho","🏠","Tại chỗ"],["ship","🛵","Ship"]].map(([v,e,l])=>(
                <button key={v} onClick={()=>setCart(c=>({...c,type:v}))}
                  style={{flex:1,padding:"9px 4px",border:`1.5px solid ${cart.type===v?"var(--or)":"var(--bd)"}`,borderRadius:"var(--r-sm)",cursor:"pointer",background:cart.type===v?"var(--orl)":"#fff",color:cart.type===v?"var(--or)":"var(--text2)",fontSize:12,fontWeight:cart.type===v?700:500,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><span style={{fontSize:14}}>{e}</span>{l}</button>
              ))}
            </div>
          </div>
          {cart.type==="ship"&&(
            <div style={{marginTop:10,paddingTop:10,borderTop:"1px dashed var(--bd)"}}>
              <div style={lbl}>📍 Địa chỉ giao hàng</div>
              <input value={cart.adr} onChange={e=>setCart(c=>({...c,adr:e.target.value}))} placeholder="Tòa nhà, phòng số..." style={{...inp,marginBottom:6}}/>
              <div style={{display:"flex",gap:5,marginBottom:9,flexWrap:"wrap"}}>
                {["Tòa A","Tòa B","Tòa C","KTX C1","KTX D2","Thư viện"].map(t=>(
                  <button key={t} onClick={()=>setCart(c=>({...c,adr:c.adr?c.adr+", "+t:t}))} className="btn-ghost"
                    style={{fontSize:10.5,padding:"4px 9px",borderRadius:"var(--r-pill)"}}>+ {t}</button>
                ))}
              </div>
              <div style={lbl}>Phí ship</div>
              <div style={{display:"flex",gap:5}}>
                {zones.map((z,i)=>(
                  <button key={i} onClick={()=>setCart(c=>({...c,zone:i}))}
                    style={{flex:1,padding:"8px 4px",border:`1.5px solid ${cart.zone===i?"var(--or)":"var(--bd)"}`,borderRadius:"var(--r-sm)",cursor:"pointer",background:cart.zone===i?"var(--orl)":"#fff",fontSize:10.5,lineHeight:1.4,textAlign:"center"}}>
                    <div style={{fontWeight:800,color:cart.zone===i?"var(--or)":"var(--text)",fontSize:11.5}}>{fmt(z.fee)}</div>
                    <div style={{fontSize:9.5,color:cart.zone===i?"var(--or)":"var(--mut2)",marginTop:1}}>{z.lb}</div>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>

        <div style={{padding:"10px 14px 8px",borderBottom:"1px solid var(--bd2)",flexShrink:0,background:"#fff",position:"sticky",top:0,zIndex:5,boxShadow:"0 2px 4px rgba(0,0,0,.03)"}}>
          <div style={{position:"relative",marginBottom:8}}>
            <i className="ti ti-search" style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--mut2)",fontSize:14,pointerEvents:"none"}}/>
            <input value={search} onChange={e=>setSrch(e.target.value)} placeholder="Tìm sản phẩm..."
              style={{...inp,padding:"8px 32px 8px 32px"}}/>
            {search&&<button onClick={()=>setSrch("")} aria-label="Xoá" style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"#f0f0f0",border:"none",width:20,height:20,borderRadius:"50%",cursor:"pointer",color:"var(--mut)",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
          </div>
          <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
            {cats.map(c=>(
              <button key={c.key} onClick={()=>{setCat(c.key);setSrch("");}}
                style={{flexShrink:0,fontSize:11,padding:"7px 14px",border:`1.5px solid ${cat===c.key?"var(--or)":"var(--bd)"}`,borderRadius:"var(--r-pill)",cursor:"pointer",background:cat===c.key?"var(--or)":"#fff",color:cat===c.key?"#fff":"var(--text2)",fontWeight:cat===c.key?700:500,whiteSpace:"nowrap",boxShadow:cat===c.key?"var(--sh-or)":"none"}}>{c.label}</button>
            ))}
          </div>
        </div>

        <div style={{flexShrink:0,padding:"12px 14px",background:"var(--bg)"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
            {filtered.map(p=>{
              const q=cqty(p.id);
              const out=p.stock===0;
              return (
                <div key={p.id} className="card-hover" style={{position:"relative",border:`1.5px solid ${q>0?"var(--or)":"var(--bd2)"}`,borderRadius:"var(--r-md)",padding:"10px 10px 10px",background:q>0?"var(--orl)":"#fff",opacity:out?.6:1,transition:"all .18s var(--ease)",display:"flex",flexDirection:"column",boxShadow:q>0?"var(--sh-or)":"var(--sh-sm)"}}>
                  {q>0&&<div style={{position:"absolute",top:6,right:6,background:"var(--or)",color:"#fff",fontSize:10,fontWeight:800,minWidth:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px",boxShadow:"var(--sh-or)"}}>{q}</div>}
                  <div style={{position:"absolute",top:6,left:6}}><StBdg stock={p.stock}/></div>
                  <div style={{fontSize:38,marginTop:14,marginBottom:6,textAlign:"center",lineHeight:1,filter:out?"grayscale(1)":"none"}}>{p.emoji}</div>
                  <div className="clamp-2" style={{fontSize:12.5,fontWeight:600,color:"var(--text)",marginBottom:4,lineHeight:1.35,minHeight:34}}>{p.name}</div>
                  <div style={{fontSize:15,color:"var(--or)",fontWeight:800,marginBottom:8,fontFamily:"system-ui"}}>{fmt(p.price)}</div>
                  {!out&&(q===0
                    ? <button onClick={()=>addItem(p)} className="btn-pri" style={{width:"100%",padding:"7px",borderRadius:"var(--r-sm)",fontSize:11.5,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><i className="ti ti-plus" style={{fontSize:13}}/>Thêm</button>
                    : <div style={{display:"flex",justifyContent:"center"}}><Qty val={q} onInc={()=>addItem(p)} onDec={()=>setQty(p.id,q-1)} max={p.stock}/></div>
                  )}
                  {out&&<div style={{fontSize:10.5,color:"var(--err)",textAlign:"center",padding:"6px 0",fontWeight:700,background:"var(--err-bg)",borderRadius:"var(--r-sm)"}}>Hết hàng</div>}
                </div>
              );
            })}
            {!filtered.length&&(
              <div style={{gridColumn:"1/-1",textAlign:"center",padding:"48px 0",color:"var(--mut2)"}}>
                <i className="ti ti-search-off" style={{fontSize:36,display:"block",marginBottom:8}}/>
                <div style={{fontSize:12.5,fontWeight:500}}>Không tìm thấy sản phẩm</div>
              </div>
            )}
          </div>
        </div>

        <div style={{borderTop:"1px solid var(--bd)",background:"#fff",display:"flex",flexDirection:"column",flexShrink:0,boxShadow:"0 -2px 8px rgba(0,0,0,.03)"}}>
          <div style={{padding:"10px 14px 6px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--bd2)",position:"sticky",top:0,background:"#fff",zIndex:4}}>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text)",display:"flex",alignItems:"center",gap:6}}>
              <i className="ti ti-shopping-cart" style={{fontSize:15,color:"var(--or)"}}/>Giỏ hàng
              {itemCount>0&&<span className="chip chip-or pop" style={{fontSize:10}}>{itemCount} món</span>}
            </div>
            {cart.items.length>0&&<button onClick={()=>setCart({...EC,kpi:currentUser.id})} style={{fontSize:10.5,color:"var(--mut)",background:"none",border:"none",cursor:"pointer",fontWeight:500}}>Xoá tất cả</button>}
          </div>
        <div style={{padding:"8px 14px 12px"}}>
          {cart.items.length===0&&(
            <div style={{textAlign:"center",padding:"18px 0",color:"var(--mut2)",fontSize:11.5}}>
              <i className="ti ti-shopping-cart-off" style={{fontSize:24,display:"block",marginBottom:4,opacity:.5}}/>
              Chưa có sản phẩm trong giỏ
            </div>
          )}
          {cart.items.length>0&&(
            <div style={{marginBottom:8}}>
              {cart.items.map(i=>(
                <div key={i.pid} style={{padding:"7px 0",borderBottom:"1px dashed var(--bd2)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{flex:1,fontSize:12,fontWeight:600,color:"var(--text)",lineHeight:1.3}}>{i.name}</span>
                    <Qty val={i.qty} onInc={()=>setQty(i.pid,i.qty+1)} onDec={()=>setQty(i.pid,i.qty-1)} min={1} sm/>
                    <span style={{fontSize:11.5,color:"var(--or)",minWidth:64,textAlign:"right",fontWeight:700}}>{fmt(i.p*i.qty)}</span>
                    <button onClick={()=>setQty(i.pid,0)} aria-label="Xoá" style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--mut2)",fontSize:14,lineHeight:1,padding:2,borderRadius:4}} onMouseOver={e=>e.currentTarget.style.color="var(--err)"} onMouseOut={e=>e.currentTarget.style.color="var(--mut2)"}><i className="ti ti-trash"/></button>
                  </div>
                  {noteFor===i.pid
                    ? <input ref={noteRef} value={i.note} onChange={e=>setNote(i.pid,e.target.value)} onBlur={()=>setNoteFor(null)}
                        placeholder="VD: ít đường, không đá..." style={{...inp,padding:"5px 9px",fontSize:11,marginTop:5}}/>
                    : <button onClick={()=>setNoteFor(i.pid)} style={{fontSize:10.5,color:i.note?"var(--or)":"var(--mut2)",background:"none",border:"none",cursor:"pointer",paddingLeft:0,marginTop:3,fontWeight:i.note?600:500}}>
                        {i.note?`📝 ${i.note}`:"+ Ghi chú món"}
                      </button>
                  }
                </div>
              ))}
            </div>
          )}

          {cart.items.length>0&&(
            <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
              <select value={cart.dT} onChange={e=>setCart(c=>({...c,dT:e.target.value,disc:0}))}
                style={{width:110,padding:"7px 9px",border:"1px solid var(--bd)",borderRadius:"var(--r-sm)",fontSize:11,background:"#fff",cursor:"pointer",fontWeight:600}}>
                <option value="fixed">Giảm (đ)</option>
                <option value="pct">Giảm (%)</option>
              </select>
              <input type="number" min={0} max={cart.dT==="pct"?100:sub} value={cart.disc||""}
                onChange={e=>setCart(c=>({...c,disc:+e.target.value}))} placeholder={cart.dT==="pct"?"10":"0"}
                style={{flex:1,padding:"7px 10px",border:"1px solid var(--bd)",borderRadius:"var(--r-sm)",fontSize:12}}/>
              {discAmt>0&&<span className="chip" style={{background:"var(--ok-bg)",color:"var(--ok)",fontSize:11}}>−{fmt(discAmt)}</span>}
            </div>
          )}

          {cart.items.length>0&&(
            <div style={{background:"linear-gradient(180deg,#FAFAFA 0%,#F5F5F5 100%)",borderRadius:"var(--r-md)",padding:"10px 12px",marginBottom:8,fontSize:11.5,border:"1px solid var(--bd2)"}}>
              <div style={{display:"flex",justifyContent:"space-between",color:"var(--mut)",marginBottom:3}}><span>Tạm tính</span><span style={{fontWeight:600,color:"var(--text2)"}}>{fmt(sub)}</span></div>
              {discAmt>0&&<div style={{display:"flex",justifyContent:"space-between",color:"var(--ok)",marginBottom:3,fontWeight:600}}><span>Giảm giá</span><span>−{fmt(discAmt)}</span></div>}
              {cart.type==="ship"&&<div style={{display:"flex",justifyContent:"space-between",color:"var(--mut)",marginBottom:3}}><span>Phí ship</span><span style={{fontWeight:600,color:"var(--text2)"}}>{fmt(dFee)}</span></div>}
              <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:800,color:"var(--text)",borderTop:"1px dashed var(--bd)",paddingTop:6,marginTop:5}}>
                <span>Tổng cộng</span><span style={{color:"var(--or)",fontSize:16}}>{fmt(total)}</span>
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:6,marginBottom:7}}>
            {[["cash","💵","Tiền mặt"],["qr","📱","VietQR"]].map(([v,e,l])=>(
              <button key={v} onClick={()=>setCart(c=>({...c,pay:v}))}
                style={{flex:1,padding:"8px 4px",border:`1.5px solid ${cart.pay===v?"var(--ok)":"var(--bd)"}`,borderRadius:"var(--r-sm)",cursor:"pointer",background:cart.pay===v?"var(--ok-bg)":"#fff",color:cart.pay===v?"var(--ok)":"var(--text2)",fontSize:11.5,fontWeight:cart.pay===v?700:500,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><span style={{fontSize:13}}>{e}</span>{l}</button>
            ))}
          </div>
          <input value={cart.note||""} onChange={e=>setCart(c=>({...c,note:e.target.value}))} placeholder="📝 Ghi chú đơn (tùy chọn)..."
            style={{...inp,padding:"7px 10px",fontSize:11.5}}/>
        </div>
        </div>

        </div>{/* /.order-scroll */}

        <div style={{padding:"10px 14px",borderTop:"1px solid var(--bd)",background:"#fff",flexShrink:0,boxShadow:"0 -6px 16px rgba(0,0,0,.08)",zIndex:10}}>
          {cart.items.length>0&&(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:11}}>
              <span style={{color:"var(--mut)"}}>{itemCount} món · {cart.type==="ship"?"Ship":"Tại chỗ"}</span>
              <span style={{color:"var(--text2)"}}>Tổng <strong style={{color:"var(--or)",fontSize:14,marginLeft:4}}>{fmt(total)}</strong></span>
            </div>
          )}
          <button onClick={create} disabled={!cart.items.length}
            className={cart.items.length?"btn-pri-grad":""}
            style={{width:"100%",padding:"14px",border:"none",borderRadius:"var(--r-md)",fontSize:14.5,fontWeight:800,cursor:cart.items.length?"pointer":"not-allowed",background:cart.items.length?"":"#e5e5e5",color:cart.items.length?"":"#999",display:"flex",alignItems:"center",justifyContent:"center",gap:8,letterSpacing:.3}}>
            {cart.items.length
              ? <><i className="ti ti-circle-check" style={{fontSize:18}}/>Tạo đơn ngay</>
              : <><i className="ti ti-shopping-cart-plus" style={{fontSize:17}}/>Chọn sản phẩm để tạo đơn</>}
          </button>
        </div>
      </div>

      <div className="order-right">
        <div style={{position:"sticky",top:-12,marginTop:-12,padding:"12px 0 10px",background:"var(--bg)",zIndex:2,display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,flexWrap:"wrap",marginBottom:4}}>
          <div style={{fontSize:13,fontWeight:800,color:"var(--text)",display:"flex",alignItems:"center",gap:6}}>
            <i className="ti ti-clock-bolt" style={{fontSize:16,color:"var(--or)"}}/>Đơn đang xử lý
            <span className="chip chip-or">{active.length}</span>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {["moi","pha_che","san_sang","dang_giao"].map(s=>{
              const n=orders.filter(o=>o.st===s).length;
              return n>0&&<Bdg key={s} s={s}/>;
            })}
          </div>
        </div>

        {/* v1.5: Đơn khách tự đặt chờ duyệt — hiển thị nổi bật trên cùng */}
        {pendingApproval.length>0 && (
          <div style={{background:"linear-gradient(135deg,#FFFBEB,#FEF3C7)",border:"2px solid #F59E0B",borderRadius:10,padding:10,marginBottom:10,boxShadow:"0 4px 14px rgba(245,158,11,.18)"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
              <span style={{fontSize:16,animation:"pulse 1.5s infinite"}}>🔔</span>
              <span style={{fontSize:12,fontWeight:800,color:"#92400E"}}>{pendingApproval.length} đơn khách chờ duyệt</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {pendingApproval.map(o=>{
                const cusTotal = o.items.reduce((s,i)=>s+i.qty*i.p,0) + (o.dFee||0);
                // v1.6: tính thời gian chờ duyệt → cảnh báo nếu > 5 phút
                const [oh,om] = (o.t||"00:00").split(":").map(Number);
                const nowMin = new Date().getHours()*60 + new Date().getMinutes();
                const waited = Math.max(0, nowMin - (oh*60+om));
                const urgent = waited > 5;
                return (
                  <div key={o.id} style={{background:"#fff",borderRadius:8,padding:"9px 11px",border:`1.5px solid ${urgent?"#EF4444":"#FCD34D"}`,boxShadow:urgent?"0 2px 10px rgba(239,68,68,.2)":"none"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontFamily:"ui-monospace,monospace",fontSize:11,fontWeight:800,color:urgent?"#B91C1C":"#92400E"}}>{o.id}</span>
                      <span style={{fontSize:10,fontWeight:700,color:urgent?"#B91C1C":"var(--mut)",display:"flex",alignItems:"center",gap:3}}>
                        {urgent && <span style={{animation:"pulse 1s infinite"}}>⚠</span>}
                        Chờ {waited}p
                      </span>
                    </div>
                    <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:3}}>{o.cus} <TPill type={o.type}/></div>
                    {o.adr && <div style={{fontSize:10.5,color:"var(--mut)",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {o.adr}</div>}
                    <div style={{fontSize:10.5,color:"var(--text2)",marginBottom:6}}>
                      {o.items.map((i,ii)=>(<span key={ii}>{i.name} ×{i.qty}{ii<o.items.length-1?", ":""}</span>))}
                    </div>
                    {o.note && <div style={{fontSize:10,color:"#92400E",fontStyle:"italic",marginBottom:6}}>💬 {o.note}</div>}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
                      <span style={{fontSize:10.5,color:"var(--mut)"}}>{(o.items||[]).reduce((s,i)=>s+i.qty,0)} món</span>
                      <span style={{fontSize:13,fontWeight:800,color:"var(--or)"}}>{fmt(cusTotal)}</span>
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>rejectCustomer(o.id)} style={{flex:1,padding:"8px",fontSize:11,fontWeight:700,background:"#fff",color:"var(--err)",border:"1.5px solid #FCA5A5",borderRadius:6,cursor:"pointer"}}>✕ Từ chối</button>
                      <button onClick={()=>approveCustomer(o.id)} style={{flex:2,padding:"8px",fontSize:11.5,fontWeight:800,background:"linear-gradient(135deg,#22C55E,#15803D)",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",boxShadow:"0 2px 8px rgba(34,197,94,.25)"}}>✓ Duyệt · KPI về tôi</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {active.length===0&&(
          <div style={{textAlign:"center",padding:"60px 16px",color:"var(--mut2)"}}>
            <i className="ti ti-mood-happy" style={{fontSize:54,display:"block",marginBottom:12,opacity:.6}}/>
            <div style={{fontSize:13,fontWeight:500}}>Không có đơn nào đang xử lý</div>
            <div style={{fontSize:11,marginTop:4,color:"var(--mut2)"}}>Tạo đơn mới từ panel bên trái</div>
          </div>
        )}
        {[...active].reverse().map(o=>{
          const byUser=staff.find(s=>s.id===o.by);
          const kpiUser=staff.find(s=>s.id===o.kpi);
          const splitKpi=o.by!==o.kpi;
          const stColor=ST[o.st]?.color||"var(--or)";
          return (
            <div key={o.id} className="card card-hover fade-up" style={{marginBottom:10,padding:0,overflow:"hidden",borderLeft:`3px solid ${stColor}`}}>
              <div style={{padding:"11px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"ui-monospace,monospace",fontSize:13,fontWeight:800,color:"var(--or)"}}>{o.id}</span>
                    <Bdg s={o.st}/><TPill type={o.type}/>
                  </div>
                  <span style={{fontSize:10,color:"var(--mut2)",fontWeight:500,whiteSpace:"nowrap"}}><i className="ti ti-clock" style={{fontSize:11,marginRight:2}}/>{o.t}</span>
                </div>
                <div style={{fontSize:12,color:"var(--text2)",marginBottom:5}}>
                  <strong style={{color:"var(--text)"}}>{o.cus}</strong>
                  {o.ph&&<span style={{color:"var(--mut)"}}> · {o.ph}</span>}
                  {o.adr&&<div style={{fontSize:11,color:"var(--mut)",marginTop:2}}><i className="ti ti-map-pin" style={{fontSize:11,marginRight:2}}/>{o.adr}</div>}
                </div>
                <div style={{fontSize:11,color:"var(--mut)",marginBottom:o.note?6:8,lineHeight:1.55,background:"#FAFAFA",padding:"6px 9px",borderRadius:"var(--r-sm)"}}>{o.items.map(i=>`${i.name}×${i.qty}${i.note?` (${i.note})`:""}`).join(" · ")}</div>
                {o.note&&<div style={{fontSize:11,color:"var(--or)",marginBottom:8,background:"var(--orl)",padding:"5px 9px",borderRadius:"var(--r-sm)",fontWeight:500}}><i className="ti ti-note" style={{fontSize:11,marginRight:3}}/>{o.note}</div>}
                <div style={{fontSize:10.5,color:"var(--mut2)",marginBottom:9,display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span><i className="ti ti-user" style={{fontSize:11,marginRight:2}}/><strong style={{color:"var(--text2)"}}>{byUser?.name||"—"}</strong></span>
                  {splitKpi&&<span>· <i className="ti ti-target" style={{fontSize:11,marginRight:2,color:"var(--or)"}}/>KPI <strong style={{color:"var(--or)"}}>{kpiUser?.name||"—"}</strong></span>}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:8,borderTop:"1px dashed var(--bd2)"}}>
                  <div>
                    <span style={{fontSize:15,fontWeight:800,color:"var(--or)"}}>{fmt(iTot(o))}</span>
                    <span className="chip" style={{marginLeft:6,fontSize:10}}>{o.pay==="qr"?"📱 QR":"💵 Mặt"}</span>
                  </div>
                  <button onClick={()=>cancel(o.id)} className="btn-ghost"
                    style={{fontSize:11,padding:"5px 11px",borderRadius:"var(--r-sm)",color:"var(--err)",borderColor:"#FCA5A5"}}
                    onMouseOver={e=>{e.currentTarget.style.background="var(--err-bg)";e.currentTarget.style.color="var(--err)"}}
                    onMouseOut={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.color="var(--err)"}}>
                    <i className="ti ti-x" style={{fontSize:12,marginRight:2}}/>Huỷ
                  </button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   CUSTOMER ORDER SCREEN (v1.4) — public, không cần PIN
   Truy cập: ?customer=1 hoặc ?qr=<table_id>
══════════════════════════════════════════════════════════ */
function CustomerOrderScreen({products,categories,zones,toast}){
  const [cart,setCart]=useState({}); // {pid: qty}
  const [showSheet,setShowSheet]=useState(false);
  const [form,setForm]=useState({cus:"",ph:"",type:"tai_cho",adr:"",zoneIdx:0,note:""});
  const [submitting,setSubmitting]=useState(false);
  const [myOrder,setMyOrder]=useState(()=>{
    try { return JSON.parse(localStorage.getItem("clb_customer_order")||"null"); } catch { return null; }
  });
  const [orderStatus,setOrderStatus]=useState(myOrder?.st||null);
  const [tableId]=useState(()=>new URLSearchParams(location.search).get("qr"));

  const cats = categories.length ? categories : Object.keys(CL_FALLBACK).map((k,i)=>({key:k,label:CL_FALLBACK[k],sort:i}));
  const [activeCat,setActiveCat]=useState(cats[0]?.key||"pha_che");
  const visible = products.filter(p=>p.on!==false && p.stock>0);
  const inCat = visible.filter(p=>p.cat===activeCat);

  const items = Object.entries(cart).map(([pid,qty])=>{
    const p=products.find(x=>x.id===+pid);
    return p?{pid:+pid,name:p.name,qty,p:p.price,emoji:p.emoji,stock:p.stock}:null;
  }).filter(Boolean);
  const subtotal = items.reduce((s,i)=>s+i.qty*i.p,0);
  const dFee = form.type==="ship" ? (zones[form.zoneIdx]?.fee||0) : 0;
  const total = subtotal + dFee;

  // Realtime track đơn của mình (nếu đã đặt)
  useEffect(()=>{
    if(!myOrder?.num) return;
    const ch = sb.channel("customer-order-"+myOrder.num)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"orders",filter:`num=eq.${myOrder.num}`},p=>{
        if(p.new?.st){
          setOrderStatus(p.new.st);
          if(p.new.st==="hoan_thanh") toast("✅ Đơn của bạn đã hoàn thành!","success");
        }
      }).subscribe();
    return ()=>sb.removeChannel(ch);
  },[myOrder?.num]);

  const inc=p=>{
    if((cart[p.id]||0)>=p.stock){ toast(`Chỉ còn ${p.stock} ${p.name}`,"warn"); return; }
    setCart(c=>({...c,[p.id]:(c[p.id]||0)+1}));
  };
  const dec=pid=>setCart(c=>{const n={...c};if(n[pid]>1)n[pid]--;else delete n[pid];return n;});

  const submit=async()=>{
    if(!form.cus.trim()){ toast("Vui lòng nhập tên","warn"); return; }
    if(!items.length){ toast("Giỏ đang trống","warn"); return; }
    if(form.type==="ship" && !form.adr.trim()){ toast("Vui lòng nhập địa chỉ giao","warn"); return; }
    setSubmitting(true);
    try {
      // Lấy số đơn kế tiếp
      const {data:maxRow} = await sb.from("orders").select("num").order("num",{ascending:false}).limit(1).maybeSingle();
      const num = (maxRow?.num||0)+1;
      const newOrder = {
        num, t:nowS(), cus:form.cus.trim(), ph:form.ph||"", type:form.type,
        adr:form.type==="ship"?form.adr.trim():(tableId?`Bàn ${tableId}`:""),
        items:items.map(i=>({pid:i.pid,name:i.name,qty:i.qty,p:i.p,note:""})),
        st:"cho_xac_nhan", pay:"cash", d_fee:dFee, disc:0, d_t:"fixed",
        by_id:null, kpi_id:null, sid:null,
        note:(form.note||"")+(tableId?` [QR bàn ${tableId}]`:" [Khách tự đặt]"),
        return_reason:null
      };
      const {error} = await sb.from("orders").insert(newOrder);
      if(error){ toast("Lỗi đặt đơn: "+error.message,"error"); setSubmitting(false); return; }
      // KHÔNG trừ kho lúc này — trực đơn duyệt mới trừ (tránh lãng phí kho cho đơn bị từ chối)
      const saved={num,id:`ĐH${String(num).padStart(3,"0")}`,st:"cho_xac_nhan",total,cus:form.cus.trim(),items:newOrder.items,t:nowS()};
      localStorage.setItem("clb_customer_order",JSON.stringify(saved));
      setMyOrder(saved); setOrderStatus("cho_xac_nhan");
      setCart({}); setShowSheet(false); setSubmitting(false);
      toast(`✅ Đã đặt đơn ${saved.id} — đang chờ duyệt`,"success");
    } catch(e){
      console.error(e); toast("Lỗi không xác định","error"); setSubmitting(false);
    }
  };

  const newOrder=()=>{
    localStorage.removeItem("clb_customer_order");
    setMyOrder(null); setOrderStatus(null);
    setForm({cus:"",ph:"",type:"tai_cho",adr:"",zoneIdx:0,note:""});
  };

  // ── MÀN STATUS sau khi đặt ──
  if(myOrder){
    const stInfo=ST[orderStatus]||ST.moi;
    const statusSteps=["cho_xac_nhan","moi","pha_che","san_sang","dang_giao","hoan_thanh"];
    const curStep=statusSteps.indexOf(orderStatus);
    const isCancelled=orderStatus==="huy"||orderStatus==="hoan_hang";
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#FFF4F0 0%,#fff 100%)",padding:"24px 16px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:48,marginBottom:8}}>{isCancelled?"😢":(orderStatus==="hoan_thanh"?"🎉":"☕")}</div>
            <div style={{fontSize:20,fontWeight:800,color:"var(--or)"}}>{isCancelled?"Đơn đã huỷ":(orderStatus==="hoan_thanh"?"Cảm ơn bạn!":"Đã ghi nhận đơn")}</div>
            <div style={{fontSize:13,color:"var(--mut)",marginTop:4}}>Mã đơn: <b style={{color:"var(--text)"}}>{myOrder.id}</b></div>
          </div>
          <div style={{background:"#fff",borderRadius:14,padding:18,boxShadow:"var(--sh-md)",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:12,color:"var(--mut)"}}>Trạng thái</span>
              <span style={{padding:"4px 10px",borderRadius:"var(--r-pill)",background:stInfo.bg,color:stInfo.color,fontSize:12,fontWeight:700}}>{stInfo.label}</span>
            </div>
            {!isCancelled && (
              <div style={{display:"flex",justifyContent:"space-between",position:"relative",marginBottom:12}}>
                <div style={{position:"absolute",top:10,left:10,right:10,height:2,background:"#E8E8E8",zIndex:0}}/>
                <div style={{position:"absolute",top:10,left:10,height:2,background:"var(--or)",zIndex:1,transition:"width .4s var(--ease)",width:curStep<0?0:`calc(${(curStep/(statusSteps.length-1))*100}% - 20px)`}}/>
                {statusSteps.map((s,i)=>(
                  <div key={s} style={{position:"relative",zIndex:2,display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                    <div style={{width:20,height:20,borderRadius:"50%",background:i<=curStep?"var(--or)":"#E8E8E8",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{i<=curStep?"✓":i+1}</div>
                    <div style={{fontSize:9,color:i<=curStep?"var(--or)":"var(--mut)",marginTop:4,fontWeight:600,textAlign:"center"}}>{ST[s]?.label}</div>
                  </div>
                ))}
              </div>
            )}
            <div style={{borderTop:"1px dashed var(--bd)",marginTop:12,paddingTop:12}}>
              {myOrder.items.map((i,idx)=>(
                <div key={idx} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0"}}>
                  <span>{i.name} × {i.qty}</span><span>{fmt(i.qty*i.p)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:14,marginTop:8,paddingTop:8,borderTop:"1px solid var(--bd2)",color:"var(--or)"}}>
                <span>Tổng</span><span>{fmt(myOrder.total)}</span>
              </div>
            </div>
          </div>
          <button onClick={newOrder} className="btn-pri" style={{width:"100%",padding:"12px",borderRadius:"var(--r-md)",fontSize:13.5}}>Đặt đơn mới</button>
          <div style={{textAlign:"center",fontSize:10.5,color:"var(--mut)",marginTop:12}}>Trang sẽ tự cập nhật khi trạng thái thay đổi</div>
        </div>
      </div>
    );
  }

  // ── MÀN MENU ──
  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:items.length?86:20,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{background:"var(--or-grad)",color:"#fff",padding:"18px 16px 14px",boxShadow:"var(--sh-md)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:28}}>🛒</div>
          <div>
            <div style={{fontSize:16,fontWeight:800,letterSpacing:.3}}>CLB BÁN HÀNG</div>
            <div style={{fontSize:11,opacity:.9}}>{tableId?`📍 Bàn ${tableId}`:"Đặt món trực tuyến"}</div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:6,padding:"12px 12px 8px",overflowX:"auto",background:"#fff",borderBottom:"1px solid var(--bd2)",position:"sticky",top:0,zIndex:5}}>
        {cats.map(c=>(
          <button key={c.key} onClick={()=>setActiveCat(c.key)}
            style={{flexShrink:0,padding:"7px 14px",borderRadius:"var(--r-pill)",border:"1px solid "+(activeCat===c.key?"var(--or)":"var(--bd)"),background:activeCat===c.key?"var(--or)":"#fff",color:activeCat===c.key?"#fff":"var(--text2)",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            {c.label}
          </button>
        ))}
      </div>

      <div style={{padding:12,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
        {inCat.length===0 && <div style={{gridColumn:"1/-1",textAlign:"center",padding:30,color:"var(--mut)",fontSize:12}}>Không còn món trong danh mục này</div>}
        {inCat.map(p=>{
          const q=cart[p.id]||0;
          return (
            <div key={p.id} className="card" style={{padding:10,display:"flex",flexDirection:"column",gap:6}}>
              <div style={{fontSize:36,textAlign:"center",lineHeight:1}}>{p.emoji||"🍽️"}</div>
              <div style={{fontSize:12.5,fontWeight:700,color:"var(--text)",minHeight:32}} className="clamp-2">{p.name}</div>
