            ["Thành viên active",staff.filter(s=>s.active).length+" / "+staff.length],
            ["Sản phẩm hiển thị",products.filter(p=>p.on!==false).length+" / "+products.length],
            ["Lưu trữ","Supabase Cloud"],
          ].map(([l,v])=>(
            <div key={l} style={{padding:"10px 12px",background:"#fafafa",borderRadius:6}}>
              <div style={{fontSize:10,color:"#999",fontWeight:700,marginBottom:3,letterSpacing:".3px"}}>{l.toUpperCase()}</div>
              <div style={{fontSize:13,color:"#212121",fontWeight:700}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #f0f0f0",fontSize:11,color:"#767676",lineHeight:1.6}}>
          💡 Dữ liệu được lưu trên <b>Supabase Cloud</b> với realtime sync. Mọi thay đổi đồng bộ tự động cho tất cả thiết bị đang mở app. Để xoá toàn bộ dữ liệu, vào Supabase Dashboard → SQL Editor và chạy <code>TRUNCATE TABLE orders, products, staff, zones RESTART IDENTITY;</code>
        </div>
      </div>
    </>
  );
}

/* ══════════════════════════════════════════════════════════
   ROLE APP SHELL (v1.5) — vỏ standalone cho từng role
   Header tối giản (logout + status), KHÔNG sidebar/topbar admin.
   Dùng cho pha_che, truc_don (shipper có vỏ riêng ShipperApp).
══════════════════════════════════════════════════════════ */
function RoleAppShell({roleKey,title,icon,bgColor,currentUser,currentShift,connStatus,onLogout,onlineUsers=[],children}){
  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",overflow:"hidden",background:"#F5F5F5"}}>
      {/* App header */}
      <div style={{background:bgColor||"#0F172A",color:"#fff",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:"1px solid rgba(255,255,255,.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,minWidth:0}}>
          <span style={{fontSize:18}}>{icon}</span>
          <div style={{minWidth:0}}>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:.5,lineHeight:1.1}}>{title}</div>
            <div style={{fontSize:10,opacity:.7,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{currentUser.name}{currentShift?` · ${currentShift.name}`:""}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {onlineUsers.length>0 && (
            <div style={{fontSize:10.5,display:"flex",alignItems:"center",gap:4,opacity:.85,padding:"3px 8px",background:"rgba(255,255,255,.08)",borderRadius:"var(--r-pill)"}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 6px #22c55e"}}/>
              {onlineUsers.length}
            </div>
          )}
          <div style={{fontSize:10.5,display:"flex",alignItems:"center",gap:4,opacity:.85}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:connStatus==="live"?"#22c55e":"#ef4444"}}/>
            {connStatus==="live"?"Online":"Offline"}
          </div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",color:"#fff",fontSize:11,padding:"5px 11px",borderRadius:"var(--r-pill)",cursor:"pointer",fontWeight:600}}>
            <i className="ti ti-logout" style={{fontSize:12,marginRight:4}}/>Thoát
          </button>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>{children}</div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════════ */
function App(){
  const [screen,setScreen]   = useState("dashboard");
  const [orders,_setOrders]  = useState([]);
  const [products,_setProducts]= useState([]);
  const [staff,_setStaff]    = useState([]);
  const [zones,_setZones]    = useState([]);
  const [shift,_setShift]    = useState({name:"Ca sáng",start:"07:45",end:"12:00"});
  const [categories,_setCategories] = useState([]);
  const [shifts,_setShifts]  = useState([]);
  const [shiftAssignments,_setShiftAssignments] = useState([]);
  const [currentUser,setCurrentUser] = useState(null);
  const [onlineUsers,setOnlineUsers] = useState([]); // v1.4: presence tracking
  const channelRef = useRef(null);
  const [notifEnabled,setNotifEnabled] = useState(()=>localStorage.getItem("clb_notif")==="1");
  const [tickMin,setTickMin] = useState(0); // re-render mỗi phút để cập nhật ca hiện tại
  const [toasts,setToasts]   = useState([]);
  const [time,setTime]       = useState(nowS());
  const [loading,setLoading] = useState(true);
  const [connStatus,setConnStatus] = useState("connecting");
  const [sbOpen,setSbOpen]   = useState(false);

  // Refs để diff-wrapper có prev mới nhất (đồng bộ với state)
  const ordersRef     = useRef([]);
  const productsRef   = useRef([]);
  const staffRef      = useRef([]);
  const zonesRef      = useRef([]);
  const shiftRef      = useRef(shift);
  const categoriesRef = useRef([]);
  const shiftsRef     = useRef([]);
  const effectiveRoleRef = useRef("off");
  const currentUserRef   = useRef(null);
  const notifEnabledRef  = useRef(notifEnabled);

  const toast=useCallback((msg,type="info")=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);
  const dismiss=id=>setToasts(t=>t.filter(x=>x.id!==id));

  // ── Diff wrapper: tự đồng bộ state local lên Supabase ──
  const syncToDb = (prev, next, table, idKey, mapToDb) => {
    const prevById = new Map(prev.map(x=>[x[idKey], x]));
    const nextById = new Map(next.map(x=>[x[idKey], x]));
    for (const x of next) {
      const p = prevById.get(x[idKey]);
      if (!p) {
        sb.from(table).insert(mapToDb(x)).then(({error})=>{
          if (error) toast(`Lỗi thêm ${table}: ${error.message}`,"error");
        });
      } else if (JSON.stringify(p) !== JSON.stringify(x)) {
        sb.from(table).update(mapToDb(x)).eq(idKey, x[idKey]).then(({error})=>{
          if (error) toast(`Lỗi cập nhật ${table}: ${error.message}`,"error");
        });
      }
    }
    for (const x of prev) {
      if (!nextById.has(x[idKey])) {
        sb.from(table).delete().eq(idKey, x[idKey]).then(({error})=>{
          if (error) toast(`Lỗi xoá ${table}: ${error.message}`,"error");
        });
      }
    }
  };

  const setOrders = useCallback(updater=>{
    const prev = ordersRef.current;
    const next = typeof updater==="function" ? updater(prev) : updater;
    ordersRef.current = next;
    _setOrders(next);
    syncToDb(prev, next, "orders", "num", orderToDb);
  },[]);
  const setProducts = useCallback(updater=>{
    const prev = productsRef.current;
    const next = typeof updater==="function" ? updater(prev) : updater;
    productsRef.current = next;
    _setProducts(next);
    syncToDb(prev, next, "products", "id", productToDb);
  },[]);
  const setStaff = useCallback(updater=>{
    const prev = staffRef.current;
    const next = typeof updater==="function" ? updater(prev) : updater;
    staffRef.current = next;
    _setStaff(next);
    syncToDb(prev, next, "staff", "id", s=>s);
  },[]);
  const setZones = useCallback(updater=>{
    const prev = zonesRef.current;
    const next = typeof updater==="function" ? updater(prev) : updater;
    // Gán id cho zone mới nếu chưa có
    const nextWithIds = next.map((z,i)=>z.id?z:{...z,id:Math.max(0,...next.map(x=>x.id||0),...prev.map(x=>x.id||0))+1+i,sort:i});
    zonesRef.current = nextWithIds;
    _setZones(nextWithIds);
    syncToDb(prev, nextWithIds, "zones", "id", z=>z);
  },[]);
  const setShift = useCallback(updater=>{
    const prev = shiftRef.current;
    const next = typeof updater==="function" ? updater(prev) : updater;
    shiftRef.current = next;
    _setShift(next);
    sb.from("shift").update(shiftToDb(next)).eq("id",1).then(({error})=>{
      if (error) toast(`Lỗi cập nhật ca: ${error.message}`,"error");
    });
  },[]);
  const setCategories = useCallback(updater=>{
    const prev = categoriesRef.current;
    const next = typeof updater==="function" ? updater(prev) : updater;
    categoriesRef.current = next;
    _setCategories(next);
    syncToDb(prev, next, "categories", "key", c=>c);
  },[]);
  const setShifts = useCallback(updater=>{
    const prev = shiftsRef.current;
    const next = typeof updater==="function" ? updater(prev) : updater;
    shiftsRef.current = next;
    _setShifts(next);
    syncToDb(prev, next, "shifts", "id", s=>s);
  },[]);
  /* Composite key — không dùng diff wrapper, gọi DB trực tiếp + optimistic update */
  const upsertAssignment = useCallback(async (shift_id, staff_id, role) => {
    // Role "off" = xoá phân công khỏi ca (không lưu rỗng vào DB)
    if (role === "off") {
      _setShiftAssignments(prev=>prev.filter(x=>!(x.shift_id===shift_id && x.staff_id===staff_id)));
      const {error} = await sb.from("shift_assignments").delete().match({shift_id,staff_id});
      if (error) toast(`Lỗi xoá phân ca: ${error.message}`,"error");
      return;
    }
    _setShiftAssignments(prev=>{
      const ex = prev.find(x=>x.shift_id===shift_id && x.staff_id===staff_id);
      return ex
        ? prev.map(x=>(x.shift_id===shift_id && x.staff_id===staff_id)?{...x,role}:x)
        : [...prev,{shift_id,staff_id,role}];
    });
    const {error} = await sb.from("shift_assignments").upsert({shift_id,staff_id,role});
    if (error) toast(`Lỗi phân ca: ${error.message}`,"error");
  },[]);
  const deleteAssignment = useCallback(async (shift_id, staff_id) => {
    _setShiftAssignments(prev=>prev.filter(x=>!(x.shift_id===shift_id && x.staff_id===staff_id)));
    const {error} = await sb.from("shift_assignments").delete().match({shift_id,staff_id});
    if (error) toast(`Lỗi xoá phân ca: ${error.message}`,"error");
  },[]);

  // ── Initial fetch ──
  useEffect(()=>{
    (async()=>{
      try{
        const [pR,sR,oR,zR,shR,cR,shsR,saR] = await Promise.all([
          sb.from("products").select("*").order("id"),
          sb.from("staff").select("*").order("id"),
          sb.from("orders").select("*").order("num"),
          sb.from("zones").select("*").order("sort"),
          sb.from("shift").select("*").eq("id",1).maybeSingle(),
          sb.from("categories").select("*").order("sort"),
          sb.from("shifts").select("*").order("sort"),
          sb.from("shift_assignments").select("*"),
        ]);
        if (pR.error||sR.error||oR.error||zR.error){
          toast("Lỗi tải dữ liệu. Kiểm tra Supabase / chạy schema.sql","error");
          console.error(pR.error,sR.error,oR.error,zR.error,cR.error,shsR.error,saR.error);
          setLoading(false); return;
        }
        const ps = (pR.data||[]).map(productFromDb);
        const ss = sR.data||[];
        const os = (oR.data||[]).map(orderFromDb);
        const zs = zR.data||[];
        const sh = shR.data ? shiftFromDb(shR.data) : {name:"Ca sáng",start:"07:45",end:"12:00"};
        const cs = cR.data || [];
        const shs = shsR.data || [];
        const sas = saR.data || [];
        productsRef.current=ps; staffRef.current=ss; ordersRef.current=os; zonesRef.current=zs; shiftRef.current=sh; categoriesRef.current=cs; shiftsRef.current=shs;
        _setProducts(ps); _setStaff(ss); _setOrders(os); _setZones(zs); _setShift(sh); _setCategories(cs); _setShifts(shs); _setShiftAssignments(sas);
        // Auto-login bằng PIN đã lưu (nếu vẫn match)
        const savedPin = localStorage.getItem("clb_pin");
        if (savedPin){
          const u = ss.find(x=>x.pin===savedPin && x.active);
          if (u) setCurrentUser(u);
          else localStorage.removeItem("clb_pin");
        }
        setLoading(false);
        toast("✅ Đã kết nối Supabase","success");
      }catch(e){
        console.error(e);
        toast("Không kết nối được Supabase","error");
        setLoading(false);
      }
    })();
  },[]);

  const handleLogin = (u) => {
    localStorage.setItem("clb_pin", u.pin);
    setCurrentUser(u);
    toast(`👋 Xin chào ${u.name}`,"success");
    // Mặc định vào màn đầu tiên user được phép xem
    const allowed = ROLE_PERMS[u.role] || ["dashboard"];
    setScreen(allowed[0]);
  };
  const handleLogout = () => {
    if (!confirm("Đăng xuất khỏi hệ thống?")) return;
    localStorage.removeItem("clb_pin");
    setCurrentUser(null);
  };

  // ── Realtime subscriptions ──
  useEffect(()=>{
    const mergeProduct = r => {
      const p = productFromDb(r);
      _setProducts(ps=>{
        const ex = ps.find(x=>x.id===p.id);
        if (ex && JSON.stringify(ex)===JSON.stringify(p)) return ps;
        const next = ex ? ps.map(x=>x.id===p.id?p:x) : [...ps,p].sort((a,b)=>a.id-b.id);
        productsRef.current = next;
        return next;
      });
    };
    const mergeStaff = r => {
      _setStaff(ss=>{
        const ex = ss.find(x=>x.id===r.id);
        if (ex && JSON.stringify(ex)===JSON.stringify(r)) return ss;
        const next = ex ? ss.map(x=>x.id===r.id?r:x) : [...ss,r].sort((a,b)=>a.id-b.id);
        staffRef.current = next;
        return next;
      });
    };
    const mergeOrder = r => {
      const o = orderFromDb(r);
      _setOrders(os=>{
        const ex = os.find(x=>x.num===o.num);
        if (ex && JSON.stringify(ex)===JSON.stringify(o)) return os;
        const next = ex ? os.map(x=>x.num===o.num?o:x) : [...os,o].sort((a,b)=>a.num-b.num);
        ordersRef.current = next;
        return next;
      });
    };
    const mergeZone = r => {
      _setZones(zs=>{
        const ex = zs.find(x=>x.id===r.id);
        if (ex && JSON.stringify(ex)===JSON.stringify(r)) return zs;
        const next = ex ? zs.map(x=>x.id===r.id?r:x) : [...zs,r].sort((a,b)=>(a.sort||0)-(b.sort||0));
        zonesRef.current = next;
        return next;
      });
    };
    const mergeShift = r => {
      const s = shiftFromDb(r);
      _setShift(prev=>{
        if (JSON.stringify(prev)===JSON.stringify(s)) return prev;
        shiftRef.current = s;
        return s;
      });
    };
    const mergeCat = r => {
      _setCategories(cs=>{
        const ex = cs.find(x=>x.key===r.key);
        if (ex && JSON.stringify(ex)===JSON.stringify(r)) return cs;
        const next = ex ? cs.map(x=>x.key===r.key?r:x) : [...cs,r].sort((a,b)=>(a.sort||0)-(b.sort||0));
        categoriesRef.current = next;
        return next;
      });
    };
    const removeFrom = (setter, refObj, idKey, val) => {
      setter(arr=>{
        if (!arr.find(x=>x[idKey]===val)) return arr;
        const next = arr.filter(x=>x[idKey]!==val);
        refObj.current = next;
        return next;
      });
    };

    const ch = sb.channel("clb-realtime",{config:{presence:{key:"clb-presence"}}})
      .on("presence",{event:"sync"},()=>{
        const state = ch.presenceState();
        // state shape: { socketKey: [ {id,name,role,joinedAt}, ... ], ... }
        // Dedupe theo id (1 user có thể mở nhiều tab)
        const seen = new Map();
        Object.values(state).flat().forEach(u=>{ if(u && u.id!=null && !seen.has(u.id)) seen.set(u.id,u); });
        setOnlineUsers(Array.from(seen.values()));
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"products"},p=>{
        if (p.eventType==="DELETE") removeFrom(_setProducts,productsRef,"id",p.old.id);
        else mergeProduct(p.new);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"staff"},p=>{
        if (p.eventType==="DELETE") removeFrom(_setStaff,staffRef,"id",p.old.id);
        else mergeStaff(p.new);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"orders"},p=>{
        if (p.eventType==="DELETE") { removeFrom(_setOrders,ordersRef,"num",p.old.num); return; }
        const r = p.new;
        const role = effectiveRoleRef.current;
        // Push notification theo role
        if (p.eventType === "INSERT") {
          // v1.5: đơn khách tự đặt vào cho_xac_nhan → báo trực đơn duyệt
          if (r.st === "cho_xac_nhan") {
            if (role === "truc_don" || role === "truong_ca" || role === "admin") {
              const itemCount = (r.items||[]).reduce((s,i)=>s+(i.qty||0),0);
              notify(`🔔 Đơn khách chờ duyệt: ${orderId(r.num)}`, `${r.cus} — ${itemCount} món`);
            }
          } else if (role === "pha_che" || role === "truong_ca") {
            const itemCount = (r.items||[]).reduce((s,i)=>s+(i.qty||0),0);
            notify(`🆕 Đơn mới ${orderId(r.num)}`, `${r.cus} — ${itemCount} món`);
          }
        } else if (p.eventType === "UPDATE") {
          const old = p.old || {};
          // Đơn sẵn sàng ship & chưa có shipper → báo trưởng ca + shipper (self-claim pool)
          if (r.st === "san_sang" && r.type === "ship" && old.st !== "san_sang" && r.sid == null) {
            if (role === "truong_ca" || role === "admin") {
              notify(`📦 Đơn cần phân shipper ${orderId(r.num)}`, `${r.cus} — ${r.adr||""}`);
            }
            if (role === "shipper") {
              notify(`🆕 Đơn mới có thể nhận: ${orderId(r.num)}`, `${r.cus} — ${r.adr||""}`);
            }
          }
          // Shipper bị gán đơn (sid thay đổi sang chính họ) → báo riêng cho shipper đó
          const uid = currentUserRef.current?.id;
          if (role === "shipper" && r.sid === uid && old.sid !== uid) {
            notify(`🛵 Bạn vừa được giao đơn ${orderId(r.num)}`, `${r.cus} — ${r.adr||""}`);
          }
        }
        mergeOrder(r);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"zones"},p=>{
        if (p.eventType==="DELETE") removeFrom(_setZones,zonesRef,"id",p.old.id);
        else mergeZone(p.new);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"shift"},p=>{
        if (p.eventType!=="DELETE" && p.new) mergeShift(p.new);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"categories"},p=>{
        if (p.eventType==="DELETE") {
          _setCategories(cs=>{
            if (!cs.find(x=>x.key===p.old.key)) return cs;
            const next = cs.filter(x=>x.key!==p.old.key);
            categoriesRef.current = next;
            return next;
          });
        } else mergeCat(p.new);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"shifts"},p=>{
        if (p.eventType==="DELETE") {
          _setShifts(arr=>{
            if (!arr.find(x=>x.id===p.old.id)) return arr;
            const next = arr.filter(x=>x.id!==p.old.id);
            shiftsRef.current = next; return next;
          });
        } else {
          const r = p.new;
          _setShifts(arr=>{
            const ex = arr.find(x=>x.id===r.id);
            if (ex && JSON.stringify(ex)===JSON.stringify(r)) return arr;
            const next = ex ? arr.map(x=>x.id===r.id?r:x) : [...arr,r].sort((a,b)=>(a.sort||0)-(b.sort||0));
            shiftsRef.current = next; return next;
          });
        }
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"shift_assignments"},p=>{
        if (p.eventType==="DELETE") {
          _setShiftAssignments(arr=>arr.filter(x=>!(x.shift_id===p.old.shift_id && x.staff_id===p.old.staff_id)));
        } else {
          const r = p.new;
          _setShiftAssignments(arr=>{
            const ex = arr.find(x=>x.shift_id===r.shift_id && x.staff_id===r.staff_id);
            if (ex && JSON.stringify(ex)===JSON.stringify(r)) return arr;
            return ex ? arr.map(x=>(x.shift_id===r.shift_id && x.staff_id===r.staff_id)?r:x) : [...arr,r];
          });
        }
      })
      .subscribe(async status=>{
        if (status==="SUBSCRIBED") {
          setConnStatus("live");
          // Nếu đã login, track presence ngay khi channel sẵn sàng
          if (currentUserRef.current) {
            await ch.track({
              id: currentUserRef.current.id,
              name: currentUserRef.current.name,
              role: effectiveRoleRef.current || currentUserRef.current.role,
              joinedAt: Date.now()
            });
          }
        }
        else if (status==="CHANNEL_ERROR"||status==="CLOSED") setConnStatus("offline");
      });
    channelRef.current = ch;
    return ()=>{ sb.removeChannel(ch); channelRef.current = null; };
  },[]);

  // v1.4: re-track presence khi login/logout/role đổi (theo ca)
  useEffect(()=>{
    const ch = channelRef.current;
    if (!ch) return;
    if (currentUser) {
      ch.track({
        id: currentUser.id,
        name: currentUser.name,
        role: effectiveRoleRef.current || currentUser.role,
        joinedAt: Date.now()
      }).catch(()=>{});
    } else {
      ch.untrack().catch(()=>{});
      setOnlineUsers([]);
    }
  },[currentUser, tickMin]); // tickMin để cập nhật role khi ca chuyển

  useEffect(()=>{const t=setInterval(()=>setTime(nowS()),20000);return()=>clearInterval(t);},[]);
  // Re-render mỗi 60s để effectiveRole cập nhật khi ca chuyển
  useEffect(()=>{const t=setInterval(()=>setTickMin(x=>x+1),60000);return()=>clearInterval(t);},[]);

  // Lưu pref notification
  useEffect(()=>{
    notifEnabledRef.current = notifEnabled;
    localStorage.setItem("clb_notif", notifEnabled?"1":"0");
  },[notifEnabled]);

  const notify = useCallback((title, body) => {
    if (!notifEnabledRef.current) return;
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    try { new Notification(title, {body, icon:"🛒", tag:"clb-"+Date.now(), silent:false}); } catch(e){}
  },[]);

  const toggleNotif = useCallback(async () => {
    if (!("Notification" in window)) { toast("Trình duyệt không hỗ trợ thông báo","error"); return; }
    if (notifEnabled) { setNotifEnabled(false); toast("Đã tắt thông báo","info"); return; }
    if (Notification.permission === "denied") {
      toast("Đã bị chặn — vào cài đặt trình duyệt cho phép","warn"); return;
    }
    if (Notification.permission === "default") {
      const p = await Notification.requestPermission();
      if (p !== "granted") { toast("Bạn đã từ chối quyền thông báo","warn"); return; }
    }
    setNotifEnabled(true);
    toast("✓ Đã bật thông báo realtime","success");
    try { new Notification("Thông báo đã bật",{body:"Bạn sẽ nhận thông báo cho các sự kiện liên quan",icon:"🛒"}); } catch(e){}
  },[notifEnabled,toast]);

  // Tính ca hiện tại sớm để SCREENS dùng được (dù chưa có currentUser)
  const currentShift = getCurrentShift(shifts);
  const effectiveRoleEarly = getEffectiveRole(currentShift, shiftAssignments, currentUser);
  if (currentUser) { effectiveRoleRef.current = effectiveRoleEarly; currentUserRef.current = currentUser; }

  const SCREENS={
    dashboard:{title:"Tổng quan",       sub:`${currentShift?currentShift.name+" · "+currentShift.start_at+"–"+currentShift.end_at:"Ngoài giờ làm việc"} · ${shiftAssignments.filter(a=>a.shift_id===currentShift?.id && a.role!=="off").length} thành viên phân ca · 🟢 ${onlineUsers.length} đang online`,
               comp:<Dashboard orders={orders} staff={staff}/>},
    order:    {title:"Trực đơn",         sub:"Nhận & tạo đơn hàng · Tách KPI người sale",
               comp:<OrderScreen orders={orders} setOrders={setOrders} products={products} setProducts={setProducts} staff={staff} currentUser={currentUser} zones={zones} categories={categories} toast={toast} shiftAssignments={shiftAssignments} currentShift={currentShift}/>},
    kitchen:  {title:"Pha chế (KDS)",    sub:"Kitchen Display System · Realtime",
               comp:<KitchenScreen orders={orders} setOrders={setOrders} products={products} setProducts={setProducts} staff={staff} toast={toast}/>},
    shipper:  {title:"Giao hàng",        sub:"Quản lý shipper & vận chuyển",
               comp:<ShipperScreen orders={orders} setOrders={setOrders} setProducts={setProducts} staff={staff} currentUser={currentUser} effectiveRole={effectiveRole} toast={toast}/>},
    staff:    {title:"Nhân sự & KPI",    sub:"Phân công · Theo dõi KPI · Bảng xếp hạng",
               comp:<StaffScreen orders={orders} staff={staff}/>},
    report:   {title:"Báo cáo & Log",    sub:"Tổng kết cuối ca · Xuất dữ liệu CSV",
               comp:<ReportScreen orders={orders} staff={staff} products={products} shift={currentShift?{name:currentShift.name,start:currentShift.start_at,end:currentShift.end_at}:shift} toast={toast}/>},
    settings: {title:"Cài đặt",          sub:"Quản lý nhân sự, sản phẩm, danh mục, lịch ca",
               comp:<SettingsScreen products={products} setProducts={setProducts} staff={staff} setStaff={setStaff} zones={zones} setZones={setZones} shift={shift} setShift={setShift} categories={categories} setCategories={setCategories} shifts={shifts} setShifts={setShifts} shiftAssignments={shiftAssignments} upsertAssignment={upsertAssignment} deleteAssignment={deleteAssignment} currentUser={currentUser} toast={toast}/>},
  };

  if (loading) {
    return (
      <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{width:48,height:48,border:"4px solid #FFE4D8",borderTop:"4px solid var(--or)",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
        <div style={{fontSize:13,color:"#767676"}}>Đang kết nối...</div>
      </div>
    );
  }

  if (staff.length===0) {
    return (
      <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
        <div style={{maxWidth:480,textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:700,color:"#212121",marginBottom:8}}>Chưa có dữ liệu</div>
          <div style={{fontSize:13,color:"#767676",lineHeight:1.6,marginBottom:14}}>
            Hãy vào <b>Supabase Dashboard → SQL Editor</b>, paste toàn bộ file <code style={{background:"#fafafa",padding:"2px 6px",borderRadius:4,color:"var(--or)"}}>supabase-schema.sql</code> và chạy. Sau đó refresh trang.
          </div>
          <button onClick={()=>location.reload()} className="btn-pri" style={{padding:"10px 20px",borderRadius:6,fontSize:13}}>Tải lại trang</button>
        </div>
      </div>
    );
  }

  // v1.4: Khách hàng tự đặt — không cần PIN. Truy cập qua ?customer=1 hoặc ?qr=<tableId>
  const urlParams = new URLSearchParams(location.search);
  if (urlParams.has("customer") || urlParams.has("qr")) {
    return <CustomerOrderScreen products={products} categories={categories} zones={zones} toast={toast}/>;
  }

  if (!currentUser) {
    return <LoginScreen staff={staff} onLogin={handleLogin}/>;
  }

  const effectiveRole = effectiveRoleEarly;

  // Đang nghỉ → màn rest
  if (effectiveRole === "off") {
    return <RestScreen user={currentUser} currentShift={currentShift} shifts={shifts} shiftAssignments={shiftAssignments} onLogout={handleLogout}/>;
  }

  // v1.5: Shipper có app standalone riêng (không sidebar/topbar admin)
  if (effectiveRole === "shipper") {
    // Reuse logic action từ ShipperScreen handlers (định nghĩa inline ở đây để có setOrders/setProducts)
    const setSt = (oid,patch,msg,type="success") => {
      setOrders(os=>os.map(o=>o.id===oid?{...o,...patch}:o));
      if (msg) toast(msg,type);
    };
    const restoreStockShipper = (oid) => {
      const o = orders.find(x=>x.id===oid);
      if (!o || ["huy","hoan_thanh","hoan_hang"].includes(o.st)) return;
      setProducts(ps=>ps.map(p=>{const ci=o.items.find(i=>i.pid===p.id);return ci?{...p,stock:p.stock+ci.qty}:p;}));
    };
    const pickup    = oid => setSt(oid,{st:"da_lay"},`Đã ghi nhận lấy đơn ${oid}`);
    const startShip = oid => setSt(oid,{st:"dang_giao"},`Bắt đầu giao đơn ${oid}`);
    const complete  = oid => setSt(oid,{st:"hoan_thanh"},`✓ Giao thành công ${oid}`);
    const cancelSh  = oid => { if(!confirm("Huỷ đơn này?")) return; restoreStockShipper(oid); setSt(oid,{st:"huy"},"Đã huỷ đơn · đã hoàn kho","warn"); };
    const doReturnSh= (oid,reason) => setSt(oid,{st:"hoan_hang",returnReason:reason},"↩️ Đã ghi nhận hoàn hàng","warn");
    return <ShipperApp
      orders={orders} currentUser={currentUser} staff={staff}
      pickup={pickup} startShip={startShip} complete={complete}
      cancel={cancelSh} doReturn={doReturnSh}
      onLogout={handleLogout} toast={toast}
      connStatus={connStatus} currentShift={currentShift} onlineUsers={onlineUsers}/>;
  }

  // v1.5: Pha chế có app riêng (KitchenScreen + shell tối giản)
  if (effectiveRole === "pha_che") {
    return <RoleAppShell roleKey="pha_che" title="PHA CHẾ — KDS" icon="☕" bgColor="linear-gradient(135deg,#1E40AF,#1E3A8A)"
      currentUser={currentUser} currentShift={currentShift} connStatus={connStatus} onLogout={handleLogout} onlineUsers={onlineUsers}>
      <KitchenScreen orders={orders} setOrders={setOrders} products={products} setProducts={setProducts} staff={staff} toast={toast}/>
    </RoleAppShell>;
  }

  // v1.5: Trực đơn có app riêng (OrderScreen + shell tối giản)
  if (effectiveRole === "truc_don") {
    return <RoleAppShell roleKey="truc_don" title="TRỰC ĐƠN" icon="📋" bgColor="linear-gradient(135deg,#C73D22,#A12714)"
      currentUser={currentUser} currentShift={currentShift} connStatus={connStatus} onLogout={handleLogout} onlineUsers={onlineUsers}>
      <OrderScreen orders={orders} setOrders={setOrders} products={products} setProducts={setProducts} staff={staff} currentUser={currentUser} zones={zones} categories={categories} toast={toast} shiftAssignments={shiftAssignments} currentShift={currentShift}/>
    </RoleAppShell>;
  }

  // Lọc màn theo role thực tế
  const allowed = ROLE_PERMS[effectiveRole] || [];
  const activeScreen = allowed.includes(screen) ? screen : (allowed[0]||"dashboard");
  const cur = SCREENS[activeScreen];

  return (
    <div className="app-shell" style={{fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif"}}>
      {sbOpen && <div className="sb-overlay" onClick={()=>setSbOpen(false)}/>}
      <Sidebar screen={activeScreen} setScreen={(s)=>{setScreen(s);setSbOpen(false);}} orders={orders} currentShift={currentShift} allowed={allowed} sbOpen={sbOpen} onClose={()=>setSbOpen(false)} onLogout={handleLogout} currentUser={currentUser} effectiveRole={effectiveRole} onlineUsers={onlineUsers}/>
      <div className="app-main">
        <TopBar title={cur.title} sub={cur.sub} time={time} currentUser={currentUser} connStatus={connStatus} onLogout={handleLogout} onMenu={()=>setSbOpen(true)} effectiveRole={effectiveRole} currentShift={currentShift} notifEnabled={notifEnabled} onToggleNotif={toggleNotif}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",minHeight:0}}>{cur.comp}</div>
      </div>
      <Toast list={toasts} dismiss={dismiss}/>
      <HelpPopup/>
    </div>
  );
}

function RestScreen({user,currentShift,shifts,shiftAssignments,onLogout}){
  // Tìm ca tiếp theo user có làm
  const nextShift = (()=>{
    if (!shifts.length) return null;
    const ordered = [...shifts].sort((a,b)=>(a.sort||0)-(b.sort||0));
    const now = new Date(); const m = now.getHours()*60+now.getMinutes();
    const curIdx = currentShift ? ordered.findIndex(s=>s.id===currentShift.id) : -1;
    for (let i=1; i<=ordered.length; i++){
      const s = ordered[(curIdx+i)%ordered.length];
      const a = shiftAssignments.find(x=>x.shift_id===s.id && x.staff_id===user.id);
      if (a && a.role !== "off") return {shift:s, role:a.role};
    }
    return null;
  })();
  const [tc,bg] = RC[user.role]||["#475569","#f5f5f5"];
  return (
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"linear-gradient(135deg,#FFF4F0 0%,#FFE4D8 100%)",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{maxWidth:440,width:"100%",background:"#fff",borderRadius:16,padding:"28px 24px",textAlign:"center",boxShadow:"0 8px 40px rgba(238,77,45,.18)"}}>
        <div style={{fontSize:56,marginBottom:10}}>😴</div>
        <div style={{fontSize:20,fontWeight:800,color:"#212121",marginBottom:6}}>Bạn đang nghỉ ca này</div>
        <div style={{fontSize:13,color:"#767676",marginBottom:20,lineHeight:1.6}}>
          {currentShift ? <>Ca hiện tại: <b>{currentShift.name}</b> ({currentShift.start_at}–{currentShift.end_at})</> : "Hiện chưa trong giờ làm việc"}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"center",padding:"10px 14px",background:bg,borderRadius:10,marginBottom:16}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"#fff",color:tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800}}>{inits(user.name)}</div>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#212121"}}>{user.name}</div>
            <div style={{fontSize:11,color:tc,fontWeight:700}}>{RL[user.role]} (mặc định)</div>
          </div>
        </div>
        {nextShift && (
          <div style={{padding:"12px 14px",background:"#FFF4F0",borderRadius:10,marginBottom:16,textAlign:"left"}}>
            <div style={{fontSize:10,color:"var(--or)",fontWeight:800,marginBottom:3,letterSpacing:".3px"}}>CA TIẾP THEO CỦA BẠN</div>
            <div style={{fontSize:13,fontWeight:700,color:"#212121"}}>{nextShift.shift.name} · {nextShift.shift.start_at}–{nextShift.shift.end_at}</div>
            <div style={{fontSize:11,color:"#767676",marginTop:2}}>Vai trò: <b style={{color:RC[nextShift.role]?.[0]||"#475569"}}>{RL[nextShift.role]||nextShift.role}</b></div>
          </div>
        )}
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>location.reload()} style={{padding:"9px 16px",border:"1px solid var(--bd)",background:"#fff",borderRadius:6,cursor:"pointer",fontSize:12,color:"#475569",fontWeight:600}}>↻ Kiểm tra lại</button>
          <button onClick={onLogout} style={{padding:"9px 16px",border:"1px solid #fca5a5",background:"#fff",borderRadius:6,cursor:"pointer",fontSize:12,color:"#b91c1c",fontWeight:600}}>Đăng xuất</button>
        </div>
        <div style={{marginTop:14,fontSize:10,color:"#999"}}>Nếu lịch sai, liên hệ Admin/Trưởng ca</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
